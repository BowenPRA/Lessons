<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Review - Cambridge Math</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (BOWEN ENGINE) --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #8b5cf6;        
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #10b981;         
            --warning: #f59e0b;        
            --danger: #ef4444;         
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #c4b5fd; text-align: center; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        p, li { line-height: 1.6; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        /* Buttons & Navigation */
        .btn-nav {
            width: 56px; height: 56px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-light);
            font-size: 1.4rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-container { flex: 1; margin: 0 3rem; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #a78bfa); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow); }

        /* --- ACCORDION QUESTION SYSTEM --- */
        .question-group { margin-bottom: 1rem; }
        
        .question-btn {
            width: 100%;
            text-align: left;
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255,255,255,0.15);
            padding: 1.2rem 1.8rem;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .question-btn:hover {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), rgba(30, 41, 59, 0.9));
            border-color: var(--primary);
        }
        .question-btn .chevron {
            transition: transform 0.3s ease;
            color: var(--accent);
            font-size: 1.4rem;
        }
        
        .answer-panel {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            border-radius: 0 0 12px 12px;
            margin-top: -8px;
            border: 1px solid transparent;
            border-top: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .answer-panel.open {
            padding: 2rem;
            max-height: 1200px;
            opacity: 1;
            border-color: var(--accent);
            margin-bottom: 1rem;
        }

        .math-working {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-size: 1.3rem;
            margin: 1rem 0;
        }
        .final-answer {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid var(--accent);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            color: #34d399;
            font-weight: bold;
            font-size: 1.4rem;
            margin-top: 1rem;
        }

        /* Cambridge Mark Scheme Styling */
        .mark-scheme {
            background: rgba(245, 158, 11, 0.08);
            border-left: 4px solid var(--warning);
            padding: 1.2rem;
            border-radius: 0 8px 8px 0;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #f8fafc;
        }
        .mark-scheme-title {
            color: var(--warning);
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mark-badge {
            display: inline-block;
            background: var(--warning);
            color: #0f172a;
            font-weight: 900;
            padding: 0.1rem 0.6rem;
            border-radius: 4px;
            margin-right: 0.8rem;
            font-size: 0.95rem;
            min-width: 40px;
            text-align: center;
        }
        .mark-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.6rem;
        }

        /* Pedagogical Note */
        .pedagogical-note {
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 6px solid;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .pedagogical-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1.5px;
        }
        .note-success { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-success .pedagogical-badge { color: #34d399; }

        /* SVG Graph styling */
        .graph-container {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Cambridge Math</div>
            <span style="font-weight: 700; color: #cbd5e1; font-size: 1.2rem; letter-spacing: 0.5px;">Assessment Review</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);">
            23 April 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // --- THE BOWEN ENGINE ---
    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            const wrapper = document.querySelector('.slide-wrapper');
            if(wrapper) wrapper.scrollTop = 0;

            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise([container]).catch(err => console.error('MathJax error:', err));
            }
        }
    };

    // Shared Accordion Script for Slides
    const initAccordions = (container) => {
        const btns = container.querySelectorAll('.question-btn');
        const handlers = [];

        btns.forEach(btn => {
            const handler = function() {
                const targetId = this.getAttribute('data-target');
                const panel = container.querySelector('#' + targetId);
                const icon = this.querySelector('.chevron');
                
                if (panel.classList.contains('open')) {
                    panel.classList.remove('open');
                    icon.style.transform = 'rotate(0deg)';
                } else {
                    panel.classList.add('open');
                    icon.style.transform = 'rotate(180deg)';
                }
            };
            btn.addEventListener('click', handler);
            handlers.push({ btn, handler });
        });

        return () => {
            handlers.forEach(h => h.btn.removeEventListener('click', h.handler));
        };
    };

    // Helper: Generate clean SVG background grids for mathematical graphs
    const generateGraphSVG = (xMin, xMax, yMin, yMax, stepSize = 30) => {
        const width = (xMax - xMin) * stepSize;
        const height = (yMax - yMin) * stepSize;
        const originX = Math.abs(xMin) * stepSize;
        const originY = Math.abs(yMax) * stepSize; 

        let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" style="max-width: ${width}px; background: #1e293b;">`;
        
        for(let x=0; x<=width; x+=stepSize) {
            svg += `<line x1="${x}" y1="0" x2="${x}" y2="${height}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
        }
        for(let y=0; y<=height; y+=stepSize) {
            svg += `<line x1="0" y1="${y}" x2="${width}" y2="${y}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
        }
        
        svg += `<line x1="${originX}" y1="0" x2="${originX}" y2="${height}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
        svg += `<line x1="0" y1="${originY}" x2="${width}" y2="${originY}" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>`;
        svg += `<text x="${originX - 12}" y="${originY + 15}" fill="rgba(255,255,255,0.6)" font-size="12">0</text>`;

        return { svg, originX, originY, stepSize };
    };

    // --- LESSON CONTENT ---
    const lessonSlides = [
        // Slide 1: Objective
        {
            template: () => `
                <div class="anim-enter text-center" style="display: flex; flex-direction: column; justify-content: center; height: 60vh;">
                    <div style="font-size: 6rem; color: var(--accent); margin-bottom: 1rem; filter: drop-shadow(0 0 30px rgba(16,185,129,0.5));">
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                    <h1>Assessment Review</h1>
                    <h2 style="color: var(--text-dim); font-size: 2.2rem; margin-top: -1rem;">Solutions & Corrections</h2>
                    
                    <div class="glass-card delay-1" style="max-width: 800px; margin: 3rem auto; text-align: center; border-top: 5px solid var(--accent);">
                        <p style="font-size: 1.6rem; font-weight: 500; line-height: 1.6; margin: 0;">
                            We will go through the solutions for our recent assessment. <br>Click on each part of the questions to reveal the correct working out, final answers, and the <strong>Cambridge Marking Guidelines</strong>. 
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: Section 1
        {
            template: () => {
                const grid = generateGraphSVG(-6, 6, -7, 5, 30);
                const tX = (x) => grid.originX + (x * grid.stepSize);
                const tY = (y) => grid.originY - (y * grid.stepSize);

                return `
                <div class="anim-enter">
                    <h2>Section 1: Coordinate Graphing & Midpoints</h2>
                    
                    <div class="glass-card delay-1">
                        <!-- Part A & B -->
                        <div class="question-group">
                            <button class="question-btn" data-target="ans-1ab">
                                <div><strong>(a) & (b)</strong> Plot $A(-4, 2)$ and $B(2, -6)$. Find the midpoint $M$.</div>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </button>
                            <div id="ans-1ab" class="answer-panel">
                                <div style="display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap;">
                                    <div class="graph-container">
                                        ${grid.svg}
                                            <circle cx="${tX(-4)}" cy="${tY(2)}" r="5" fill="var(--primary)"/>
                                            <text x="${tX(-4)-15}" y="${tY(2)-10}" fill="white" font-weight="bold">A</text>
                                            
                                            <circle cx="${tX(2)}" cy="${tY(-6)}" r="5" fill="var(--primary)"/>
                                            <text x="${tX(2)+15}" y="${tY(-6)+10}" fill="white" font-weight="bold">B</text>
                                            
                                            <line x1="${tX(-4)}" y1="${tY(2)}" x2="${tX(2)}" y2="${tY(-6)}" stroke="rgba(255,255,255,0.3)" stroke-dasharray="4 4" />
                                            <circle cx="${tX(-1)}" cy="${tY(-2)}" r="6" fill="var(--accent)"/>
                                            <text x="${tX(-1)+15}" y="${tY(-2)}" fill="var(--accent)" font-weight="bold">M</text>
                                        </svg>
                                    </div>
                                    <div style="flex: 1; min-width: 300px;">
                                        <p style="font-size: 1.2rem;">To find the midpoint mathematically, we average the $x$ values and average the $y$ values:</p>
                                        <div class="math-working">
                                            $M = \\left( \\frac{x_1 + x_2}{2}, \\frac{y_1 + y_2}{2} \\right)$<br><br>
                                            $M = \\left( \\frac{-4 + 2}{2}, \\frac{2 + (-6)}{2} \\right)$<br><br>
                                            $M = \\left( \\frac{-2}{2}, \\frac{-4}{2} \\right)$
                                        </div>
                                        <div class="final-answer">Answer: (-1, -2)</div>
                                        
                                        <div class="mark-scheme">
                                            <div class="mark-scheme-title">Marking Guidelines (4 marks)</div>
                                            <div class="mark-row"><span class="mark-badge">B1</span> <div>Plotting point A correctly on the grid.</div></div>
                                            <div class="mark-row"><span class="mark-badge">B1</span> <div>Plotting point B correctly on the grid.</div></div>
                                            <div class="mark-row"><span class="mark-badge">M1</span> <div>Evidence of correctly substituting into the midpoint formula.</div></div>
                                            <div class="mark-row"><span class="mark-badge">A1</span> <div>Correct final midpoint coordinates $(-1, -2)$.</div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Part C -->
                        <div class="question-group">
                            <button class="question-btn" data-target="ans-1c">
                                <div><strong>(c)</strong> Segment $PQ$ has midpoint $M(1, 1)$. If $P$ is $(-3, 4)$, find $Q$.</div>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </button>
                            <div id="ans-1c" class="answer-panel">
                                <p style="font-size: 1.2rem;">We know the midpoint formula. Let $Q$ be $(x, y)$. We work backwards:</p>
                                <div class="math-working">
                                    <strong>For the x-coordinate:</strong><br>
                                    $\\frac{-3 + x}{2} = 1 \\implies -3 + x = 2 \\implies x = 5$<br><br>
                                    <strong>For the y-coordinate:</strong><br>
                                    $\\frac{4 + y}{2} = 1 \\implies 4 + y = 2 \\implies y = -2$
                                </div>
                                <div class="final-answer">Answer: (5, -2)</div>
                                
                                <div class="mark-scheme">
                                    <div class="mark-scheme-title">Marking Guidelines (3 marks)</div>
                                    <div class="mark-row"><span class="mark-badge">M1</span> <div>Setting up a correct algebraic equation for either $x$ or $y$.</div></div>
                                    <div class="mark-row"><span class="mark-badge">A1</span> <div>Correct calculation of the $x$ coordinate $(5)$.</div></div>
                                    <div class="mark-row"><span class="mark-badge">A1</span> <div>Correct calculation of the $y$ coordinate $(-2)$.</div></div>
                                </div>
                            </div>
                        </div>

                        <!-- Part D & E -->
                        <div class="question-group">
                            <button class="question-btn" data-target="ans-1de">
                                <div><strong>(d) & (e)</strong> Equations for horizontal line through $A(-4, 2)$ and vertical through $B(2, -6)$.</div>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </button>
                            <div id="ans-1de" class="answer-panel">
                                <p style="font-size: 1.2rem;">Remember: Horizontal lines are $y = c$. Vertical lines are $x = c$.</p>
                                <div class="math-working">
                                    <strong>(d)</strong> Horizontal line through $A(-4, \\mathbf{2})$ must lock the y-value.<br>
                                    <span style="color: var(--accent); font-weight: bold;">Answer: $y = 2$</span><br><br>
                                    <strong>(e)</strong> Vertical line through $B(\\mathbf{2}, -6)$ must lock the x-value.<br>
                                    <span style="color: var(--accent); font-weight: bold;">Answer: $x = 2$</span>
                                </div>

                                <div class="mark-scheme">
                                    <div class="mark-scheme-title">Marking Guidelines (3 marks)</div>
                                    <div class="mark-row"><span class="mark-badge">B1</span> <div>Correct equation $y = 2$ (must include '$y=$').</div></div>
                                    <div class="mark-row"><span class="mark-badge">B2</span> <div>Correct equation $x = 2$ (must include '$x=$', 2 marks for precision).</div></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            `;},
            script: initAccordions
        },

        // Slide 3: Section 2
        {
            template: () => `
                <div class="anim-enter">
                    <h2>Section 2: Fraction Order of Operations</h2>
                    
                    <div class="glass-card delay-1">
                        <div class="question-group">
                            <button class="question-btn" data-target="ans-2a">
                                <div><strong>(a)</strong> $\\displaystyle \\frac{3}{4} + \\frac{1}{2} \\times \\frac{2}{5}$</div>
