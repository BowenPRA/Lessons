<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14.2 Midpoint of a Line Segment</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax Configuration (Must precede script load) -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #0ea5e9; /* Electric Blue */
            --primary-glow: rgba(14, 165, 233, 0.5);
            --accent: #10b981;         
            --warning: #f97316; /* Vivid Orange */       
            --danger: #ef4444;         
            --purple: #a855f7;
            --lime: #84cc16;
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #0284c7);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; 
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: var(--primary); }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        p, li { line-height: 1.6; margin-bottom: 1rem; font-size: 1.5rem; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

            width: 56px; height: 56px;

            border-color: var(--primary);

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: white;
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: linear-gradient(135deg, #0284c7, #0369a1); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(14, 165, 233, 0.4); }
        
        /* Math Styling */
        .math-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            font-size: 2.2rem; 
            color: white;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
        }
        mjx-container {
            font-size: 1.2em;
        }

        .box-blank {
            width: 50px;
            height: 45px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.4)); } 50% { filter: drop-shadow(0 0 25px rgba(14, 165, 233, 0.8)); } 100% { filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.4)); } }
        
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<!-- GLOBAL SVG DEFS FOR GRIDS AND GRAPHICS -->
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <defs>

        <!-- Thicker Grid lines every 100px (5 units) -->

            <!-- Tick Marks and Numbers (Every 1 Unit / 20px) -->

            <g fill="rgba(255,255,255,0.7)" font-size="11" font-family="Outfit" font-weight="bold" text-anchor="middle">
                <!-- Positives -->
                <text x="220" y="218">1</text><line x1="220" y1="195" x2="220" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="240" y="218">2</text><line x1="240" y1="195" x2="240" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>

                <text x="280" y="218">4</text><line x1="280" y1="195" x2="280" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="300" y="218">5</text><line x1="300" y1="195" x2="300" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="320" y="218">6</text><line x1="320" y1="195" x2="320" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="340" y="218">7</text><line x1="340" y1="195" x2="340" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="360" y="218">8</text><line x1="360" y1="195" x2="360" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>

                <!-- Negatives -->
                <text x="180" y="218">-1</text><line x1="180" y1="195" x2="180" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="160" y="218">-2</text><line x1="160" y1="195" x2="160" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="140" y="218">-3</text><line x1="140" y1="195" x2="140" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="120" y="218">-4</text><line x1="120" y1="195" x2="120" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="100" y="218">-5</text><line x1="100" y1="195" x2="100" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="80" y="218">-6</text><line x1="80" y1="195" x2="80" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="60" y="218">-7</text><line x1="60" y1="195" x2="60" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="40" y="218">-8</text><line x1="40" y1="195" x2="40" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="20" y="218">-9</text><line x1="20" y1="195" x2="20" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
            </g>
            
            <!-- Y Axis Numbers -->
            <g fill="rgba(255,255,255,0.7)" font-size="11" font-family="Outfit" font-weight="bold" text-anchor="end" dominant-baseline="middle">
                <!-- Positives -->
                <text x="190" y="180">1</text><line x1="195" y1="180" x2="205" y2="180" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="160">2</text><line x1="195" y1="160" x2="205" y2="160" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="140">3</text><line x1="195" y1="140" x2="205" y2="140" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="120">4</text><line x1="195" y1="120" x2="205" y2="120" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="100">5</text><line x1="195" y1="100" x2="205" y2="100" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="80">6</text><line x1="195" y1="80" x2="205" y2="80" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="60">7</text><line x1="195" y1="60" x2="205" y2="60" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>

                <text x="190" y="20">9</text><line x1="195" y1="20" x2="205" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>

                <text x="190" y="220">-1</text><line x1="195" y1="220" x2="205" y2="220" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>

                <text x="190" y="260">-3</text><line x1="195" y1="260" x2="205" y2="260" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="280">-4</text><line x1="195" y1="280" x2="205" y2="280" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="300">-5</text><line x1="195" y1="300" x2="205" y2="300" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="320">-6</text><line x1="195" y1="320" x2="205" y2="320" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="340">-7</text><line x1="195" y1="340" x2="205" y2="340" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
                <text x="190" y="360">-8</text><line x1="195" y1="360" x2="205" y2="360" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>

</svg>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 8 Math</div>
            <span style="font-weight: 700; color: var(--text-light); font-size: 1.2rem; letter-spacing: 0.5px;">14.2 Midpoint of a Line Segment</span>
        </div>
        <div id="date-display" style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);"></div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container" style="flex: 1; margin: 0 2rem; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden;">
            <div class="progress-fill" id="progress-bar" style="height: 100%; background: var(--primary); transition: width 0.3s ease;"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

    // --- ENGINE ---
    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            document.querySelector('.slide-wrapper').scrollTo({ top: 0, behavior: 'auto' });

            // MathJax Lifecycle Re-render exactly as requested
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([container]);
            }
        }
    };

    // --- LESSON CONTENT ---
    const lessonSlides = [
        // Slide 1: Objective
        {
            template: () => `
                <div class="anim-enter text-center">
                    <div style="position: relative; display: inline-block; margin-bottom: 2rem; animation: pulseGlow 4s infinite;">
                        <svg viewBox="0 0 300 300" width="250" height="250" style="filter: drop-shadow(0 0 40px rgba(14, 165, 233, 0.3));">
                            <!-- Geometric background representing midpoint -->
                            <circle cx="150" cy="150" r="120" fill="none" stroke="rgba(14, 165, 233, 0.2)" stroke-width="2" stroke-dasharray="10 5" />
                            <line x1="50" y1="250" x2="250" y2="50" stroke="var(--primary)" stroke-width="6" stroke-linecap="round" />
                            
                            <!-- Endpoints -->
                            <circle cx="50" cy="250" r="10" fill="#f8fafc" filter="url(#field-glow)" />
                            <circle cx="250" cy="50" r="10" fill="#f8fafc" filter="url(#field-glow)" />
                            
                            <!-- Glowing Midpoint -->
                            <circle cx="150" cy="150" r="14" fill="var(--accent)" filter="url(#strong-glow)" />
                            <circle cx="150" cy="150" r="6" fill="#fff" />
                            
                            <!-- Math Label -->
                            <text x="175" y="145" fill="var(--accent)" font-family="Outfit" font-weight="bold" font-size="28" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.8))">M</text>
                        </svg>
                    </div>

                    <h1>14.2 Midpoint of a Line Segment</h1>
                    <div class="glass-card delay-1" style="max-width: 800px; margin: 3rem auto;">
                        <p style="font-size: 2rem; font-weight: bold; margin: 0; color: var(--accent);">
                            Objective: Calculate the exact midpoint of a line segment.
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: Review XY Axis
        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2>Review (X, Y) Coordinate graphing</h2>
                    
                    <div class="grid-2" style="max-width: 1000px; margin: 2rem auto; align-items: center;">
                        <div class="delay-1 text-left glass-card">
                            <p style="font-size: 1.3rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                                <i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> 
                                <strong>Remember:</strong> For coordinates \\( (x, y) \\), \\( x \\) tells you how far to move <strong>left and right</strong>, and \\( y \\) tells you how far to move <strong>up and down</strong>.
                            </p>
                            <p>Plot the given points on the coordinate plane.</p>
                            <ul>
                                <li style="color: var(--primary);"><strong>Point A:</strong> \\( (3, 5) \\)</li>
                                <li style="color: var(--warning);"><strong>Point B:</strong> \\( (-4, -2) \\)</li>
