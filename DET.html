<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DET Vocabulary Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
            Check, X as XIcon, CheckCircle2, XCircle, 
            AlertCircle, Play, ArrowRight, BookOpen, Clock, NotebookPen 
        } from 'https://esm.sh/lucide-react@0.294.0';

        // --- DATA PARSING ---
        // 100 Real Words extracted from the study guide
        const rawRealWords = [
            ["Accurate", "Exactly correct.", "The weather forecast was very accurate.", "Chính xác"],
            ["Acquire", "To get or learn something.", "She acquired many new skills at her job.", "Giành được, thu được, học được"],
            ["Adequate", "Enough for what you need.", "We have an adequate amount of food for the trip.", "Đầy đủ, tương xứng"],
            ["Analyze", "To study something closely and carefully.", "The scientist will analyze the data tomorrow.", "Phân tích"],
            ["Anticipate", "To expect something to happen.", "We did not anticipate such a large crowd.", "Dự đoán, lường trước"],
            ["Appropriate", "Right or normal for a situation.", "Jeans are not appropriate for a formal wedding.", "Phù hợp, thích hợp"],
            ["Assess", "To judge or evaluate something.", "The teacher will assess the students' reading levels.", "Đánh giá"],
            ["Benefit", "A good result / To help.", "Eating vegetables has many health benefits.", "Lợi ích / Có lợi cho"],
            ["Capacity", "The maximum amount something can hold or do.", "The room has a seating capacity of 50 people.", "Sức chứa, năng lực"],
            ["Cease", "To stop happening.", "The rain finally ceased in the afternoon.", "Ngừng, dứt"],
            ["Clarify", "To make something easier to understand.", "Could you clarify what you mean by that?", "Làm rõ, giải thích rõ"],
            ["Coherent", "Logical and clear.", "He was too tired to give a coherent answer.", "Mạch lạc, chặt chẽ"],
            ["Collapse", "To fall down suddenly.", "The old bridge collapsed during the storm.", "Sụp đổ"],
            ["Commit", "To promise to do something, or to do something wrong.", "She committed to working there for two years.", "Cam kết, phạm lỗi"],
            ["Complex", "Having many parts; not simple.", "English grammar can be very complex.", "Phức tạp"],
            ["Comprehend", "To fully understand something.", "I cannot comprehend this math problem.", "Hiểu, lĩnh hội"],
            ["Conclude", "To finish or to decide after thinking.", "We can conclude that the project was a success.", "Kết luận, kết thúc"],
            ["Concrete", "Real, specific, or made of stone/cement.", "Do you have any concrete evidence?", "Cụ thể, bê tông"],
            ["Conduct", "To organize and do an activity.", "They will conduct a survey next week.", "Tiến hành, thực hiện"],
            ["Confine", "To keep within limits.", "Please confine your comments to the topic.", "Hạn chế, giới hạn"],
            ["Confirm", "To say that something is definitely true.", "Please confirm your flight online.", "Xác nhận"],
            ["Conflict", "A serious disagreement or argument.", "There is a conflict between the two teams.", "Sự xung đột, mâu thuẫn"],
            ["Conform", "To follow rules or customs.", "Students must conform to the school dress code.", "Tuân thủ, làm cho phù hợp"],
            ["Consent", "Permission or agreement.", "You need your parents' consent to go on the trip.", "Sự đồng ý, sự cho phép"],
            ["Consequence", "A result of an action.", "Global warming is a consequence of pollution.", "Hậu quả, kết quả"],
            ["Considerable", "Large in size or amount.", "He spent a considerable amount of money on the car.", "Đáng kể, to lớn"],
            ["Consist", "To be made of.", "Water consists of hydrogen and oxygen.", "Bao gồm, gồm có"],
            ["Constant", "Happening all the time.", "The machine makes a constant noise.", "Liên tục, không đổi"],
            ["Constitute", "To form or make up something.", "Women constitute 50 percent of the team.", "Cấu thành, tạo thành"],
            ["Construct", "To build something.", "They will construct a new bridge here.", "Xây dựng"],
            ["Consume", "To eat, drink, or use up.", "This old car consumes too much gas.", "Tiêu thụ, tiêu hao"],
            ["Contemporary", "Belonging to the present time; modern.", "I love contemporary art.", "Đương đại, hiện đại"],
            ["Context", "The situation in which something happens.", "You have to look at the word in context.", "Bối cảnh, ngữ cảnh"],
            ["Contract", "A legal, written agreement.", "She signed a one-year contract with the company.", "Hợp đồng"],
            ["Contradict", "To say the opposite of something.", "His actions contradict his words.", "Mâu thuẫn, trái ngược"],
            ["Contribute", "To give something to help a cause.", "She contributed fifty dollars to the charity.", "Đóng góp"],
            ["Controversy", "A strong public disagreement.", "The new law caused a lot of controversy.", "Sự tranh cãi"],
            ["Convene", "To come together for a meeting.", "The committee will convene tomorrow morning.", "Triệu tập, họp lại"],
            ["Convert", "To change from one form to another.", "We need to convert dollars into euros.", "Chuyển đổi"],
            ["Convince", "To make someone believe or do something.", "I tried to convince him to go with us.", "Thuyết phục"],
            ["Core", "The most important part of something.", "Lack of money is the core of the problem.", "Cốt lõi, phần trung tâm"],
            ["Corporate", "Relating to a large business or company.", "They attended a corporate event.", "Thuộc về doanh nghiệp"],
            ["Correspond", "To match or be similar to.", "Your story does not correspond with the facts.", "Tương ứng, phù hợp"],
            ["Criteria", "The standards used to judge something.", "What are the criteria for passing the test?", "Tiêu chí"],
            ["Crucial", "Extremely important.", "Water is crucial for human survival.", "Vô cùng quan trọng"],
            ["Currency", "The money used in a specific country.", "The currency of Japan is the Yen.", "Tiền tệ"],
            ["Data", "Facts and information collected for analysis.", "We are still collecting data for the research.", "Dữ liệu"],
            ["Debate", "A formal discussion of opposing views.", "There was a long debate about the new policy.", "Cuộc tranh luận"],
            ["Decade", "A period of ten years.", "The war lasted for a decade.", "Thập kỷ"],
            ["Decline", "To go down, or to politely say no.", "Sales declined during the winter.", "Suy giảm, từ chối"],
            ["Deduce", "To reach an answer by thinking carefully.", "The police could deduce who the killer was.", "Suy luận, suy ra"],
            ["Define", "To explain the meaning of a word or idea.", "Please define this difficult word for me.", "Định nghĩa"],
            ["Definite", "Certain and clear.", "We need a definite answer by tomorrow.", "Rõ ràng, chắc chắn"],
            ["Demonstrate", "To show how something works, or to prove something.", "The teacher will demonstrate how to use the software.", "Chứng minh, trình bày"],
            ["Denote", "To be a sign of something; to mean.", "A red traffic light denotes that you must stop.", "Biểu thị, có nghĩa là"],
            ["Deny", "To say that something is not true.", "The criminal denied stealing the money.", "Phủ nhận"],
            ["Depress", "To make someone feel very sad.", "The bad news will depress her.", "Làm chán nản, làm buồn"],
            ["Derive", "To get something from a source.", "Many medicines are derived from plants.", "Bắt nguồn từ, lấy từ"],
            ["Design", "A plan or drawing / To plan something.", "She wants to design clothes in the future.", "Thiết kế"],
            ["Despite", "Without being affected by; even though.", "We went for a walk despite the rain.", "Mặc dù"],
            ["Detect", "To discover or notice something hidden.", "The machine can detect a small amount of smoke.", "Phát hiện"],
            ["Deviate", "To do something different from the normal way.", "Never deviate from the original plan.", "Đi chệch, lệch hướng"],
            ["Device", "A machine or tool made for a specific purpose.", "A smartphone is a very useful device.", "Thiết bị"],
            ["Devote", "To give your time and energy to something.", "He wants to devote his life to helping others.", "Cống hiến, dành hết cho"],
            ["Differentiate", "To see the difference between two things.", "It is hard to differentiate between the twins.", "Phân biệt"],
            ["Dimension", "A measurement of length, width, or height.", "We need to know the exact dimensions of the room.", "Kích thước, chiều"],
            ["Diminish", "To become smaller or less.", "The pain will diminish after you take the pill.", "Giảm bớt, thu nhỏ lại"],
            ["Discrete", "Separate and different from each other.", "The company is divided into discrete units.", "Riêng biệt, rời rạc"],
            ["Discriminate", "To treat a person or group unfairly.", "It is illegal to discriminate against employees based on age.", "Phân biệt đối xử"],
            ["Displace", "To force something out of its usual place.", "The floods displaced thousands of people.", "Dời chỗ, buộc phải rời đi"],
            ["Display", "To show something so others can see it.", "The museum will display the new painting tomorrow.", "Trưng bày, hiển thị"],
            ["Dispose", "To throw away or get rid of something.", "Please dispose of your trash safely.", "Vứt bỏ, xử lý"],
            ["Distinct", "Clearly different or easily noticed.", "There is a distinct smell of gas in here.", "Khác biệt, rõ ràng"],
            ["Distort", "To change the shape or meaning of something to make it false.", "The newspaper distorted the truth about the accident.", "Xuyên tạc, bóp méo"],
            ["Distribute", "To give things to a group of people.", "The teacher will distribute the test papers now.", "Phân phát"],
            ["Diverse", "Very different from each other; having variety.", "New York is a very diverse city.", "Đa dạng"],
            ["Document", "An official piece of paper with information.", "You must sign the legal document.", "Tài liệu, văn bản"],
            ["Domain", "An area of knowledge or control.", "That subject is outside my domain of expertise.", "Lĩnh vực, phạm vi"],
            ["Domestic", "Relating to the home or one's own country.", "We only take domestic flights within the US.", "Nội địa, trong nước"],
            ["Dominate", "To control or have a lot of power over something.", "The strong team will dominate the game.", "Thống trị, chi phối"],
            ["Draft", "A first or early version of a piece of writing.", "I am working on the first draft of my essay.", "Bản nháp"],
            ["Drama", "An exciting or emotional situation, or a play/movie.", "I prefer reading comedy over drama.", "Kịch, sự việc kịch tính"],
            ["Duration", "The length of time something lasts.", "Please stay seated for the duration of the flight.", "Khoảng thời gian"],
            ["Dynamic", "Always active or changing.", "The business environment is very dynamic right now.", "Năng động, luôn biến đổi"],
            ["Economy", "The system of how money is made and used in a country.", "A strong economy provides many jobs.", "Nền kinh tế"],
            ["Edit", "To correct or make changes to text/video.", "I need to edit my video before posting it.", "Chỉnh sửa"],
            ["Element", "An important part of something.", "Trust is a key element of a good relationship.", "Yếu tố, thành phần"],
            ["Eliminate", "To completely remove or get rid of something.", "We must eliminate plastic waste to save the ocean.", "Loại bỏ"],
            ["Emerge", "To come out into view.", "The sun finally emerged from behind the clouds.", "Xuất hiện, nhô lên"],
            ["Emphasis", "Special attention or importance given to something.", "The school places a heavy emphasis on math.", "Sự nhấn mạnh, sự chú trọng"],
            ["Empirical", "Based on testing and experience, not just ideas.", "They need empirical evidence to prove the theory.", "Dựa trên thực nghiệm"],
            ["Enable", "To make it possible for someone to do something.", "The internet enables us to work from home.", "Cho phép, tạo điều kiện"],
            ["Encounter", "To meet someone or experience something unexpectedly.", "We encountered a small problem during the project.", "Chạm trán, bắt gặp"],
            ["Energy", "The power needed to do work or be active.", "Children have so much energy in the morning.", "Năng lượng"],
            ["Enforce", "To make people follow a rule or law.", "The police enforce the traffic laws.", "Thi hành, bắt buộc tuân theo"],
            ["Enhance", "To improve the quality of something.", "You can enhance your English by watching movies.", "Nâng cao, tăng cường"],
            ["Enormous", "Extremely large.", "They live in an enormous house near the lake.", "Khổng lồ, to lớn"],
            ["Ensure", "To make sure that something will happen.", "Please ensure that all the doors are locked.", "Đảm bảo"],
            ["Entity", "Something that exists separately from other things.", "The two companies operate as separate entities.", "Thực thể"],
            ["Environment", "The natural world, or the conditions you live in.", "We must protect the environment from pollution.", "Môi trường"]
        ];

        // 100 Fake Words extracted from the study guide
        const rawFakeWords = [
            ["listor", "list / pastor / visitor"], ["informance", "information / performance"], ["happeness", "happiness"], ["beautifyable", "beautiful / identifiable"], ["expectance", "expectation / expectancy"],
            ["unperfect", "imperfect"], ["disunderstand", "misunderstand"], ["mismember", "remember / dismember"], ["sadnessly", "sadly / sadness"], ["wierdness", "weirdness"],
            ["difficulity", "difficulty"], ["developement", "development"], ["enviornment", "environment"], ["truley", "truly"], ["frot", "trot / front / rot"],
            ["clast", "class / cast / blast"], ["spronge", "sponge / spring"], ["trumble", "tumble / tremble / trouble"], ["rechoose", "choose / reconsider"], ["quickment", "quickness / equipment"],
            ["slowth", "slowness / sloth / growth"], ["greenance", "greenness / grievance"], ["bluely", "blue / truly"], ["deepful", "deeply / helpful"], ["blurment", "blurriness / moment"],
            ["smartance", "smartness / importance"], ["dumbify", "dumb / simplify"], ["wiseful", "wise / useful"], ["cowardify", "coward / terrify"], ["weakment", "weakness / treatment"],
            ["slowify", "slow down / simplify"], ["structurify", "structure / stratify"], ["theorate", "theorize / decorate"], ["analyzment", "analysis / alignment"], ["synthesation", "synthesis / sensation"],
            ["evaluance", "evaluation / allowance"], ["criticization", "criticism / realization"], ["argumentive", "argumentative / informative"], ["evidentive", "evident / preventive"], ["concludal", "conclusion / brutal"],
            ["summariment", "summary / experiment"], ["introducery", "introductory"], ["explanity", "explanation / humanity"], ["descriptance", "description / assistance"], ["narrance", "narrative / appearance"],
            ["poetary", "poetry"], ["fictionate", "fictionalize / passionate"], ["dramity", "drama / tragedy"], ["tragicalness", "tragedy / logicalness"], ["romanticality", "romanticism / reality"],
            ["historify", "historicize / glorify"], ["geographicly", "geographically"], ["biologian", "biologist / theologian"], ["chemistrian", "chemist / equestrian"], ["physicy", "physics / physical"],
            ["mathematicize", "mathematize / criticize"], ["philosophian", "philosopher / utopian"], ["psychologian", "psychologist / theologian"], ["sociologian", "sociologist / logician"], ["anthropologian", "anthropologist"],
            ["politican", "politician"], ["economicly", "economically"], ["technicly", "technically"], ["mechanicly", "mechanically"], ["electricly", "electrically"],
            ["magnetify", "magnetize / magnify"], ["gravital", "gravitational / capital"], ["spatious", "spacious"], ["temporous", "temporary / rigorous"], ["eternous", "eternal / enormous"],
            ["infinitary", "infinite / limitary"], ["absolutity", "absolute / reality"], ["relativness", "relativity / passiveness"], ["objectivness", "objectivity / directness"], ["subjectivness", "subjectivity / directness"],
            ["realify", "realize / verify"], ["truthify", "verify / truthful"], ["submitten", "submitted / submission / written"], ["outstand", "outstanding / stand out"], ["pervent", "prevent"],
            ["appologize", "apologize"], ["crasion", "creation / occasion"], ["proction", "production / protection"], ["mentility", "mentality"], ["substract", "subtract"],
            ["irradicate", "eradicate"], ["throme", "throne / chrome"], ["blig", "big / blog / twig"], ["flact", "fact / flat"], ["snost", "snow / ghost"],
            ["inbelieve", "disbelieve / disbelief"], ["misagree", "disagree"], ["oversmall", "too small / overall"], ["undoubtebly", "undoubtedly"], ["unbreakful", "unbreakable / doubtful"],
            ["unfastenly", "unfastened / loosely"], ["applicance", "appliance / application"], ["conversality", "conversation / universality"], ["interpretate", "interpret / coordinate"], ["flustrate", "fluster / frustrate"]
        ];

        const REAL_WORDS = rawRealWords.map(w => ({ word: w[0], def: w[1], sent: w[2], vn: w[3], isReal: true }));
        const FAKE_WORDS = rawFakeWords.map(w => ({ word: w[0], imitating: w[1], isReal: false }));

        function App() {
            const [gameState, setGameState] = useState('START'); // START, P1_Q, P1_A, P2_Q, P2_A, SUMMARY
            const [roundIndex, setRoundIndex] = useState(0);
            const [currentPool, setCurrentPool] = useState([]);
            const [p2Words, setP2Words] = useState([]);
            const [wordIndex, setWordIndex] = useState(0);
            const [scores, setScores] = useState({});
            const [timer, setTimer] = useState(5);
            const [userAnswer, setUserAnswer] = useState(null); // { choice: 'yes'|'no'|string, isCorrect: bool }
            const [p2Input, setP2Input] = useState('');
            const inputRef = useRef(null);

            // Generate a round of 20 words (10 real, 10 fake)
            const startRound = (rIndex) => {
                const realStart = (rIndex * 10) % REAL_WORDS.length;
                const fakeStart = (rIndex * 10) % FAKE_WORDS.length;
                
                let roundReal = REAL_WORDS.slice(realStart, realStart + 10);
                let roundFake = FAKE_WORDS.slice(fakeStart, fakeStart + 10);
                
                // Shuffle the combined pool
                const combined = [...roundReal, ...roundFake].sort(() => Math.random() - 0.5);
                
                setCurrentPool(combined);
                setWordIndex(0);
                setTimer(5);
                setScores({});
                setGameState('P1_Q');
            };

            // Timer logic for Phase 1
            useEffect(() => {
                let interval;
                if (gameState === 'P1_Q' && timer > 0) {
                    interval = setInterval(() => setTimer(prev => prev - 1), 1000);
                } else if (gameState === 'P1_Q' && timer === 0) {
                    handleP1Answer(null); // Timeout
                }
                return () => clearInterval(interval);
            }, [gameState, timer]);

            // Phase 1 Handlers
            const handleP1Answer = (choice) => {
                const currentWord = currentPool[wordIndex];
                let isCorrect = false;

                if (choice === 'yes' && currentWord.isReal) isCorrect = true;
                if (choice === 'no' && !currentWord.isReal) isCorrect = true;

                setUserAnswer({ choice, isCorrect });
                setScores(prev => ({
                    ...prev,
                    [currentWord.word]: { ...prev[currentWord.word], p1: isCorrect }
                }));
                setGameState('P1_A');
            };

            const nextP1Question = () => {
                if (wordIndex < currentPool.length - 1) {
                    setWordIndex(prev => prev + 1);
                    setTimer(5);
                    setGameState('P1_Q');
                } else {
                    // Transition to Phase 2
                    const realOnly = currentPool.filter(w => w.isReal);
                    setP2Words(realOnly);
                    setWordIndex(0);
                    setGameState('P2_Q');
                }
            };

            // Utility to determine how many letters to pre-fill
            const getPrefixLength = (word) => {
                if (word.length <= 4) return 1;
                if (word.length <= 8) return 2;
                return 3;
            };

            // Initialize prefix for Phase 2 when word changes
            useEffect(() => {
                if (gameState === 'P2_Q' && p2Words[wordIndex]) {
                    const targetWord = p2Words[wordIndex].word;
                    const pLen = getPrefixLength(targetWord);
                    setP2Input(targetWord.substring(0, pLen));
                    
                    // Auto-focus input
                    setTimeout(() => {
                        if (inputRef.current) inputRef.current.focus();
                    }, 50);
                }
            }, [gameState, wordIndex, p2Words]);

            // Phase 2 Handlers
            const handleP2Submit = (e) => {
                e.preventDefault();
                const currentWord = p2Words[wordIndex];
                const prefixLen = getPrefixLength(currentWord.word);
                
                // Prevent submission if they've only typed the prefix
                if (p2Input.length <= prefixLen) return;

                const isCorrect = p2Input.trim().toLowerCase() === currentWord.word.toLowerCase();

                setUserAnswer({ choice: p2Input, isCorrect });
                setScores(prev => ({
                    ...prev,
                    [currentWord.word]: { ...prev[currentWord.word], p2: isCorrect }
                }));
                setGameState('P2_A');
            };

            const nextP2Question = () => {
                if (wordIndex < p2Words.length - 1) {
                    setWordIndex(prev => prev + 1);
                    setGameState('P2_Q');
                } else {
                    setGameState('SUMMARY');
                }
            };

            // Inline Sentence with Blank Renderer
            const renderSentenceWithBlanks = (wordObj, inputValue, isAnswered) => {
                if (!wordObj) return null;

                // Use a regex to find the word in the sentence, accommodating for conjugated suffixes (e.g. acquire -> acquired)
                const root = wordObj.word.length > 4 ? wordObj.word.substring(0, 4) : wordObj.word.substring(0, 3);
                const regex = new RegExp(`\\b${root}\\w*\\b`, 'i');
                const match = wordObj.sent.match(regex);

                let beforeText = wordObj.sent;
                let afterText = "";

                if (match) {
                    const index = match.index;
                    beforeText = wordObj.sent.substring(0, index);
                    afterText = wordObj.sent.substring(index + match[0].length);
                } else {
                    beforeText = wordObj.sent + " "; 
                }

                const prefixLen = getPrefixLength(wordObj.word);

                const boxes = Array.from({ length: wordObj.word.length }).map((_, i) => {
                    const letter = inputValue[i] || '';
                    const isPrefix = i < prefixLen;
                    
                    let borderClass = 'border-[#e5e5e5] bg-white text-gray-800'; // Default un-answered empty box
                    
                    if (isAnswered) {
                         if (inputValue.toLowerCase() === wordObj.word.toLowerCase()) {
                           borderClass = 'border-[#58A700] bg-[#E5F8E5] text-[#58A700]';
                         } else {
                           borderClass = 'border-[#EA4335] bg-[#FFE5E5] text-[#EA4335]';
                         }
                    } else if (isPrefix) {
                         borderClass = 'border-[#e5e5e5] bg-gray-50 text-gray-700';
                    }

                    return (
                        <div key={i} className={`w-8 h-10 sm:w-[42px] sm:h-[48px] border-2 flex items-center justify-center font-semibold text-lg sm:text-xl uppercase transition-colors rounded-lg ${borderClass}`}>
                            {letter}
                        </div>
                    );
                });

                return (
                    <div className="text-xl sm:text-[22px] font-normal text-[#4b4b4b] leading-[3rem] text-center sm:text-left break-words w-full">
                        <span>{beforeText}</span>
                        
                        <span className="inline-flex relative align-middle mx-1 sm:mx-2 top-[-2px]">
                            {/* Invisible real input for capturing keystrokes safely */}
                            <input
                                ref={inputRef}
                                type="text"
                                disabled={isAnswered}
                                value={inputValue}
                                onChange={(e) => {
                                    let val = e.target.value;
                                    const prefix = wordObj.word.substring(0, prefixLen);
                                    
                                    // Safeguard the prefix
                                    if (val.length < prefixLen) {
                                        val = prefix;
                                    } else if (!val.toLowerCase().startsWith(prefix.toLowerCase())) {
                                        val = prefix + val.substring(prefixLen);
                                    }

                                    // Clamp to word length
                                    if (val.length > wordObj.word.length) {
                                        val = val.substring(0, wordObj.word.length);
                                    }
                                    setP2Input(val);
                                }}
                                onKeyDown={(e) => {
                                    // Prevent backspace from removing the prefix visually
                                    if (e.key === 'Backspace' && e.target.selectionStart === prefixLen && e.target.selectionEnd === prefixLen) {
                                        e.preventDefault();
                                    }
                                }}
                                className="absolute inset-0 w-full h-full opacity-0 cursor-text z-10"
                                autoComplete="off"
                                spellCheck="false"
                            />
                            <div className="flex gap-1 pointer-events-none">
                                {boxes}
                            </div>
                        </span>
                        
                        <span>{afterText}</span>
                    </div>
                );
            };

            // UI Components
            const TopBar = ({ showTimer }) => (
                <div className="flex justify-between items-center p-4 border-b border-gray-200 bg-white shadow-sm z-20 relative">
                    <div className="flex items-center text-gray-700 font-bold text-lg">
                        {showTimer ? (
                            <>
                                <Clock className="w-6 h-6 mr-2 text-gray-500" /> 
                                <span className={timer <= 2 ? 'text-red-500 animate-pulse' : ''}>0:0{timer}</span>
                                <span className="font-normal text-sm ml-2 text-gray-400 uppercase tracking-widest hidden sm:inline">for this question</span>
                            </>
                        ) : (
                            <div className="flex items-center text-[#1CB0F6]">
                                <BookOpen className="w-6 h-6 mr-2" />
                                DET Vocabulary Builder
                            </div>
                        )}
                    </div>
                    <button onClick={() => setGameState('START')} className="text-gray-400 hover:text-gray-600 transition-colors">
                        <XIcon className="w-8 h-8" />
                    </button>
                </div>
            );

            const FeedbackBanner = ({ onNext }) => {
                const isCorrect = userAnswer?.isCorrect;
                const currentWord = gameState.startsWith('P1') ? currentPool[wordIndex] : p2Words[wordIndex];

                return (
                    <div className={`absolute bottom-0 left-0 w-full p-6 sm:p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-[0_-4px_20px_rgba(0,0,0,0.1)] transition-all duration-300 z-50 ${isCorrect ? 'bg-[#E5F8E5]' : 'bg-[#FFE5E5]'}`}>
                        <div className="mb-4 sm:mb-0">
                             <div className={`font-black text-2xl flex items-center mb-3 ${isCorrect ? 'text-[#58A700]' : 'text-[#EA4335]'}`}>
                                 {isCorrect ? <CheckCircle2 className="w-8 h-8 mr-2" strokeWidth={3} /> : <XCircle className="w-8 h-8 mr-2" strokeWidth={3} />}
                                 {isCorrect ? 'Correct!' : 'Incorrect'}
                             </div>
                             
                             <div className={`text-base sm:text-lg max-w-3xl ${isCorrect ? 'text-[#3E7500]' : 'text-[#A32D23]'}`}>
                                 {currentWord.isReal ? (
                                     <div className="space-y-1">
                                         <p><strong className="opacity-75">Word:</strong> <span className="font-bold">{currentWord.word}</span></p>
                                         {gameState.startsWith('P1') && (
                                             <>
                                                 <p><strong className="opacity-75">Definition:</strong> {currentWord.def}</p>
                                                 <p><strong className="opacity-75">Example:</strong> <em>"{currentWord.sent}"</em></p>
                                                 <p><strong className="opacity-75">Vietnamese:</strong> {currentWord.vn}</p>
                                             </>
                                         )}
                                     </div>
                                 ) : (
                                     <p className="flex items-center">
                                         <AlertCircle className="w-5 h-5 mr-2 flex-shrink-0" />
                                         This is a fake word trying to imitate: <strong className="ml-2">{currentWord.imitating}</strong>
                                     </p>
                                 )}
                             </div>
                        </div>
                        <button 
                            onClick={onNext} 
                            className={`w-full sm:w-auto px-10 py-4 rounded-2xl font-bold text-white uppercase tracking-wider transition-all transform hover:scale-105 shadow-md ${isCorrect ? 'bg-[#58A700] hover:bg-[#468500] border-b-4 border-[#468500]' : 'bg-[#EA4335] hover:bg-[#C9362A] border-b-4 border-[#C9362A]'}`}
                        >
                            Got It
                        </button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#FFFFFF] text-[#3F3F3F] font-sans overflow-hidden flex flex-col relative selection:bg-blue-100">
                    
                    {/* --- STATE: START --- */}
                    {gameState === 'START' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-6 bg-gray-50">
                            <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                                <div className="bg-[#1CB0F6] p-10 text-center text-white">
                                    <BookOpen className="w-20 h-20 mx-auto mb-6 opacity-90" />
                                    <h1 className="text-4xl font-black mb-4">DET Vocabulary Builder</h1>
                                    <p className="text-lg opacity-90">Master high-frequency vocabulary for the Duolingo English Test.</p>
                                </div>
                                <div className="p-10 space-y-8">
                                    <div className="flex items-start">
                                        <div className="bg-blue-100 p-3 rounded-full mr-4 text-[#1CB0F6]">1</div>
                                        <div>
                                            <h3 className="text-xl font-bold mb-1">Phase 1: Read & Select</h3>
                                            <p className="text-gray-500">Quickly identify if the word on the screen is a real English word. Watch out for fake DET traps!</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start">
                                        <div className="bg-green-100 p-3 rounded-full mr-4 text-[#58A700]">2</div>
                                        <div>
                                            <h3 className="text-xl font-bold mb-1">Phase 2: Fill in the Blanks</h3>
                                            <p className="text-gray-500">Read the sentence and definition, then type the missing letters to complete the target word.</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => startRound(roundIndex)}
                                        className="w-full bg-[#1CB0F6] hover:bg-[#1899D6] border-b-4 border-[#1899D6] text-white font-bold text-xl py-4 rounded-2xl transition-all transform hover:translate-y-1 shadow-lg flex justify-center items-center"
                                    >
                                        Start Round {roundIndex + 1} <Play className="w-6 h-6 ml-2" fill="currentColor" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- STATE: PHASE 1 (QUESTIONS & ANSWERS) --- */}
                    {(gameState === 'P1_Q' || gameState === 'P1_A') && (
                        <div className="flex-1 flex flex-col relative bg-white">
                            <TopBar showTimer={gameState === 'P1_Q'} />
                            
                            <div className="flex-1 flex flex-col items-center justify-center p-6 pb-40">
                                <h2 className="text-2xl sm:text-3xl font-bold text-gray-700 mb-8 sm:mb-12">Is this a real English word?</h2>
                                
                                <div className="text-5xl sm:text-7xl font-semibold tracking-wide text-gray-900 mb-16 text-center break-all">
                                    {currentPool[wordIndex]?.word}
                                </div>

                                <div className="flex space-x-6 sm:space-x-10">
                                    <button 
                                        disabled={gameState === 'P1_A'}
                                        onClick={() => handleP1Answer('yes')}
                                        className={`flex flex-col items-center justify-center w-36 h-36 sm:w-48 sm:h-48 border-[3px] rounded-3xl transition-all ${gameState === 'P1_A' && userAnswer?.choice !== 'yes' ? 'opacity-40 bg-gray-50 border-gray-200' : 'bg-white border-gray-200 hover:bg-gray-50 hover:border-gray-300 shadow-sm active:transform active:scale-95'}`}
                                    >
                                        <Check className="w-16 h-16 sm:w-20 sm:h-20 text-[#1CB0F6] mb-3" strokeWidth={4} />
                                        <span className="font-bold text-xl text-gray-600 uppercase tracking-widest">Yes</span>
                                    </button>
                                    
                                    <button 
                                        disabled={gameState === 'P1_A'}
                                        onClick={() => handleP1Answer('no')}
                                        className={`flex flex-col items-center justify-center w-36 h-36 sm:w-48 sm:h-48 border-[3px] rounded-3xl transition-all ${gameState === 'P1_A' && userAnswer?.choice !== 'no' ? 'opacity-40 bg-gray-50 border-gray-200' : 'bg-white border-gray-200 hover:bg-gray-50 hover:border-gray-300 shadow-sm active:transform active:scale-95'}`}
                                    >
                                        <XIcon className="w-16 h-16 sm:w-20 sm:h-20 text-[#1CB0F6] mb-3" strokeWidth={4} />
                                        <span className="font-bold text-xl text-gray-600 uppercase tracking-widest">No</span>
                                    </button>
                                </div>
                            </div>

                            {gameState === 'P1_A' && <FeedbackBanner onNext={nextP1Question} />}
                        </div>
                    )}

                    {/* --- STATE: PHASE 2 (QUESTIONS & ANSWERS) --- */}
                    {(gameState === 'P2_Q' || gameState === 'P2_A') && (
                        <div className="flex-1 flex flex-col relative bg-white">
                            <TopBar showTimer={false} />
                            
                            <div className="flex-1 flex flex-col items-center justify-center p-6 pb-48 max-w-4xl mx-auto w-full">
                                <h2 className="text-2xl sm:text-[28px] font-bold text-[#4b4b4b] mb-12 text-center w-full">
                                    Complete the sentence with the correct word
                                </h2>

                                <div className="w-full flex flex-col items-center">
                                    <form onSubmit={handleP2Submit} className="w-full relative flex flex-col items-center max-w-3xl">
                                        
                                        {renderSentenceWithBlanks(p2Words[wordIndex], p2Input, gameState === 'P2_A')}

                                        {gameState === 'P2_Q' && (
                                            <button 
                                                type="submit" 
                                                disabled={p2Input.length <= getPrefixLength(p2Words[wordIndex]?.word || '')} 
                                                className="mt-12 bg-[#1CB0F6] hover:bg-[#1899D6] border-b-4 border-[#1899D6] text-white font-bold text-lg px-12 py-4 rounded-2xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                            >
                                                Submit Answer
                                            </button>
                                        )}
                                    </form>
                                    
                                    {/* Context/Hints Section */}
                                    <div className="mt-14 max-w-2xl w-full bg-gray-50 rounded-2xl p-6 border border-gray-200 text-left shadow-sm">
                                        <h4 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Word Clues</h4>
                                        <div className="space-y-2">
                                            <p className="text-gray-800 text-lg">
                                                <span className="font-bold text-gray-500 mr-2">Definition:</span> 
                                                {p2Words[wordIndex]?.def}
                                            </p>
                                            <p className="text-gray-800 text-lg">
                                                <span className="font-bold text-gray-500 mr-2">Vietnamese:</span> 
                                                {p2Words[wordIndex]?.vn}
                                            </p>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            {gameState === 'P2_A' && <FeedbackBanner onNext={nextP2Question} />}
                        </div>
                    )}

                    {/* --- STATE: SUMMARY --- */}
                    {gameState === 'SUMMARY' && (
                        <div className="flex-1 flex flex-col bg-gray-50 h-screen overflow-y-auto">
                            <TopBar showTimer={false} />
                            
                            <div className="max-w-4xl mx-auto w-full p-6 py-12">
                                <div className="bg-white rounded-3xl shadow-lg border border-gray-200 overflow-hidden">
                                    <div className="bg-[#1CB0F6] p-8 text-white text-center">
                                        <h2 className="text-3xl font-black mb-2">Round {roundIndex + 1} Complete!</h2>
                                        <p className="text-lg opacity-90">Review your words and add mistakes to your notebook.</p>
                                    </div>
                                    
                                    <div className="p-0 sm:p-6 overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-50 border-b-2 border-gray-100 text-gray-500 uppercase tracking-wider text-sm">
                                                    <th className="p-4 font-bold rounded-tl-xl">Word</th>
                                                    <th className="p-4 font-bold text-center">Read & Select</th>
                                                    <th className="p-4 font-bold text-center">Spelling</th>
                                                    <th className="p-4 font-bold rounded-tr-xl">Review Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {currentPool.map((wordObj, i) => {
                                                    const p1Correct = scores[wordObj.word]?.p1;
                                                    const p2Correct = scores[wordObj.word]?.p2;
                                                    const needsReview = p1Correct === false || p2Correct === false;
                                                    
                                                    return (
                                                        <tr key={i} className={`border-b border-gray-100 last:border-0 ${needsReview ? 'bg-red-50/50' : 'hover:bg-gray-50'}`}>
                                                            <td className="p-4">
                                                                <span className="font-bold text-lg text-gray-800">{wordObj.word}</span>
                                                                {!wordObj.isReal && <span className="ml-2 text-xs font-bold px-2 py-1 bg-gray-200 text-gray-600 rounded-lg uppercase">Fake</span>}
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                {p1Correct === true ? <CheckCircle2 className="w-6 h-6 text-[#58A700] mx-auto" /> : 
                                                                 p1Correct === false ? <XCircle className="w-6 h-6 text-[#EA4335] mx-auto" /> : '-'}
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                {wordObj.isReal ? (
                                                                    p2Correct === true ? <CheckCircle2 className="w-6 h-6 text-[#58A700] mx-auto" /> : 
                                                                    p2Correct === false ? <XCircle className="w-6 h-6 text-[#EA4335] mx-auto" /> : '-'
                                                                ) : (
                                                                    <span className="text-gray-400 text-sm">N/A</span>
                                                                )}
                                                            </td>
                                                            <td className="p-4">
                                                                {needsReview ? (
                                                                    <div className="flex items-start text-sm text-[#EA4335] bg-white p-3 rounded-xl border border-red-100 shadow-sm">
                                                                        <NotebookPen className="w-5 h-5 mr-2 flex-shrink-0 mt-0.5" />
                                                                        <div>
                                                                            <span className="font-bold block mb-1">Add to Notebook:</span>
                                                                            {wordObj.isReal ? `${wordObj.word} - ${wordObj.def} (${wordObj.vn})` : `Fake word trap imitating: ${wordObj.imitating}`}
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-[#58A700] font-medium flex items-center text-sm">
                                                                        <Check className="w-4 h-4 mr-1" /> Mastered
                                                                    </span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="p-8 bg-gray-50 border-t border-gray-100 flex justify-center">
                                        <button 
                                            onClick={() => {
                                                setRoundIndex(prev => prev + 1);
                                                startRound(roundIndex + 1);
                                            }}
                                            className="bg-[#1CB0F6] hover:bg-[#1899D6] border-b-4 border-[#1899D6] text-white font-bold text-xl px-12 py-4 rounded-2xl transition-all transform hover:scale-105 shadow-md flex items-center"
                                        >
                                            Start Round {roundIndex + 2} <ArrowRight className="w-6 h-6 ml-2" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Mount the React app to the HTML DOM
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
