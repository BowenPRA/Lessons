<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>What is Chemistry? - Year 8 Science</title>



    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

   

    <!-- FontAwesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">



    <style>

        /* --- DESIGN TOKENS (Cambridge Bible Standard) --- */

        :root {

            --bg-deep: #0f172a;        /* Deep Slate */

            --bg-panel: #1e293b;       /* Secondary Background */

            --primary: #8b5cf6;        /* Chemical Purple */

            --accent: #10b981;         /* Success/Acid Green */

            --warning: #f59e0b;        /* Hazard Orange */

            --danger: #ef4444;         /* Heat Red */

            --cold: #0ea5e9;           /* Cold Blue */

            --text-light: #f1f5f9;     /* Main Text */

            --text-dim: #94a3b8;       /* Subtitles */

           

            --header-h: 70px;

            --footer-h: 80px;

            --border-radius: 16px;

        }



        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }



        body, html {

            height: 100%;

            width: 100%;

            font-family: 'Plus Jakarta Sans', sans-serif;

            background-color: var(--bg-deep);

            color: var(--text-light);

            overflow: hidden;

        }



        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }

        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--text-light); }

        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }

        p, li { font-size: 1.15rem; line-height: 1.6; color: var(--text-dim); }



        strong { color: var(--text-light); }

       

        .text-center { text-align: center; }

        .text-left { text-align: left; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }



        /* --- LAYOUT SHELL --- */

        .app-shell { display: flex; flex-direction: column; height: 100vh; }



        .header {

            height: var(--header-h);

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 0 2rem;

            background: rgba(15, 23, 42, 0.95);

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

            z-index: 10;

        }



        .brand-pill {

            background: linear-gradient(135deg, var(--primary), var(--accent));

            padding: 0.4rem 1.2rem;

            border-radius: 50px;

            font-family: 'Outfit', sans-serif;

            font-weight: 800;

            font-size: 0.9rem;

            text-transform: uppercase;

            letter-spacing: 1px;

            color: white;

            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);

        }



        .viewport {

            flex: 1;

            position: relative;

            overflow-y: auto;

            scroll-behavior: smooth;

        }



        .slide-wrapper {

            min-height: 100%;

            display: flex;

            flex-direction: column;

            justify-content: center;

            padding: 2rem;

            max-width: 1100px;

            margin: 0 auto;

        }



        .footer {

            height: var(--footer-h);

            background: rgba(15, 23, 42, 0.95);

            border-top: 1px solid rgba(255, 255, 255, 0.1);

            display: flex;

            align-items: center;

            justify-content: space-between;

            padding: 0 2rem;

            z-index: 10;

        }



        /* --- UI COMPONENTS --- */

        .glass-card {

            background: var(--bg-panel);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: var(--border-radius);

            padding: 2rem;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            backdrop-filter: blur(10px);

        }



        /* Signposting System (Pedagogical Framework) */

        .pedagogical-note {

            padding: 1.5rem;

            border-radius: 12px;

            margin: 1.5rem 0;

            border-left: 5px solid;

            animation: slideIn 0.5s ease;

        }

        .pedagogical-badge {

            font-weight: 800;

            margin-bottom: 0.5rem;

            display: inline-flex;

            align-items: center;

            gap: 0.5rem;

            text-transform: uppercase;

            font-size: 0.85rem;

            letter-spacing: 1px;

            font-family: 'Outfit', sans-serif;

        }

       

        .note-write { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); }

        .note-write .pedagogical-badge { color: var(--primary); }

       

        .note-task { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); }

        .note-task .pedagogical-badge { color: var(--warning); }

       

        .note-theory { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }

        .note-theory .pedagogical-badge { color: var(--danger); }

       

        .note-success { background: rgba(16, 185, 129, 0.1); border-color: var(--accent); }

        .note-success .pedagogical-badge { color: var(--accent); }



        /* Reveal Card */

        .reveal-card {

            background: var(--bg-panel);

            border: 2px dashed var(--primary);

            border-radius: var(--border-radius);

            padding: 2rem;

            text-align: center;

            cursor: pointer;

            transition: all 0.3s ease;

            position: relative;

            overflow: hidden;

        }

        .reveal-card:hover { background: rgba(139, 92, 246, 0.1); }

        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }

        .reveal-card.revealed { border-style: solid; background: rgba(16, 185, 129, 0.1); border-color: var(--accent); cursor: default; }

        .reveal-card.revealed .pre-reveal { display: none; }

        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }



        /* Navigation Buttons */

        .btn-nav {

            width: 50px;

            height: 50px;

            border-radius: 12px;

            background: var(--bg-panel);

            color: var(--text-light);

            border: 1px solid rgba(255,255,255,0.2);

            cursor: pointer;

            transition: all 0.2s;

        }

        .btn-nav:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }



        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }

        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.3s ease; }



        /* Animations */

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

       

        .anim-enter { animation: fadeIn 0.6s ease-out; }

        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }

        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }

        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }



        /* Atom Animation Elements */

        .atom-diagram {

            position: relative;

            width: 300px;

            height: 300px;

            margin: 0 auto;

            display: flex;

            align-items: center;

            justify-content: center;

        }

        .nucleus-cluster {

            position: absolute;

            top: 50%;

            left: 50%;

            transform: translate(-50%, -50%);

            width: 50px;

            height: 50px;

            z-index: 5;

        }

        .nucleus-label {

            position: absolute;

            top: -40px;

            left: 50%;

            transform: translateX(-50%);

            background: rgba(239, 68, 68, 0.2);

            border: 1px solid var(--danger);

            color: white;

            padding: 4px 12px;

            border-radius: 20px;

            font-size: 0.85rem;

            font-weight: bold;

            white-space: nowrap;

            z-index: 10;

        }

        .nucleus-label::after {

            content: '';

            position: absolute;

            bottom: -6px;

            left: 50%;

            transform: translateX(-50%);

            border-width: 6px 6px 0 6px;

            border-style: solid;

            border-color: var(--danger) transparent transparent transparent;

        }

        .nucleon {

            position: absolute;

            width: 20px;

            height: 20px;

            border-radius: 50%;

            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5);

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 12px;

            font-weight: 900;

            color: white;

        }

        .proton { background: var(--danger); z-index: 2; }

        .neutron { background: var(--text-dim); z-index: 1; }

       

        .orbit {

            position: absolute;

            top: 50%;

            left: 50%;

            border: 2px dashed rgba(255,255,255,0.2);

            border-radius: 50%;

            transform: translate(-50%, -50%);

        }

        .orbit-1 { width: 140px; height: 140px; animation: spin 4s linear infinite; }

        .orbit-2 { width: 220px; height: 220px; animation: spin 7s linear infinite reverse; }

        .orbit-3 { width: 300px; height: 300px; animation: spin 10s linear infinite; }

       

        .electron {

            position: absolute;

            width: 16px;

            height: 16px;

            background: var(--cold);

            border-radius: 50%;

            top: -8px;

            left: 50%;

            transform: translateX(-50%);

            box-shadow: 0 0 10px var(--cold);

        }



        /* Adjust starting positions so they don't bunch up */

        .orbit-1 .e1 { top: -8px; left: 50%; }

        .orbit-1 .e2 { bottom: -8px; top: auto; left: 50%; }

       

        .orbit-2 .e1 { top: 50%; left: -8px; transform: translateY(-50%); }

        .orbit-2 .e2 { top: 50%; right: -8px; left: auto; transform: translateY(-50%); }



        @keyframes spin {

            100% { transform: translate(-50%, -50%) rotate(360deg); }

        }



        @media (max-width: 768px) {

            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 1rem; }

            h1 { font-size: 2rem; }

        }

    </style>

</head>

<body>



<div class="app-shell">

    <header class="header">

        <div style="display: flex; align-items: center; gap: 1rem;">

            <div class="brand-pill"><i class="fa-solid fa-flask"></i> Year 8 Science</div>

            <span style="font-weight: 700; color: var(--text-dim); font-size: 0.9rem;">Crash Course</span>

        </div>

        <div style="font-family: 'Outfit'; font-weight: 700; color: var(--primary);">

            11 March 2026

        </div>

    </header>



    <main class="viewport" id="viewport">

        <div id="slide-container" class="slide-wrapper" aria-live="polite">

            <!-- Slide content injected here -->

        </div>

    </main>



    <footer class="footer">

        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">

            <i class="fa-solid fa-chevron-left"></i>

        </button>

       

        <div class="progress-container">

            <div class="progress-fill" id="progress-bar"></div>

        </div>

       

        <button class="btn-nav" id="btn-next" aria-label="Next Slide">

            <i class="fa-solid fa-chevron-right"></i>

        </button>

    </footer>

</div>



<script>

    /* --- BOWEN ENGINE CORE --- */

    const state = {

        currentSlide: 0,

        slides: [],

        cleanupFn: null

    };



    // --- SLIDE DEFINITIONS ---

    state.slides = [

        // SLIDE 1: Title & Objectives

        {

            template: () => `

                <div class="anim-enter text-center">

                    <i class="fa-solid fa-flask-vial delay-1" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>

                    <h1 class="delay-1" style="font-size: 3.5rem;">What is Chemistry?</h1>

                    <h2 class="delay-1" style="color: var(--accent);">Mr. Bowen's Crash Course</h2>

                   

                    <div class="pedagogical-note note-success delay-2" style="max-width: 650px; margin: 3rem auto; text-align: left;">

                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>

                        <ul style="margin-left: 1rem; display: grid; gap: 1rem; list-style-type: none; padding: 0; margin-top: 0.5rem;">

                            <li style="font-size: 1.2rem; display: flex; align-items: flex-start; gap: 10px;">

                                <span>🧱</span>

                                <span style="color: white; font-weight: 500;">Define atoms, elements, and molecules.</span>

                            </li>

                            <li style="font-size: 1.2rem; display: flex; align-items: flex-start; gap: 10px;">

                                <span>💥</span>

                                <span style="color: white; font-weight: 500;">Explain what a chemical reaction is using reactants and products.</span>

                            </li>

                        </ul>

                    </div>

                </div>

            `

        },



        // SLIDE 2: What is a chemical?

        {

            template: () => `

                <div class="anim-enter">

                    <h2 class="text-center">The Big Question</h2>

                   

                    <div class="pedagogical-note note-task delay-1" style="max-width: 800px; margin: 0 auto 2rem auto;">

                        <div class="pedagogical-badge"><i class="fa-solid fa-brain"></i> Think about it</div>

                        <p style="text-align: center; font-size: 1.5rem; color: white; padding: 1rem 0;">What actually is a "Chemical"?</p>

                    </div>



                    <div class="reveal-card delay-2" id="chemical-reveal" role="button" tabindex="0" style="max-width: 800px; margin: 0 auto;">

                        <div class="pre-reveal">

                            <i class="fa-solid fa-hand-pointer" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);"></i>

                            <h3 style="color: white;">Click to reveal the answer</h3>

                            <p style="font-size: 0.95rem; color: var(--text-dim);">(Be ready to write this in your notebook!)</p>

                        </div>

                        <div class="reveal-content text-left">

                            <div class="pedagogical-badge" style="color: var(--accent); margin-bottom: 1rem;"><i class="fa-solid fa-pencil"></i> Write This Down</div>

                            <h3 style="color: var(--accent); font-size: 1.8rem; margin-bottom: 1rem;">Everything is a chemical!</h3>

                            <p style="font-size: 1.2rem; color: white; line-height: 1.6;">A chemical is <strong>any substance that has a specific, guaranteed recipe of atoms</strong>.</p>

                            <br>

                            <p style="color: var(--text-dim); font-size: 1.1rem;">If you can touch it, taste it, or breathe it—it is made of chemicals. Water (H₂O), the oxygen you breathe (O₂), and the sugar on your food are all chemicals!</p>

                        </div>

                    </div>

                </div>

            `,

            script: (container) => {

                const revealCard = container.querySelector('#chemical-reveal');

                const handler = () => { revealCard.classList.add('revealed'); };

                revealCard.addEventListener('click', handler);

                return () => revealCard.removeEventListener('click', handler);

            }

        },



        // SLIDE 3: Defining Atom, Element, Molecule

        {

            template: () => `

                <div class="anim-enter">

                    <h2 class="text-center">The Building Blocks</h2>

                    <p class="text-center delay-1" style="margin-bottom: 2rem;">Let's get our core definitions straight.</p>

                   

                    <div class="grid-3 delay-2" style="align-items: stretch; max-width: 1100px; margin: 0 auto;">

                       

                        <div class="glass-card" style="border-top: 4px solid var(--danger); display: flex; flex-direction: column;">

                            <i class="fa-solid fa-circle-dot" style="font-size: 2.5rem; color: var(--danger); margin-bottom: 1rem;"></i>

                            <h3 style="color: var(--danger); font-size: 1.5rem; margin-bottom: 0.5rem;">Atom</h3>

                            <p style="color: white; font-size: 1.1rem; flex-grow: 1;">The smallest, single building block of all matter.</p>

                            <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 1rem;">

                                <p style="font-size: 0.9rem; color: var(--text-dim);"><i class="fa-solid fa-puzzle-piece"></i> <strong>Analogy:</strong> A single Lego brick.</p>

                            </div>

                        </div>



                        <div class="glass-card" style="border-top: 4px solid var(--primary); display: flex; flex-direction: column;">

                            <i class="fa-solid fa-cubes" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>

                            <h3 style="color: var(--primary); font-size: 1.5rem; margin-bottom: 0.5rem;">Element</h3>

                            <p style="color: white; font-size: 1.1rem; flex-grow: 1;">A pure substance made of only <strong>one type</strong> of atom.</p>

                            <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 1rem;">

                                <p style="font-size: 0.9rem; color: var(--text-dim);"><i class="fa-solid fa-puzzle-piece"></i> <strong>Analogy:</strong> A pile of Lego bricks that are all exactly the same color.</p>

                            </div>

                        </div>



                        <div class="glass-card" style="border-top: 4px solid var(--accent); display: flex; flex-direction: column;">

                            <i class="fa-solid fa-diagram-project" style="font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem;"></i>

                            <h3 style="color: var(--accent); font-size: 1.5rem; margin-bottom: 0.5rem;">Molecule</h3>

                            <p style="color: white; font-size: 1.1rem; flex-grow: 1;">Two or more atoms strongly <strong>bonded</strong> together.</p>

                            <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 1rem;">

                                <p style="font-size: 0.9rem; color: var(--text-dim);"><i class="fa-solid fa-puzzle-piece"></i> <strong>Analogy:</strong> Legos snapped together to build something new.</p>

                            </div>

                        </div>



                    </div>



                    <div class="pedagogical-note note-theory delay-3" style="max-width: 700px; margin: 2rem auto 0 auto; text-align: center;">

                        <div class="pedagogical-badge"><i class="fa-solid fa-forward-fast"></i> Coming in Year 9</div>

                        <p style="color: white; font-size: 1rem;">Next year, you will learn about <strong>Ions</strong> (atoms that have a positive or negative charge because they gained or lost electrons!).</p>

                    </div>

                </div>

            `

        },



        // SLIDE 4: Inside the Atom (Animated)

        {

            template: () => `

                <div class="anim-enter">

                    <h2 class="text-center">Inside the Atom</h2>

                   

                    <div class="grid-2">

                        <div class="delay-1">

                            <div class="glass-card">

                                <h3 style="color: var(--primary);">The Nucleus (Center)</h3>

                                <ul style="margin-left: 1.5rem; margin-bottom: 1.5rem; color: white;">

                                    <li><strong style="color: var(--danger);">Protons (p⁺):</strong> Heavy, Positive (+) charge.</li>

                                    <li><strong style="color: var(--text-dim);">Neutrons (n⁰):</strong> Heavy, Neutral (0) charge.</li>

                                </ul>

                               

                                <h3 style="color: var(--cold);">The Shells (Outside)</h3>

                                <ul style="margin-left: 1.5rem; color: white;">

                                    <li><strong style="color: var(--cold);">Electrons (e⁻):</strong> Tiny, Negative (-) charge.</li>

                                    <li>They zoom around the nucleus at incredible speeds!</li>

                                </ul>

                            </div>

                        </div>



                        <div class="delay-2">

                            <!-- Animated CSS Atom -->

                            <div class="atom-diagram">

                                <div class="nucleus-cluster">

                                    <div class="nucleus-label">The Nucleus</div>

                                    <!-- Protons (+) -->

                                    <div class="nucleon proton" style="top: 8px; left: 16px;">+</div>

                                    <div class="nucleon proton" style="top: 22px; left: 8px;">+</div>

                                    <div class="nucleon proton" style="top: 24px; left: 24px;">+</div>

                                    <!-- Neutrons (0 or empty) -->

                                    <div class="nucleon neutron" style="top: 6px; left: 0px;"></div>

                                    <div class="nucleon neutron" style="top: 8px; left: 28px;"></div>

                                    <div class="nucleon neutron" style="top: 30px; left: 16px;"></div>

                                </div>

                               

                                <!-- Shell 1 -->

                                <div class="orbit orbit-1">

                                    <div class="electron e1"></div>

                                    <div class="electron e2"></div>

                                </div>

                               

                                <!-- Shell 2 -->

                                <div class="orbit orbit-2">

                                    <div class="electron e1"></div>

                                    <div class="electron e2"></div>

                                </div>

                               

                                <!-- Shell 3 -->

                                <div class="orbit orbit-3">

                                    <div class="electron e1"></div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            `

        },



        // SLIDE 5: What is a Chemical Reaction? (Concept)

        {

            template: () => `

                <div class="anim-enter text-center">

                    <h2>What happens during a chemical reaction?</h2>

                   

                    <div class="pedagogical-note note-task delay-1" style="max-width: 800px; margin: 0 auto 2rem auto;">

                        <p style="font-size: 1.2rem; color: white;">Do atoms disappear when things react and change color or explode?</p>

                    </div>



                    <div class="reveal-card delay-2" id="reaction-reveal" role="button" tabindex="0" style="max-width: 800px; margin: 0 auto;">

                        <div class="pre-reveal">

                            <i class="fa-solid fa-eye" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);"></i>

                            <h3 style="color: white;">Click to reveal the secret</h3>

                        </div>

                        <div class="reveal-content text-left">

                            <h3 style="color: var(--accent); font-size: 1.5rem; margin-bottom: 1rem;"><i class="fa-solid fa-recycle"></i> Atoms are just rearranged!</h3>

                            <p style="font-size: 1.15rem; color: white; line-height: 1.6; margin-bottom: 1rem;">No atoms are created or destroyed. The original bonds between atoms are broken, and <strong>new bonds</strong> are formed.</p>

                           

                            <div style="background: rgba(14, 165, 233, 0.1); border-left: 4px solid var(--cold); padding: 1rem; border-radius: 0 8px 8px 0;">

                                <p style="color: var(--cold); font-weight: bold; margin-bottom: 0.5rem;"><i class="fa-solid fa-bolt"></i> The Star Players:</p>

                                <p style="font-size: 1rem;">Chemical bonding is entirely controlled by the <strong>electrons</strong> on the outside of the atom. They are the ones swapping and sharing to make new molecules!</p>

                            </div>

                        </div>

                    </div>

                </div>

            `,

            script: (container) => {

                const revealCard = container.querySelector('#reaction-reveal');

                const handler = () => { revealCard.classList.add('revealed'); };

                revealCard.addEventListener('click', handler);

                return () => revealCard.removeEventListener('click', handler);

            }

        },



        // SLIDE 6: Reactants and Products

        {

            template: () => `

                <div class="anim-enter">

                    <h2 class="text-center">The Anatomy of a Reaction</h2>

                   

                    <div class="glass-card delay-1" style="max-width: 900px; margin: 2rem auto; padding: 3rem;">

                        <div class="pedagogical-badge" style="color: var(--primary); margin-bottom: 1rem;"><i class="fa-solid fa-pencil"></i> Write This Down</div>

                       

                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">

                           

                            <!-- Reactants -->

                            <div style="flex: 1; text-align: center; background: rgba(245, 158, 11, 0.1); border: 2px solid var(--warning); padding: 1.5rem; border-radius: 12px;">

                                <h3 style="color: var(--warning); margin-bottom: 0.5rem;">Reactants</h3>

    // --- RENDER LOGIC ---

    function render() {

        const container = document.getElementById('slide-container');

        const slide = state.slides[state.currentSlide];

       

        // Execute cleanup from previous slide if it exists

        if (state.cleanupFn) {

            state.cleanupFn();

            state.cleanupFn = null;

        }



        // Render HTML synchronously

        container.innerHTML = slide.template();

       

        // Execute script immediately

        if (slide.script) {

            state.cleanupFn = slide.script(container);

        }

       

        // Update UI

        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;

        document.getElementById('btn-prev').disabled = state.currentSlide === 0;

        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;

        document.getElementById('viewport').scrollTop = 0;

    }



    function changeSlide(dir) {

        const next = state.currentSlide + dir;

        if (next >= 0 && next < state.slides.length) {

            state.currentSlide = next;

            render();

        }

    }



    // --- EVENT LISTENERS ---

    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));

    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));



    document.addEventListener('keydown', (e) => {

        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);

        if (e.key === 'ArrowLeft') changeSlide(-1);

    });



    // Initialize

    render();

</script>
