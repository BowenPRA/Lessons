<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9.2 Voltage</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Cambridge Standard - Dark Theme) --- */
        :root {
            --bg-deep: #0f172a;        /* Main background (Deep Slate) */
            --bg-panel: #1e293b;       /* Secondary background (Cards) */
            --primary: #8b5cf6;        /* Chemical Purple */
            --accent: #10b981;         /* Acid Green (Success) */
            --warning: #f59e0b;        /* Hazard Orange (Tasks) */
            --danger: #ef4444;         /* Heat Red (Errors/Theory) */
            --text-light: #f1f5f9;     /* Main text */
            --text-dim: #94a3b8;       /* Subtitles, disabled states */
            --cold: #3b82f6;           /* Cold Blue */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-light); }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-light); }
        strong { color: #ffffff; font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: stretch; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand-pill {
            background: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(30, 41, 59, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Signposting System (Cambridge Standard) */
        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 4px solid;
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease;
        }
        .pedagogical-badge {
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        
        .note-task { border-color: var(--warning); }
        .note-task .pedagogical-badge { color: var(--warning); }
        
        .note-theory { border-color: var(--danger); }
        .note-theory .pedagogical-badge { color: var(--danger); }
        
        .note-success { border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        /* Reveal Card */
        .reveal-card {
            background: rgba(30, 41, 59, 0.5);
            border: 2px dashed var(--primary);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .reveal-card:hover { background: rgba(139, 92, 246, 0.1); }
        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .reveal-card.revealed { border-style: solid; border-color: var(--accent); cursor: default; background: rgba(16, 185, 129, 0.05); }
        .reveal-card.revealed .pre-reveal { display: none; }
        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }

        /* Action Buttons */
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
        }
        .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Circuit Diagrams */
        .circuit-svg { width: 100%; max-height: 280px; stroke: var(--text-light); stroke-width: 3; fill: none; display: block; margin: 1rem auto; }
        .circuit-accent { stroke: var(--primary); }
        .circuit-warning { stroke: var(--warning); }
        .circuit-text { fill: var(--text-light); stroke: none; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle;}
        
        /* Quiz Options */
        .quiz-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.1); }
        .quiz-option.correct { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); color: var(--accent); }
        .quiz-option.incorrect { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); color: var(--danger); opacity: 0.6; }

        /* Inputs */
        .calc-input {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-light);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1.2rem;
            width: 100%;
            margin-bottom: 1rem;
            font-family: 'Plus Jakarta Sans';
        }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--bg-panel);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary);}

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.5s ease-out; }
        .delay-1 { animation: slideIn 0.5s ease-out 0.1s both; }
        .delay-2 { animation: slideIn 0.5s ease-out 0.2s both; }
        .delay-3 { animation: slideIn 0.5s ease-out 0.3s both; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-atom"></i> Cambridge Science</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;">9.2 Voltage</span>
        </div>
        <div style="font-weight: 700; color: var(--text-light); font-size: 1.1rem; font-family: 'Outfit', sans-serif;">31 March 2026</div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- THE BOWEN ENGINE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    const renderMath = () => {
        if (window.MathJax) {
            window.MathJax.typesetPromise().catch((err) => console.log('MathJax error:', err));
        }
    };

    /* --- LESSON CONTENT --- */
    state.slides = [
        // 0. The Hook (Engage)
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-bolt delay-1" style="font-size: 4rem; color: var(--warning); margin-bottom: 1rem; filter: drop-shadow(0 0 10px var(--warning));"></i>
                    <h1 class="delay-1">9.2 Voltage</h1>
                    <h2 class="delay-1" style="color: var(--text-dim); font-size: 1.5rem;">in Series & Parallel Circuits</h2>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 700px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>
                        <ul style="margin-left: 1.5rem; margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                            <li>Compare current and voltage in <strong>series</strong> and <strong>parallel</strong> circuits.</li>
                            <li>Describe the effects of adding <strong>cells</strong> and <strong>lamps</strong> on current and voltage.</li>
                        </ul>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // 1. Theory (Explain) - What is Voltage?
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">What is Voltage?</h2>
                    
                    <div class="pedagogical-note note-write delay-1">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                        <h3 style="color: var(--primary); margin-bottom: 0.5rem;">Voltage (V)</h3>
                        <p>Voltage is linked to the <strong>electrical energy</strong> supplied to a circuit by a cell, battery, or power supply. It is the electrical "push" moving particles through the wires.</p>
                        <p style="margin-top: 1rem;">Measured in units called <strong>Volts (V)</strong>.</p>
                    </div>

                    <div class="grid-2 delay-2" style="margin-top: 2rem;">
                        <div class="glass-card">
                            <h3 style="color: var(--accent);"><i class="fa-solid fa-water"></i> Simple Analogy</h3>
                            <p>Think of water in pipes. <br><br>The wire is the pipe. The current is the water flowing. <strong>Voltage is the water pump</strong> providing the pressure to push the water along.</p>
                        </div>
                        <div class="glass-card">
                            <h3 style="color: var(--warning);"><i class="fa-solid fa-key"></i> Key Words</h3>
                            <ul style="margin-left: 1.5rem;">
                                <li><strong>Supply:</strong> The source of energy (cell, battery, or mains).</li>
                                <li><strong>Mains:</strong> Electrical supply from a wall socket (usually 220-240 V).</li>
                                <li><strong>Battery:</strong> Two or more cells connected in series.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `,
            script: () => { return () => {}; }
        },

        // 2. Theory (Explain) - Measuring Voltage
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Measuring Voltage</h2>
                    
                    <div class="grid-2 delay-1">
                        <div class="pedagogical-note note-theory" style="margin: 0;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-triangle-exclamation"></i> Crucial Rule</div>
                            <p>Voltage is measured using a <strong>voltmeter</strong>.</p>
                            <p style="margin-top: 1rem;">Because voltage looks at the difference in energy across a component, a voltmeter must always be connected in <strong>parallel</strong> with the component.</p>
                        </div>

                        <div class="glass-card text-center" style="display: flex; flex-direction: column; justify-content: center;">
                            <h3 style="color: var(--text-light);">Voltmeter Symbol</h3>
                            <svg viewBox="0 0 100 50" style="width: 100px; height: 50px; stroke: var(--text-light); stroke-width: 3; fill: none; margin: 0 auto;">
                                <line x1="10" y1="25" x2="30" y2="25" />
                                <circle cx="50" cy="25" r="20" />
                                <text x="50" y="32" stroke="none" fill="var(--primary)" font-family="Outfit" font-size="20px" font-weight="bold" text-anchor="middle">V</text>
                                <line x1="70" y1="25" x2="90" y2="25" />
                            </svg>
                        </div>
                    </div>

                    <div class="reveal-card delay-2" id="rating-reveal" style="margin-top: 2rem;">
                        <div class="pre-reveal">
                            <i class="fa-solid fa-question reveal-icon" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                            <h3>What is a "Voltage Rating"?</h3>
                            <p style="color: var(--text-dim);">(Click to reveal)</p>
                        </div>
                        <div class="reveal-content text-left">
                            <div class="pedagogical-badge" style="color: var(--accent);"><i class="fa-solid fa-check"></i> Answer</div>
                            <p>Most components (like lamps) have a <strong>voltage rating</strong> (e.g., 3 V or 6 V). This tells us the <strong>maximum voltage</strong> that can be safely used without breaking the component.</p>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const revealCard = container.querySelector('#rating-reveal');
                const handler = () => revealCard.classList.add('revealed');
                revealCard.addEventListener('click', handler);
                return () => revealCard.removeEventListener('click', handler);
            }
        },

        // 3. Investigation (Explore) - Voltage in a Series Circuit
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Voltage in a Series Circuit</h2>
                    
                    <div class="grid-2 delay-1">
                        <div class="pedagogical-note note-write" style="margin: 0;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <p>In a series circuit, energy is shared. The voltages across each component <strong>add up</strong> to the voltage of the supply.</p>
                            <p style="margin-top: 1rem; text-align: center; font-size: 1.5rem; color: var(--warning);">$$V_{supply} = V_1 + V_2 + V_3$$</p>
                        </div>

                        <div class="pedagogical-note note-theory" style="margin: 0;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-list"></i> What happens if...</div>
                            <ul style="margin-left: 1.5rem;">
                                <li><strong>Add more components:</strong> Current decreases. Each component gets a smaller share of the voltage.</li>
                                <li style="margin-top: 0.5rem;"><strong>Add more cells:</strong> Supply voltage increases. Current increases. Voltage across each component increases.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="glass-card delay-2 text-center" style="margin-top: 2rem; padding: 1rem;">
                        <svg class="circuit-svg" viewBox="0 0 500 250">
                            <!-- Wires -->
                            <path d="M 100 50 L 400 50 L 400 180 L 100 180 Z" />
                            
                            <!-- Battery (12V) -->
                            <line x1="230" y1="30" x2="230" y2="70" /> <line x1="250" y1="40" x2="250" y2="60" stroke-width="6"/>
                            <line x1="260" y1="50" x2="270" y2="50" stroke-width="2" stroke-dasharray="2,2"/>
                            <line x1="280" y1="30" x2="280" y2="70" /> <line x1="300" y1="40" x2="300" y2="60" stroke-width="6"/>
                            <text x="265" y="25" class="circuit-text" fill="var(--warning)">12V Battery</text>
                            
                            <!-- Lamp 1 (Left) -->
                            <circle cx="200" cy="180" r="20" fill="var(--bg-panel)" /> 
                            <path d="M 186 166 L 214 194 M 214 166 L 186 194" />
                            
                            <!-- Lamp 2 (Right) -->
                            <circle cx="300" cy="180" r="20" fill="var(--bg-panel)" /> 
                            <path d="M 286 166 L 314 194 M 314 166 L 286 194" />
                            
                            <!-- Voltmeter 1 (Above Lamp 1) -->
                            <path d="M 160 180 L 160 120 L 240 120 L 240 180" stroke="var(--primary)"/>
                            <circle cx="200" cy="120" r="18" fill="var(--bg-panel)" stroke="var(--primary)"/> 
                            <text x="200" y="126" class="circuit-text" fill="var(--primary)">V</text>
                            <text x="200" y="95" class="circuit-text" fill="var(--accent)">6V</text>

                            <!-- Voltmeter 2 (Above Lamp 2) -->
                            <path d="M 260 180 L 260 120 L 340 120 L 340 180" stroke="var(--primary)"/>
                            <circle cx="300" cy="120" r="18" fill="var(--bg-panel)" stroke="var(--primary)"/> 
                            <text x="300" y="126" class="circuit-text" fill="var(--primary)">V</text>
                            <text x="300" y="95" class="circuit-text" fill="var(--accent)">6V</text>
                        </svg>
                        <p style="color: var(--text-dim); margin-top: 1rem;">Identical lamps share the 12V supply equally (6V + 6V = 12V).</p>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // 4. Investigation (Explore) - Voltage in a Parallel Circuit
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Voltage in a Parallel Circuit</h2>
                    
                    <div class="grid-2 delay-1">
                        <div class="pedagogical-note note-write" style="margin: 0;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <p>In a parallel circuit, the voltage across <strong>each branch</strong> is <strong>equal</strong> to the voltage of the supply.</p>
                            <p style="margin-top: 1rem; text-align: center; font-size: 1.5rem; color: var(--warning);">$$V_{supply} = V_{branch1} = V_{branch2}$$</p>
                        </div>

                        <div class="pedagogical-note note-theory" style="margin: 0;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-list"></i> What happens if...</div>
                            <ul style="margin-left: 1.5rem;">
                                <li><strong>Add more branches:</strong> More paths for current to flow. Total current from supply increases.</li>
                                <li style="margin-top: 0.5rem;"><strong>Add components to a branch:</strong> Makes it harder for current to flow in <em>that specific branch</em>.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="glass-card delay-2 text-center" style="margin-top: 2rem; padding: 1rem;">
                        <svg class="circuit-svg" viewBox="0 0 500 350" style="max-height: 300px;">
                            <!-- Battery (9V) -->
                            <line x1="230" y1="30" x2="230" y2="70" /> <line x1="250" y1="40" x2="250" y2="60" stroke-width="6"/>
                            <line x1="260" y1="50" x2="270" y2="50" stroke-width="2" stroke-dasharray="2,2"/>
                            <line x1="280" y1="30" x2="280" y2="70" /> <line x1="300" y1="40" x2="300" y2="60" stroke-width="6"/>
                            <text x="265" y="25" class="circuit-text" fill="var(--warning)">9V Battery</text>
                            
                            <!-- Main Loop to Branch 1 -->
                            <path d="M 230 50 L 150 50 L 150 160 L 350 160 L 350 50 L 300 50" />
                            
                            <!-- Lamp (Branch 1) -->
                            <circle cx="250" cy="160" r="20" fill="var(--bg-panel)"/> 
                            <path d="M 236 146 L 264 174 M 264 146 L 236 174" />
                            
                            <!-- Voltmeter 1 (Above Lamp) -->
                            <path d="M 190 160 L 190 100 L 310 100 L 310 160" stroke="var(--primary)"/>
                            <circle cx="250" cy="100" r="18" fill="var(--bg-panel)" stroke="var(--primary)"/> 
                            <text x="250" y="106" class="circuit-text" fill="var(--primary)">V</text>
                            <text x="250" y="75" class="circuit-text" fill="var(--accent)">9V</text>

                            <!-- Wires to Branch 2 -->
                            <path d="M 150 160 L 150 270 L 350 270 L 350 160" />
                            
                            <!-- Buzzer (Branch 2) -->
                            <path d="M 230 270 A 25 25 0 0 1 270 270 Z" fill="var(--bg-panel)"/>
                            <line x1="240" y1="270" x2="240" y2="290" /> <line x1="260" y1="270" x2="260" y2="290" />
                            
                            <!-- Voltmeter 2 (Below Buzzer) -->
                            <path d="M 190 270 L 190 320 L 310 320 L 310 270" stroke="var(--primary)"/>
                            <circle cx="250" cy="320" r="18" fill="var(--bg-panel)" stroke="var(--primary)"/> 
                            <text x="250" y="326" class="circuit-text" fill="var(--primary)">V</text>
                            <text x="250" y="348" class="circuit-text" fill="var(--accent)">9V</text>
                        </svg>
                        <p style="color: var(--text-dim); margin-top: 1rem;">Every branch gets the full 9V, even if the components are different!</p>
                    </div>
                </div>
            `,

    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        container.innerHTML = slide.template();
        
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    /* --- EVENT LISTENERS --- */
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    render();
</script>

</body>
</html>
