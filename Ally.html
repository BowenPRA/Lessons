<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Ms. Ally's Class</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@400;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .welcome-card {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            border: 8px solid #bae6fd;
            max-width: 90%;
            width: 500px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Bubblegum Sans', cursive;
            color: #0369a1;
            font-size: 3.5rem;
            margin-top: 1.5rem;
            line-height: 1;
        }

        /* Smiley Face Styling */
        .smiley-container {
            width: 150px;
            height: 150px;
            background: #fde047;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            border: 4px solid #ca8a04;
            box-shadow: inset -10px -10px 20px rgba(202, 138, 4, 0.3);
            animation: bounce 2s infinite ease-in-out;
        }

        .eye {
            width: 18px;
            height: 24px;
            background: #422006;
            border-radius: 50%;
            position: absolute;
            top: 45px;
            animation: blink 4s infinite;
        }

        .eye.left { left: 40px; }
        .eye.right { right: 40px; }

        .mouth {
            width: 80px;
            height: 40px;
            border-bottom: 8px solid #422006;
            border-radius: 50%;
            position: absolute;
            bottom: 30px;
            left: 35px;
        }

        .blush {
            width: 20px;
            height: 12px;
            background: #f87171;
            opacity: 0.4;
            border-radius: 50%;
            position: absolute;
            top: 75px;
        }

        .blush.left { left: 25px; }
        .blush.right { right: 25px; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        /* Decorative Elements */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 3px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="smiley-container">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="mouth"></div>
        </div>
        
        <h1>Welcome to<br>Ms. Ally's Class</h1>
        <p class="mt-4 text-sky-600 text-xl font-bold">We are so glad you're here!</p>
        
        <div class="mt-8">
            <span class="inline-block px-6 py-2 bg-sky-500 text-white rounded-full font-bold shadow-lg transform hover:scale-110 transition-transform cursor-default">
                Let's Learn Together! ✏️
            </span>
        </div>
    </div>

    <script>
        // Add some colorful floating squares in the background
        const colors = ['#f87171', '#60a5fa', '#4ade80', '#fbbf24', '#a78bfa'];
        for (let i = 0; i < 20; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = Math.random() * 100 + 'vh';
            confetti.style.opacity = Math.random();
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
