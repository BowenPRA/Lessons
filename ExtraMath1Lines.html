<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extra Math 1: Lines - Mr. Bowen's Class</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Formulas -->
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg-paper: #fdfbf7;       
            --bg-panel: #ffffff;       
            --primary: #2563eb;        
            --accent: #16a34a;         
            --warning: #ea580c;        
            --danger: #dc2626;         
            --cold: #0284c7;           
            --purple: #9333ea;
            --text-main: #334155;      
            --text-dim: #64748b;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            overflow: hidden;
            font-size: 16px;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-main); }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 0.5rem; }
        h2 { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); }

        strong { color: var(--text-main); font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
            background: #ffffff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .brand-pill {
            background: var(--purple);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 2px 2px 0px rgba(147, 51, 234, 0.3);
            white-space: nowrap;
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-image:
                linear-gradient(90deg, transparent 60px, rgba(147, 51, 234, 0.15) 60px, rgba(147, 51, 234, 0.15) 62px, transparent 62px),
                linear-gradient(rgba(37, 99, 235, 0.08) 1px, transparent 1px);
            background-size: 100% 100%, 100% 32px;
            background-attachment: local;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: #ffffff;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius);
            padding: clamp(1rem, 3vw, 2rem);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            height: 100%;
        }

        .pedagogical-note {
            padding: clamp(1rem, 3vw, 1.5rem);
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            background: #ffffff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            animation: slideIn 0.5s ease;
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
        }
        .pedagogical-note p, .pedagogical-note li, .pedagogical-note h3 {
            font-family: 'Kalam', cursive;
        }
        .pedagogical-badge {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        .note-task { border-color: var(--danger); background: #fffcf2;}
        .note-task .pedagogical-badge { color: var(--danger); }
        .note-theory { border-color: var(--purple); }
        .note-theory .pedagogical-badge { color: var(--purple); }
        .note-success { border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        .reveal-card {
            background: #ffffff;
            border: 3px dashed var(--primary);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
        }
        .reveal-card:hover, .reveal-card:focus { transform: translateY(-2px); box-shadow: 6px 6px 0px rgba(0,0,0,0.06); }
        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid rgba(0,0,0,0.05); }
        .reveal-card.revealed { border-style: solid; border-color: var(--accent); cursor: default; transform: none; box-shadow: 4px 4px 0px rgba(0,0,0,0.06); }
        .reveal-card.revealed .pre-reveal { display: none; }
        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 4px 4px 0px rgba(0,0,0,0.2); }
        .btn-action:active { transform: translateY(0); box-shadow: 1px 1px 0px rgba(0,0,0,0.2); }
        
        .btn-reveal {
            background: var(--bg-panel);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            margin-top: 0.5rem;
            width: 100%;
        }
        .btn-reveal:hover { background: var(--primary); color: white; }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .btn-nav:hover:not(:disabled) { background: var(--purple); color: white; border-color: var(--purple); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        .progress-container { flex: 1; margin: 0 1rem; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--primary)); transition: width 0.3s ease; }

        /* SVG Graph Styling */
        .math-graph { width: 100%; max-width: 400px; aspect-ratio: 1; background: #ffffff; border: 2px solid #e2e8f0; border-radius: 8px; margin: 0 auto; display: block; overflow: visible; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .grid-line { stroke: #e2e8f0; stroke-width: 1; }
        .axis { stroke: #334155; stroke-width: 2.5; }
        .axis-label { font-family: 'Outfit'; font-size: 6px; font-weight: bold; fill: #334155; }
        .curve { stroke: var(--primary); fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .point-dot { fill: var(--danger); stroke: white; stroke-width: 1.5; r: 4; }
        
        /* Animation classes */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }
        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }

        /* Drawing Animation for Lines */
        .draw-path {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
        }
        .draw-path.animate {
            animation: drawLine 1.5s ease-out forwards;
        }
        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        /* Responsive Utilities */
        @media (max-width: 1024px) {
            .slide-wrapper { padding-left: 60px; }
        }
        @media (max-width: 768px) {
            .slide-wrapper { padding: 1.5rem; }
            .viewport { background-image: none; background-color: var(--bg-paper); }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-shapes"></i> Cambridge Math</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;" class="header-subtitle">Extra Math 1</span>
        </div>
        <div style="font-family: 'Kalam', cursive; font-weight: 700; color: var(--purple); font-size: 1.2rem;">
            Mr. Bowen's Class
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    const renderMath = () => {
        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
            window.MathJax.typesetPromise().catch((err) => console.log('MathJax error:', err));
        }
    };

    // Helper to generate an SVG grid background
    const createGridLines = () => {
        let lines = '';
        for(let i = 10; i < 100; i += 10) {
            if(i !== 50) {
                lines += `<line x1="${i}" y1="0" x2="${i}" y2="100" class="grid-line" />`;
                lines += `<line x1="0" y1="${i}" x2="100" y2="${i}" class="grid-line" />`;
            }
        }
        return lines;
    };

    // Helper to generate a specific Quadrant 1 SVG grid (X: 0 to 5, Y: 0 to 10)
    const createQuadrant1Grid = () => {
        let lines = '';
        // Vertical lines (X grid)
        for(let i = 20; i <= 100; i += 20) {
            lines += `<line x1="${i}" y1="0" x2="${i}" y2="100" class="grid-line" />`;
            lines += `<text x="${i}" y="106" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">${i/20}</text>`;
        }
        // Horizontal lines (Y grid)
        for(let i = 0; i <= 90; i += 10) {
            lines += `<line x1="0" y1="${i}" x2="100" y2="${i}" class="grid-line" />`;
            if(i !== 100) lines += `<text x="-3" y="${i+1.5}" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">${(100-i)/10}</text>`;
        }
        return lines;
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 0: Title & Instructions
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-ruler-combined delay-1" style="font-size: 5rem; color: var(--purple); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: clamp(2.5rem, 6vw, 4rem);">Extra Math 1: Lines</h1>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 700px; margin: 3rem auto; text-align: left; transform: rotate(-1deg); background: rgba(22, 163, 74, 0.05);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Objective</div>
                        <p style="font-size: 1.6rem; font-weight: bold; color: var(--text-main); text-align: center;">
                            "I will learn how to build the exact equation of a line using only two points."
                        </p>
                    </div>

                    <div class="pedagogical-note note-task delay-3" style="max-width: 700px; margin: 2rem auto; text-align: left; transform: rotate(1deg);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-triangle-exclamation"></i> Instructions for Today</div>
                        <ul style="margin-left: 1rem; display: grid; gap: 1rem; list-style-type: none; padding: 0; margin-top: 0.5rem;">
                            <li style="font-size: 1.3rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>📝</span>
                                <span><strong>Get your grid paper out right now.</strong></span>
                            </li>
                            <li style="font-size: 1.3rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>✍️</span>
                                <span>You must write down notes and answer questions when directed to on these slides.</span>
                            </li>
                            <li style="font-size: 1.3rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>👨‍🏫</span>
                                <span>At the end, you will <strong>show your notes and answers to Mr. Bowen</strong> to get credit!</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // SLIDE 1: Coordinate Plane (Interactive)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">The Coordinate Plane</h2>
                    <p class="text-center delay-1" style="margin-bottom: 2rem;">Let's refresh our memory on the X and Y axes. <strong>Try clicking on the grid below to plot points!</strong></p>
                    
                    <div class="grid-2 delay-2" style="max-width: 1000px; margin: 0 auto; align-items: stretch;">
                        <div class="glass-card" style="text-align: center; padding: 1rem; display: flex; flex-direction: column; align-items: center;">
                            <svg class="math-graph" viewBox="0 0 100 100" id="interactive-plane" style="cursor: crosshair; touch-action: none;">
                                ${createGridLines()}
                                <!-- X Axis -->
                                <line x1="0" y1="50" x2="100" y2="50" class="axis"/>
                                <polygon points="100,50 96,48 96,52" fill="#334155" />
                                <text x="94" y="45" class="axis-label" font-size="8">x</text>
                                <!-- Y Axis -->
                                <line x1="50" y1="100" x2="50" y2="0" class="axis"/>
                                <polygon points="50,0 48,4 52,4" fill="#334155" />
                                <text x="54" y="6" class="axis-label" font-size="8">y</text>
                                
                                <!-- Number Labels -->
                                <text x="60" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">1</text>
                                <text x="70" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">2</text>
                                <text x="80" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">3</text>
                                <text x="90" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">4</text>
                                <text x="40" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">-1</text>
                                <text x="30" y="55" font-family="Outfit" font-size="4" text-anchor="middle" fill="var(--text-dim)">-2</text>
                                
                                <text x="46" y="41" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">1</text>
                                <text x="46" y="31" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">2</text>
                                <text x="46" y="21" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">3</text>
                                <text x="46" y="11" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">4</text>
                                <text x="46" y="61" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">-1</text>
                                <text x="46" y="71" font-family="Outfit" font-size="4" text-anchor="end" fill="var(--text-dim)">-2</text>
                            </svg>
                            <button class="btn-action" id="btn-clear-points" style="margin-top: 1rem; width: 100%; background: var(--text-dim);">
                                <i class="fa-solid fa-eraser"></i> Clear Points
                            </button>
                        </div>

                        <div class="pedagogical-note note-task" style="margin: 0; display: flex; flex-direction: column; justify-content: center;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pen"></i> Task 1: Plotting</div>
                            <p style="font-size: 1.3rem; margin-bottom: 1rem;">
                                On your grid paper, draw a neat X and Y axis.
                            </p>
                            <p style="font-size: 1.2rem; color: var(--text-dim); margin-bottom: 1rem;">
                                Remember: The <strong>X-axis</strong> goes left to right (horizontal). The <strong>Y-axis</strong> goes up and down (vertical).
                            </p>
                            <div style="background: rgba(220, 38, 38, 0.05); border: 2px dashed var(--danger); padding: 1rem; border-radius: 8px;">
                                <p style="font-size: 1.2rem; font-weight: bold; color: var(--danger); margin-bottom: 0.5rem;">Plot and label these 3 points in your notebook:</p>
                                <ul style="list-style-type: none; font-family: 'Outfit'; font-size: 1.4rem; font-weight: bold;">
                                    <li>A (2, 4)</li>
                                    <li>B (-3, 1)</li>
                                    <li>C (0, -4)</li>
                                </ul>
                                <p style="font-size: 1rem; color: var(--text-main); margin-top: 0.5rem; font-weight: normal;">(You can practice clicking them on the screen first!)</p>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                renderMath();
                const svg = container.querySelector('#interactive-plane');
                const clearBtn = container.querySelector('#btn-clear-points');
                const drawnPoints = [];
                
                const clickHandler = (e) => {
                    const pt = svg.createSVGPoint();
                    pt.x = e.clientX;
                    pt.y = e.clientY;
                    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                    
                    // Snap to the 10x10 grid lines
                    const snapX = Math.round(svgP.x / 10) * 10;
                    const snapY = Math.round(svgP.y / 10) * 10;

                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", snapX);
                    circle.setAttribute("cy", snapY);
                    circle.setAttribute("r", "2.5");
                    circle.setAttribute("fill", "var(--danger)");
                    circle.setAttribute("stroke", "white");
                    circle.setAttribute("stroke-width", "1");
                    svg.appendChild(circle);
                    drawnPoints.push(circle);
                };
                
                const clearHandler = () => {
                    drawnPoints.forEach(p => p.remove());
                    drawnPoints.length = 0;
                };

                svg.addEventListener('click', clickHandler);
                clearBtn.addEventListener('click', clearHandler);
                return () => {
                    svg.removeEventListener('click', clickHandler);
                    clearBtn.removeEventListener('click', clearHandler);
                };
            }
        },

        // SLIDE 2: Quadrants
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">The 4 Quadrants</h2>
                    <p class="text-center delay-1" style="margin-bottom: 2rem;">The axes divide our paper into 4 distinct zones.</p>
                    
                    <div class="grid-2 delay-2" style="max-width: 1000px; margin: 0 auto; align-items: stretch;">
                        
                        <div class="glass-card" style="text-align: center; padding: 1rem; position: relative;">
                            <svg class="math-graph" viewBox="0 0 100 100" style="background: transparent; border: none; box-shadow: none;">
                                <!-- Quadrant Backgrounds -->
                                <rect x="50" y="0" width="50" height="50" fill="rgba(37, 99, 235, 0.1)" />
                                <rect x="0" y="0" width="50" height="50" fill="rgba(234, 88, 12, 0.1)" />
                                <rect x="0" y="50" width="50" height="50" fill="rgba(220, 38, 38, 0.1)" />
                                <rect x="50" y="50" width="50" height="50" fill="rgba(22, 163, 74, 0.1)" />
                                
                                <!-- Axes -->
                                <line x1="0" y1="50" x2="100" y2="50" class="axis"/>
                                <line x1="50" y1="100" x2="50" y2="0" class="axis"/>
                                
                                <!-- Labels -->
                                <text x="75" y="25" font-family="Outfit" font-size="8" font-weight="bold" text-anchor="middle" fill="var(--primary)">I</text>
                                <text x="75" y="35" font-family="Outfit" font-size="5" text-anchor="middle" fill="var(--text-dim)">(+, +)</text>

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        container.innerHTML = slide.template();
        
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            if(document.activeElement.tagName === 'BUTTON' || document.activeElement.classList.contains('reveal-card')) return;
            e.preventDefault();
            changeSlide(1);
        }
        if (e.key === 'ArrowRight') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
