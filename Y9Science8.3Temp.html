    <style>

        /* Navigation Buttons */
        .btn-nav {

        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }

        /* Canvas/Simulation styling */
        canvas {

        input[type=range] {

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }

        /* Specific Diagram Blocks for Slide 4 */
        .sa-diagram { display: flex; gap: 2rem; align-items: center; justify-content: center; padding: 2rem 0; }

        .block-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .block-small { width: 36px; height: 36px; background: rgba(139, 92, 246, 0.3); border: 1px solid var(--primary); border-radius: 4px; }
        
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; gap: 1rem; }

        }
    </style>

<div class="app-shell">

        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 9 Science</div>

            10 March 2026

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->

<script>
    /* --- BOWEN ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Title & Objectives
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-fire-flame-curved delay-1" style="font-size: 4rem; color: var(--danger); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1">Temperature and the<br>Rate of Reaction</h1>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 600px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>
                        <ul style="margin-left: 1.5rem; display: grid; gap: 0.8rem;">
                            <li>Understand how temperature affects the rate of a chemical reaction.</li>
                            <li>Plan an investigation to test the effect of temperature safely.</li>
                        </ul>
                    </div>
                </div>
            `
        },
        
        // SLIDE 2: Hook / Getting Started
        {
            template: () => `
                <div class="anim-enter">
                    <h2>What is meant by rate of reaction?</h2>
                    
                    <div class="pedagogical-note note-task delay-1">
                        <div class="pedagogical-badge"><i class="fa-solid fa-comments"></i> Partner Discussion</div>
                        <p style="margin-bottom: 1rem;">1. Write your answers in your notebook.<br>2. Discuss your thoughts with the person next to you.</p>
                        
                        <div style="display: grid; gap: 1rem;">
                            <div style="border: 2px dashed rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 8px; background: rgba(0,0,0,0.2);">
                                <strong style="color: white; font-size: 1.2rem;">Q1: What is meant by the rate of reaction?</strong>
                            </div>
                            <div style="border: 2px dashed rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 8px; background: rgba(0,0,0,0.2);">
                                <strong style="color: white; font-size: 1.2rem;">Q2: How does the rate of reaction change as a reaction goes on?</strong>
                            </div>
                        </div>
                    </div>

                    <div class="reveal-card delay-2" id="hook-reveal" role="button" tabindex="0">
                        <div class="pre-reveal">
                            <i class="fa-solid fa-eye" style="font-size: 2rem; margin-bottom: 1rem; color: var(--primary);"></i>
                            <h3>Click to reveal answer</h3>
                        </div>
                        <div class="reveal-content text-left">
                            <h3 style="color: var(--accent);"><i class="fa-solid fa-check-circle"></i> The Answer</h3>
                            <p style="margin-bottom: 1rem;"><strong>Rate of Reaction</strong> is a measure of how quickly the reactants are used up, or how quickly the products are formed.</p>
                            <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                                $$ Rate = \\frac{\\text{Change in Volume or Mass}}{\\text{Time taken}} $$
                            </div>
                            <p style="margin-top: 1rem;">Reactions usually start fast, slow down as reactants are used up, and eventually stop when a reactant runs out.</p>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const revealCard = container.querySelector('#hook-reveal');
                const handler = () => { revealCard.classList.add('revealed'); };
                revealCard.addEventListener('click', handler);
                
                // Trigger MathJax render for this slide
                if(window.MathJax) MathJax.typesetPromise([container]);

                return () => revealCard.removeEventListener('click', handler);
            }
        },

        // SLIDE 3: The 3 Main Factors
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Changing the Rate</h2>
                    <p class="text-center delay-1" style="margin-bottom: 2rem;">There are several ways we can speed up or slow down a reaction.</p>
                    
                    <div class="pedagogical-note note-write delay-2" style="max-width: 700px; margin: 0 auto;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Copy to Notebook</div>
                        <h3 style="color: var(--text-light); margin-bottom: 1rem;">The 3 Main Factors that affect Reaction Rate:</h3>
                        
                        <div style="display: grid; gap: 1.5rem;">
                            <div style="display: flex; align-items: center; gap: 1rem; background: var(--bg-deep); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                                <i class="fa-solid fa-flask" style="font-size: 2rem; color: var(--primary); width: 40px; text-align: center;"></i>
                                <div>
                                    <strong style="font-size: 1.2rem;">1. Concentration</strong>
                                    <p style="font-size: 0.9rem; margin: 0;">How crowded the particles are in a solution.</p>
                                </div>
                            </div>
                            
                            <div style="display: flex; align-items: center; gap: 1rem; background: var(--bg-deep); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                                <i class="fa-solid fa-cubes" style="font-size: 2rem; color: var(--accent); width: 40px; text-align: center;"></i>
                                <div>
                                    <strong style="font-size: 1.2rem;">2. Surface Area</strong>
                                    <p style="font-size: 0.9rem; margin: 0;">How much solid is exposed to the liquid/gas.</p>
                                </div>
                            </div>
                            
                            <div style="display: flex; align-items: center; gap: 1rem; background: var(--bg-deep); padding: 1rem; border-radius: 8px; border: 1px solid var(--danger);">
                                <i class="fa-solid fa-temperature-arrow-up" style="font-size: 2rem; color: var(--danger); width: 40px; text-align: center;"></i>
                                <div>
                                    <strong style="font-size: 1.2rem; color: var(--danger);">3. Temperature</strong>
                                    <p style="font-size: 0.9rem; margin: 0;">How much kinetic energy the particles have.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 4: Surface Area Review
        {
            template: () => `
                <div class="anim-enter grid-2">
                    <div>
                        <h2>Focus on Surface Area</h2>
                        
                        <div class="pedagogical-note note-write delay-1">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Note</div>
                            <p>When a solid reacts with a liquid or gas, the reaction only happens on the <strong>surface</strong> of the solid.</p>
                            <p style="margin-top: 1rem;">If we break the solid into smaller pieces (like <strong>powders</strong> instead of lumps), we <strong>increase the surface area</strong>.</p>
                        </div>
                        
                        <div class="glass-card delay-2">
                            <h3 style="margin-bottom:0;"><i class="fa-solid fa-bolt"></i> Powders vs. Solids</h3>
                            <p style="color: var(--text-dim); margin-top: 0.5rem;">Powders have many more particles exposed to the other reactant than solid lumps do. <br><br><strong>More exposed particles = More frequent successful collisions = Faster reaction.</strong></p>
                        </div>
                    </div>
                    
                    <div class="delay-3 text-center">
                        <div class="glass-card" style="padding: 2rem 1rem;">
                            <div class="sa-diagram" style="padding: 0; gap: 1rem;">
                                <div style="text-align: center; flex: 1;">
                                    <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                                        <div class="block-large">Solid Lump</div>
                                    </div>
                                    <span style="background: rgba(239, 68, 68, 0.2); color: var(--danger); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: bold;">Low Surface Area</span>
                                </div>
                                <i class="fa-solid fa-arrow-right" style="font-size: 2rem; color: var(--text-dim);"></i>
                                <div style="text-align: center; flex: 1;">
                                    <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                                        <div class="block-grid">
                                            <div class="block-small"></div><div class="block-small"></div><div class="block-small"></div>
                                            <div class="block-small"></div><div class="block-small"></div><div class="block-small"></div>
                                            <div class="block-small"></div><div class="block-small"></div><div class="block-small"></div>
                                        </div>
                                    </div>
                                    <span style="background: rgba(16, 185, 129, 0.2); color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.85rem; font-weight: bold;">High Surface Area</span>
                                </div>
                            </div>
                            <p style="margin-top: 1.5rem; font-size: 0.9rem; color: white;">The inside particles of the lump cannot react until the outside particles are used up. In a powder, almost all particles can react immediately!</p>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 5: Temperature Simulation (Mandatory Interactive)
        {
            template: () => `
                <div class="anim-enter">
                    <h2>Explaining the Effect of Temperature</h2>
                    
                    <div class="grid-2">
                        <div class="pedagogical-note note-theory delay-1">
                            <div class="pedagogical-badge"><i class="fa-solid fa-magnifying-glass"></i> Particle Theory</div>
                            <p>Particles move all the time. When the temperature of the reaction is increased:</p>
                            <ul style="margin-top: 1rem; margin-left: 1.5rem; color: white;">
                                <li>The particles move faster (more kinetic energy).</li>
                                <li>They collide <strong>more often</strong>.</li>
                                <li>They collide with <strong>more energy</strong>.</li>
                            </ul>
                            <p style="margin-top: 1rem; font-weight: bold; color: var(--danger);">Result: The higher the temperature, the faster the rate of reaction.</p>
                        </div>

                        <div class="glass-card delay-2 text-center">
                            <h3><i class="fa-solid fa-flask"></i> Virtual Lab</h3>
                            <canvas id="particle-sim" width="400" height="200"></canvas>
                            
                            <div style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                                <i class="fa-solid fa-snowflake" style="color: var(--accent);"></i>
                                <input type="range" id="temp-slider" min="1" max="10" value="2">
                                <i class="fa-solid fa-fire" style="color: var(--danger);"></i>
                            </div>
                            <p id="temp-readout" style="margin-top: 0.5rem; font-weight: bold;">Temp: 20°C</p>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const canvas = container.querySelector('#particle-sim');
                const ctx = canvas.getContext('2d');
                const slider = container.querySelector('#temp-slider');
                const readout = container.querySelector('#temp-readout');
                
                let particles = [];
                // Create particles
                for(let i=0; i<30; i++) {
                    particles.push({
                        x: Math.random() * (canvas.width - 20) + 10,
                        y: Math.random() * (canvas.height - 20) + 10,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2
                    });
                }

                let rafId;

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    let speedMult = parseFloat(slider.value) * 0.8;
                    readout.innerText = `Temp: ${parseFloat(slider.value) * 10}°C`;
                    
                    // Update & Draw
                    particles.forEach(p => {
                        p.x += p.vx * speedMult;
                        p.y += p.vy * speedMult;
                        
                        // Bounce off walls
                        if(p.x < 5 || p.x > canvas.width - 5) p.vx *= -1;
                        if(p.y < 5 || p.y > canvas.height - 5) p.vy *= -1;
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                        
                        // Color changes based on heat
                        if(slider.value > 7) {
                            ctx.fillStyle = '#ef4444'; // Red
                            // Add 'energy trails' for high heat
                            ctx.shadowBlur = 10;
                            ctx.shadowColor = '#ef4444';
                        } else if (slider.value > 4) {
                            ctx.fillStyle = '#f59e0b'; // Orange
                            ctx.shadowBlur = 5;
                            ctx.shadowColor = '#f59e0b';
                        } else {
                            ctx.fillStyle = '#3b82f6'; // Blue
                            ctx.shadowBlur = 0;
                        }
                        
                        ctx.fill();
                    });
                    
                    rafId = requestAnimationFrame(draw);
                }
                
                draw();

                return () => {
                    cancelAnimationFrame(rafId);
                };
            }
        },
        
        // SLIDE 6: Video Embed (Mandatory per Bible) + Context setup
        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2>🎥 Effect of Temperature on Rate</h2>
                    <p style="margin-bottom: 2rem;">Watch how temperature affects the speed of the reaction.</p>
                    
                    <div class="glass-card delay-1" style="max-width: 800px; margin: 0 auto; padding: 1rem;">
                        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px;">
                            <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
                                    src="https://www.youtube.com/embed/JK7yPzO9POU" 
                                    title="Rates of Reaction" frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
                            </iframe>
                        </div>

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        // Execute cleanup from previous slide if it exists
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML
        container.innerHTML = slide.template();
        
        // Execute script and store cleanup
        if (slide.script) {
            // slight delay to ensure DOM is ready
            setTimeout(() => {
                state.cleanupFn = slide.script(container);
            }, 50);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
</script>
