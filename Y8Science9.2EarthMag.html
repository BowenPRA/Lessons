<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9.2 Earth's Magnetism - Year 8 Science</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (BOWEN ENGINE) --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #8b5cf6;        
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #10b981;         
            --warning: #f59e0b;        
            --danger: #ef4444;         
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            /* Premium Grid Background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Crucial: Anchors to top to prevent cutoffs on TV */
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; /* Allow full smooth scrolling within the slide */
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #c4b5fd; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        p, li { line-height: 1.6; margin-bottom: 1rem; font-size: 1.3rem; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-nav {
            width: 56px; height: 56px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-light);
            font-size: 1.4rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            color: white;
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: linear-gradient(135deg, #7c3aed, #5b21b6); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.4); }

        /* Progress Bar */
        .progress-container { flex: 1; margin: 0 3rem; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #a78bfa); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow); }

        /* --- SIGNPOSTING (PEDAGOGICAL NOTES) --- */
        .pedagogical-note {
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 6px solid;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .pedagogical-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1.5px;
        }

        .note-write { border-left-color: #3b82f6; background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-write .pedagogical-badge { color: #60a5fa; }

        .note-task { border-left-color: var(--warning); background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-task .pedagogical-badge { color: #fbbf24; }

        .note-theory { border-left-color: var(--primary); background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-theory .pedagogical-badge { color: #a78bfa; }

        .note-success { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-success .pedagogical-badge { color: #34d399; }
        
        .note-homework { border-left-color: #f43f5e; background: linear-gradient(90deg, rgba(244, 63, 94, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-homework .pedagogical-badge { color: #fb7185; }

        /* --- INTERACTIVE TOOLS --- */
        
        /* Reveal Card */
        .reveal-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .reveal-card:hover { border-color: var(--primary); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.2); transform: translateY(-5px); }
        .reveal-card .reveal-content { display: none; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem; }
        .reveal-card.revealed .reveal-content { display: block; animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal-card.revealed .pre-reveal { opacity: 0.5; transform: scale(0.95); transition: all 0.4s ease; }

        /* Summative Quiz */
        .quiz-block {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .quiz-question { font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; color: #cbd5e1; }
        .quiz-option {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateX(5px); }
        .quiz-option.correct { border-color: var(--accent); background: rgba(16, 185, 129, 0.15); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .quiz-option.incorrect { border-color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .quiz-feedback { margin-top: 1rem; font-size: 1.3rem; font-weight: bold; min-height: 30px; display: none; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.4)); } 50% { filter: drop-shadow(0 0 25px rgba(139, 92, 246, 0.8)); } 100% { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.4)); } }
        
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }

        .hidden { display: none !important; }
        .text-center { text-align: center; }

    </style>
</head>
<body>

<!-- GLOBAL SVG DEFS FOR HIGH-END GRAPHICS -->
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <defs>
        <!-- Earth Gradients -->
        <radialGradient id="earth-ocean" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="70%" stop-color="#0284c7" />
            <stop offset="100%" stop-color="#0f172a" />
        </radialGradient>
        <radialGradient id="earth-land" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="70%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#064e3b" />
        </radialGradient>
        
        <!-- Core Gradients -->
        <radialGradient id="core-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fef08a" />
            <stop offset="70%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#b45309" />
        </radialGradient>
        <radialGradient id="core-outer" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f97316" />
            <stop offset="80%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#7f1d1d" />
        </radialGradient>

        <!-- Material Gradients -->
        <linearGradient id="metal-red" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fca5a5" />
            <stop offset="15%" stop-color="#ef4444" />
            <stop offset="50%" stop-color="#b91c1c" />
            <stop offset="85%" stop-color="#991b1b" />
            <stop offset="100%" stop-color="#450a0a" />
        </linearGradient>
        <linearGradient id="metal-blue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#93c5fd" />
            <stop offset="15%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#1d4ed8" />
            <stop offset="85%" stop-color="#1e3a8a" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
        <linearGradient id="rock-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#475569" />
            <stop offset="50%" stop-color="#1e293b" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>
        <linearGradient id="marble" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="50%" stop-color="#e2e8f0" />
            <stop offset="100%" stop-color="#94a3b8" />
        </linearGradient>
        
        <!-- Glow Filters -->
        <filter id="field-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="strong-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="drop-shadow-heavy" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="10" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>
</svg>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 8 Science</div>
            <span style="font-weight: 700; color: #cbd5e1; font-size: 1.2rem; letter-spacing: 0.5px;">9.2 Earth's Magnetism</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);">
            10 April 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // --- THE BOWEN ENGINE ---

    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            // Auto scroll to top of slide on render
            document.querySelector('.slide-wrapper').scrollTo({ top: 0, behavior: 'auto' });

            if (window.MathJax) {
                MathJax.typesetPromise([container]);
            }
        }
    };

    // --- LESSON CONTENT ---

    const lessonSlides = [
        // Slide 1: Objective
        {
            template: () => `
                <div class="anim-enter text-center">
                    <div style="position: relative; display: inline-block; margin-bottom: 2rem; animation: pulseGlow 4s infinite;">
                        <svg viewBox="0 0 300 300" width="250" height="250" style="filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.3));">
                            <!-- Field Lines Behind -->
                            <g fill="none" stroke="#8b5cf6" stroke-width="4" filter="url(#strong-glow)" stroke-dasharray="15 10" opacity="0.8">
                                <path d="M 150 30 C 350 30, 350 270, 150 270">
                                    <animate attributeName="stroke-dashoffset" from="25" to="0" dur="1.5s" repeatCount="indefinite" />
                                </path>
                                <path d="M 150 30 C -50 30, -50 270, 150 270">
                                    <animate attributeName="stroke-dashoffset" from="25" to="0" dur="1.5s" repeatCount="indefinite" />
                                </path>
                                <path d="M 150 10 C 450 10, 450 290, 150 290" opacity="0.4">
                                    <animate attributeName="stroke-dashoffset" from="25" to="0" dur="2s" repeatCount="indefinite" />
                                </path>
                                <path d="M 150 10 C -150 10, -150 290, 150 290" opacity="0.4">
                                    <animate attributeName="stroke-dashoffset" from="25" to="0" dur="2s" repeatCount="indefinite" />
                                </path>
                            </g>
                            
                            <!-- Premium 3D Earth -->
                            <circle cx="150" cy="150" r="90" fill="url(#earth-ocean)" filter="url(#drop-shadow-heavy)"/>
                            <!-- Glowing Atmosphere -->
                            <circle cx="150" cy="150" r="95" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4" filter="url(#field-glow)"/>
                            <!-- Abstract Continents -->
                            <path d="M 90 110 Q 130 70 170 110 T 200 150 Q 210 190 160 210 T 90 180 Z" fill="url(#earth-land)" opacity="0.95"/>
                            <path d="M 170 80 Q 190 70 210 100 T 190 120 Z" fill="url(#earth-land)" opacity="0.95"/>
                        </svg>
                    </div>
                    <h1>9.2 Earth's Magnetism</h1>
                    
                    <div class="pedagogical-note note-success delay-1" style="max-width: 850px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objective</div>
                        <p style="font-size: 2.2rem; font-weight: 800; line-height: 1.3; margin: 0; color: white;">
                            We will learn why the Earth acts like a giant magnet.
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: Etymology Hook (Magnetite)
        {
            template: () => `
                <div class="anim-enter">
                    <div class="pedagogical-note note-theory" style="text-align: center; margin-bottom: 3rem;">
                        <h2 style="margin: 0; color: #c4b5fd;">"Every class is an English class!"</h2>
                    </div>
                    
                    <div class="grid-2" style="align-items: stretch;">
                        <div class="delay-1">
                            <div class="reveal-card" id="etymology-reveal" tabindex="0" style="height: 100%; display: flex; flex-direction: column; justify-content: center;">
                                <div class="pre-reveal">
                                    <i class="fa-solid fa-book-open-reader" style="font-size: 5rem; color: var(--text-dim); margin-bottom: 1rem;"></i>
                                    <h3 style="font-size: 1.8rem;">Where does the word "Magnet" come from?</h3>
                                    <p style="color: var(--warning); margin-top: 1rem; font-weight: bold;">Discuss with your partner & click to reveal!</p>
                                </div>
                                <div class="reveal-content">
                                    <h3 style="color: var(--accent); font-size: 2.2rem;">Ancient Greece!</h3>
                                    <p style="text-align: left;">
                                        Over 2,000 years ago, the Greeks discovered a type of rock that could naturally attract iron.
                                    </p>
                                    <p style="text-align: left; color: #c4b5fd;">
                                        This rock was called <strong>magnetite</strong>. It was found in a place called <strong>Magnesia</strong> (in modern-day Turkey). The word "magnet" comes directly from the name of this place!
                                    </p>
                                    <p style="text-align: left; font-size: 1.1rem; color: var(--text-dim); margin-top: 1.5rem; font-style: italic;">
                                        *Pieces of magnetite are also historically known as "lodestones."
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Stunning 3D Magnetite SVG -->
                        <div class="glass-card text-center delay-2" style="height: 100%; display: flex; flex-direction: column; justify-content: center;">
                            <svg viewBox="0 0 300 300" width="100%" height="250" style="filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));">
                                <!-- Glowing Aura -->
                                <circle cx="150" cy="150" r="100" fill="rgba(139, 92, 246, 0.1)" filter="url(#strong-glow)"/>
                                
                                <!-- Lodestone Rock Base -->
                                <path d="M 100 80 L 180 60 L 230 120 L 210 200 L 140 240 L 70 180 Z" fill="url(#rock-dark)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                                <!-- 3D Facets of the rock -->

                    const handleQuiz = (e) => {
                        options.forEach(opt => {
                            opt.classList.remove('correct', 'incorrect');
                            opt.style.pointerEvents = 'none'; // Lock after answer
                        });

                        const selected = e.currentTarget;
                        const isCorrect = selected.getAttribute('data-correct') === 'true';
                        
                        feedback.style.display = 'block';

                        if (isCorrect) {
                            selected.classList.add('correct');
                            feedback.innerHTML = '<span style="color: var(--accent);"><i class="fa-solid fa-check-circle"></i> Correct! Excellent job.</span>';
                        } else {
                            selected.classList.add('incorrect');
                            // Highlight correct answer

                            feedback.innerHTML = '<span style="color: var(--danger);"><i class="fa-solid fa-times-circle"></i> Incorrect. Review the correct answer highlighted.</span>';
                        }
                    };

                    options.forEach(opt => {
                        opt.addEventListener('click', handleQuiz);
                        handlers.push({ element: opt, handler: handleQuiz });
                    });
                });

                return () => {
                    handlers.forEach(({element, handler}) => {
                        element.removeEventListener('click', handler);
                    });
                };
            }
        },
