<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8.2 Endothermic Reactions - Year 8 Science</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Equations -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Cambridge Bible Standard) --- */
        :root {
            --bg-deep: #0f172a;        /* Deep Slate */
            --bg-panel: #1e293b;       /* Secondary Background */
            --primary: #8b5cf6;        /* Chemical Purple */
            --accent: #10b981;         /* Success/Acid Green */
            --warning: #f59e0b;        /* Hazard Orange */
            --danger: #ef4444;         /* Heat Red */
            --cold: #0ea5e9;           /* Cold Blue (Added for Endothermic) */
            --text-light: #f1f5f9;     /* Main Text */
            --text-dim: #94a3b8;       /* Subtitles */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--text-light); }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.15rem; line-height: 1.6; color: var(--text-dim); }

        strong { color: var(--text-light); }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--cold), var(--primary));
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.4);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* Signposting System (Pedagogical Framework) */
        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            animation: slideIn 0.5s ease;
        }
        .pedagogical-badge {
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        
        .note-task { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); }
        .note-task .pedagogical-badge { color: var(--warning); }
        
        .note-theory { background: rgba(14, 165, 233, 0.1); border-color: var(--cold); }
        .note-theory .pedagogical-badge { color: var(--cold); }
        
        .note-success { background: rgba(16, 185, 129, 0.1); border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        /* Reveal Card */
        .reveal-card {
            background: var(--bg-panel);
            border: 2px dashed var(--cold);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .reveal-card:hover { background: rgba(14, 165, 233, 0.1); }
        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .reveal-card.revealed { border-style: solid; }
        .reveal-card.revealed .pre-reveal { display: none; }
        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }

        /* Quiz Options */
        .quiz-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.1); }
        .quiz-option.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--accent); color: white; }
        .quiz-option.incorrect { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--bg-panel);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Action Buttons */
        .btn-action {
            background: var(--cold);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #0284c7; transform: translateY(-2px); }
        .btn-action:disabled { background: var(--text-dim); cursor: not-allowed; transform: none; }

        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--cold)); transition: width 0.3s ease; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }
        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }
        .delay-4 { animation: slideIn 0.6s ease-out 0.8s both; }

        /* Target Interactive Specifics */
        .archery-target {
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 50%;
            border: 4px solid transparent;
        }
        .archery-target:hover { transform: scale(1.05); }
        .archery-target.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-snowflake"></i> Year 8 Science</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 0.9rem;">8.2 Endothermic Reactions</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; color: var(--cold);">
            10 March 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- BOWEN ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Title & Objectives
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-temperature-arrow-down delay-1" style="font-size: 4rem; color: var(--cold); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1">Endothermic Reactions</h1>
                    <p class="delay-1" style="font-size: 1.2rem; color: var(--text-dim);">When chemical reactions bring the chill.</p>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 650px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>
                        <ul style="margin-left: 1rem; display: grid; gap: 1rem; list-style-type: none; padding: 0; margin-top: 0.5rem;">
                            <li style="font-size: 1.2rem; display: flex; align-items: flex-start; gap: 10px;">
                                <span>🧊</span> 
                                <span style="color: white; font-weight: 500;">Know what an endothermic reaction is.</span>
                            </li>
                            <li style="font-size: 1.2rem; display: flex; align-items: flex-start; gap: 10px;">
                                <span>🧪</span> 
                                <span style="color: white; font-weight: 500;">Tell the difference between a chemical reaction and a physical process.</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `
        },

        // SLIDE 2: Starter - Scientific Skills (Accuracy vs Precision)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Getting Started: Scientific Measurements</h2>
                    <p class="text-center delay-1" style="margin-bottom: 2rem;">In chemistry, we must be both <strong>accurate</strong> and <strong>precise</strong> when measuring temperature.</p>
                    
                    <div class="glass-card delay-2 text-center" style="max-width: 900px; margin: 0 auto;">
                        <h3 style="color: white; margin-bottom: 1.5rem;">Click the target that matches the description below!</h3>
                        
                        <div class="grid-3" style="margin-bottom: 2rem;">
                            <!-- Target A -->
                            <div class="archery-target" id="target-a" data-type="accurate-not-precise">
                                <svg width="150" height="150" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="white" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="30" fill="#3b82f6" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="15" fill="#ef4444" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="5" fill="#facc15" stroke="#333" stroke-width="1"/>
                                    <!-- Arrows spread around center -->
                                    <circle cx="45" cy="40" r="3" fill="#111"/> <line x1="45" y1="40" x2="35" y2="30" stroke="#111" stroke-width="2"/>
                                    <circle cx="60" cy="55" r="3" fill="#111"/> <line x1="60" y1="55" x2="70" y2="65" stroke="#111" stroke-width="2"/>
                                    <circle cx="40" cy="60" r="3" fill="#111"/> <line x1="40" y1="60" x2="30" y2="70" stroke="#111" stroke-width="2"/>
                                </svg>
                                <p style="margin-top: 0.5rem; font-weight: bold;">Archer A</p>
                            </div>

                            <!-- Target B -->
                            <div class="archery-target" id="target-b" data-type="accurate-and-precise">
                                <svg width="150" height="150" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="white" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="30" fill="#3b82f6" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="15" fill="#ef4444" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="5" fill="#facc15" stroke="#333" stroke-width="1"/>
                                    <!-- Arrows tightly clustered in center -->
                                    <circle cx="52" cy="48" r="3" fill="#111"/> <line x1="52" y1="48" x2="62" y2="38" stroke="#111" stroke-width="2"/>
                                    <circle cx="48" cy="52" r="3" fill="#111"/> <line x1="48" y1="52" x2="38" y2="62" stroke="#111" stroke-width="2"/>
                                    <circle cx="49" cy="49" r="3" fill="#111"/> <line x1="49" y1="49" x2="39" y2="39" stroke="#111" stroke-width="2"/>
                                </svg>
                                <p style="margin-top: 0.5rem; font-weight: bold;">Archer B</p>
                            </div>

                            <!-- Target C -->
                            <div class="archery-target" id="target-c" data-type="precise-not-accurate">
                                <svg width="150" height="150" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="white" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="30" fill="#3b82f6" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="15" fill="#ef4444" stroke="#333" stroke-width="2"/>
                                    <circle cx="50" cy="50" r="5" fill="#facc15" stroke="#333" stroke-width="1"/>
                                    <!-- Arrows tightly clustered top left -->
                                    <circle cx="20" cy="30" r="3" fill="#111"/> <line x1="20" y1="30" x2="10" y2="20" stroke="#111" stroke-width="2"/>
                                    <circle cx="18" cy="35" r="3" fill="#111"/> <line x1="18" y1="35" x2="8" y2="25" stroke="#111" stroke-width="2"/>
                                    <circle cx="25" cy="28" r="3" fill="#111"/> <line x1="25" y1="28" x2="15" y2="18" stroke="#111" stroke-width="2"/>
                                </svg>
                                <p style="margin-top: 0.5rem; font-weight: bold;">Archer C</p>
                            </div>
                        </div>
                        
                        <div id="target-question" style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; border: 1px solid var(--warning);">
                            <p style="font-size: 1.2rem; color: white;">Which archer is <strong>precise</strong> but <strong>not accurate</strong>?</p>
                        </div>
                        <div id="target-feedback" style="margin-top: 1rem; font-weight: bold; min-height: 24px;"></div>
                    </div>
                </div>
            `,
            script: (container) => {
                const targets = container.querySelectorAll('.archery-target');
                const feedback = container.querySelector('#target-feedback');
                const questionBox = container.querySelector('#target-question p');
                
                let currentQuestion = 1;
                const handlers = [];

                targets.forEach(target => {
                    const handler = () => {
                        targets.forEach(t => t.classList.remove('selected'));
                        target.classList.add('selected');
                        
                        const type = target.dataset.type;
                        
                        if (currentQuestion === 1) {
                            if (type === 'precise-not-accurate') {
                                feedback.innerHTML = '<span style="color: var(--accent);"><i class="fa-solid fa-check"></i> Correct! Archer C is the right choice.</span>';
                                setTimeout(() => {
                                    currentQuestion = 2;
                                    questionBox.innerHTML = 'Which archer is <strong>both accurate and precise</strong>?';
                                    feedback.innerHTML = '';
                                    target.classList.remove('selected');
                                }, 2500);
                            } else {
                                feedback.innerHTML = '<span style="color: var(--danger);"><i class="fa-solid fa-xmark"></i> Not quite. Try again.</span>';
                            }
                        } else if (currentQuestion === 2) {
                            if (type === 'accurate-and-precise') {
                                feedback.innerHTML = '<span style="color: var(--accent);"><i class="fa-solid fa-check"></i> Correct! Archer B is the right choice.</span>';
                            } else {
                                feedback.innerHTML = '<span style="color: var(--danger);"><i class="fa-solid fa-xmark"></i> Not quite. Try again.</span>';
                            }
                        }
                    };
                    handlers.push({ el: target, fn: handler });
                    target.addEventListener('click', handler);
                });

                return () => {
                    handlers.forEach(h => h.el.removeEventListener('click', h.fn));
                };
            }
        },

        // SLIDE 3: Accuracy vs Precision Definitions
        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2>Accuracy vs. Precision</h2>
                    <p class="delay-1" style="margin-bottom: 2rem;">Let's get these definitions in our notebooks.</p>
                    
                    <div class="grid-2 text-left delay-2" style="max-width: 900px; margin: 0 auto; align-items: stretch;">
                        <div class="pedagogical-note note-write" style="margin: 0; height: 100%;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <h3 style="color: white; margin-bottom: 0.5rem; font-size: 1.8rem;">🎯 Accurate</h3>
                            <p style="font-size: 1.15rem; color: white;">A measurement that is very close to the <strong>true</strong> or <strong>correct</strong> value.</p>
                            <p style="font-size: 0.95rem; color: var(--text-dim); margin-top: 1.5rem;"><em>(Like hitting the bullseye!)</em></p>
                        </div>
                        
                        <div class="pedagogical-note note-write" style="margin: 0; height: 100%;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <h3 style="color: white; margin-bottom: 0.5rem; font-size: 1.8rem;">📏 Precise</h3>
                            <p style="font-size: 1.15rem; color: white;">Measurements that are very <strong>close to each other</strong> when repeated.</p>
                            <p style="font-size: 0.95rem; color: var(--text-dim); margin-top: 1.5rem;"><em>(Like hitting the exact same spot over and over, even if it's not the center.)</em></p>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 4: Defining Endothermic
        {
            template: () => `
                <div class="anim-enter">
                    <h2>What is an Endothermic Reaction?</h2>
                    
                    <div class="grid-2">
                        <div class="delay-1">
                            <div class="pedagogical-note note-write">
                                <div class="pedagogical-badge"><i class="fa-solid fa-book"></i> Key Definition</div>
                                <p style="color: white; font-size: 1.2rem; margin-bottom: 0.5rem;"><strong>Endothermic Reaction:</strong></p>
                                <p>A chemical reaction that <strong>absorbs thermal energy</strong> from its surroundings and changes it into <strong>chemical energy</strong> stored in the new bonds.</p>
                            </div>
                            
                            <div class="pedagogical-note note-theory delay-2">
                                <div class="pedagogical-badge"><i class="fa-solid fa-temperature-half"></i> The Result</div>
                                <p>Because heat is taken <em>away</em> from the surroundings to make the reaction happen, the temperature of the surroundings <strong>drops</strong>.</p>
                                <p style="margin-top: 0.5rem; font-weight: bold; color: var(--cold);">It feels cold!</p>
                            </div>
                        </div>
                        
                        <div class="glass-card delay-3 text-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <h3 style="color: var(--warning);"><i class="fa-solid fa-code-compare"></i> Quick Recap</h3>
                            <p style="margin-bottom: 1.5rem;">Remember the opposite from last lesson?</p>
                            
                            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 1.5rem; border-radius: 8px; width: 100%;">
                                <p style="color: var(--danger); font-weight: bold; font-size: 1.2rem; margin-bottom: 0.5rem;">Exothermic Reaction</p>
                                <p>Gives <strong>out</strong> thermal energy.</p>
                                <p>Surroundings get <strong>hotter</strong>.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 5: What is "Cold"? (Added per user request)
        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2>What is "Cold"?</h2>
                    <p class="delay-1" style="margin-bottom: 2rem;">When you touch an ice pack, why does your hand feel cold?</p>
                    
                    <div class="grid-2 delay-2">
                        <div class="glass-card text-left" style="border-top: 4px solid var(--cold);">
                            <h3 style="color: var(--cold);"><i class="fa-solid fa-snowflake"></i> The Science of Cold</h3>
                            <p>In science, <strong>"cold" is not an actual thing</strong> or substance.</p>
                            <p style="margin-top: 1rem;">Cold is simply the <strong>absence of heat</strong> (thermal energy).</p>
                            <p style="margin-top: 1rem;">When something feels cold to you, it means <strong>heat is moving away from your body</strong> into the object.</p>
                        </div>
                        
                        <div class="pedagogical-note note-write text-left" style="margin: 0; display: flex; flex-direction: column; justify-content: center;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <p style="font-size: 1.2rem; color: white;"><strong>Rule of Thermal Energy:</strong></p>
                            <p style="margin-top: 0.5rem;">Thermal energy always flows from a <strong>warmer</strong> object to a <strong>cooler</strong> object.</p>

                const canvas = container.querySelector('#bubble-canvas');
                const ctx = canvas.getContext('2d');
                
                let isReacting = false;
                let particles = [];
                let rafId;

                const startReaction = () => {
                    if(isReacting) return;
                    isReacting = true;
                    btn.disabled = true;
                    
                    readout.innerHTML = 'Status: <span style="color: var(--cold);">Reaction occurring. Absorbing thermal energy...</span>';
                    
                    // Drop temperature from 20C (y:80) to 0C (y:120)
                    // Height must decrease. Original: y=80, h=130 (bottom is 210).
                    // New: y=120, h=90 (bottom is 210).
                    bar.style.y = '120';
                    bar.style.height = '90';
                    
                    liquid.style.fill = 'rgba(14, 165, 233, 0.3)'; // Turn slightly blue/cold
                    
                    // Create bubble particles (CO2)
                    for(let i=0; i<40; i++) {
                        setTimeout(() => {
                            particles.push({
                                x: 100 + (Math.random() * 40 - 20),
                                y: 220,
                                r: Math.random() * 3 + 1,
                                speed: Math.random() * 2 + 1
                            });
                        }, Math.random() * 2000);

                            bar.style.height = '130';
                            liquid.style.fill = 'rgba(255, 255, 255, 0.2)';
                            readout.innerHTML = 'Status: Ready to repeat.';
                        }, 4000);
                    }, 3000);
                };

                function drawBubbles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    for(let i=0; i<particles.length; i++) {
                        let p = particles[i];
                        p.y -= p.speed;
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        
                        // Remove if out of liquid bounds
                        if(p.y < 120) {
                            particles.splice(i, 1);
                            i--;
                        }
                    }
                    rafId = requestAnimationFrame(drawBubbles);
                }

                drawBubbles();
                btn.addEventListener('click', startReaction);

                return () => {
                    btn.removeEventListener('click', startReaction);
                    cancelAnimationFrame(rafId);
                };

        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
</script>

</body>
</html>
