<script>
/**
 * @class BackgroundAnimation
 * @description Engine mandated background animation. Updated symbols for maps.
 */
class BackgroundAnimation {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.symbols = ['🗺️', '📏', '📐', 'x:y', '1:100', 'm', 'cm', '÷', '×'];
        this.width = 0;
        this.height = 0;
        this.resize = this.resize.bind(this);
        this.animate = this.animate.bind(this);
        this.init();
    }
    init() {
        window.addEventListener('resize', this.resize);
        this.resize();
        this.createParticles(15);
        this.animate();
    }
    resize() {
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
    }
    createParticles(count) {
        this.particles = [];
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x: Math.random() * this.width,
                y: Math.random() * this.height,
                size: Math.random() * 20 + 10,
                speedY: Math.random() * 0.5 + 0.1,
                symbol: this.symbols[Math.floor(Math.random() * this.symbols.length)],
                opacity: Math.random() * 0.15 + 0.05
            });
        }
    }
    animate() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.particles.forEach(p => {
            p.y -= p.speedY;
            if (p.y < -50) p.y = this.height + 50;
            this.ctx.fillStyle = `rgba(139, 92, 246, ${p.opacity})`; 
            this.ctx.font = `${p.size}px 'Outfit'`;
            this.ctx.fillText(p.symbol, p.x, p.y);
        });
        requestAnimationFrame(this.animate);
    }
}

/**
 * @class LessonController
 * @description Central logic for slides based on the Bowen Engine standard.
 */
class LessonController {
    constructor(slides) {
        this.slides = slides;
        this.index = 0;
        this.container = document.getElementById('slide-viewer');
        this.progressBar = document.getElementById('progress-bar');
        this.btnPrev = document.getElementById('btn-prev');
        this.btnNext = document.getElementById('btn-next');
        this.currentCleanup = null;
        this.init();
    }

    init() {
        new BackgroundAnimation('bg-canvas');
        this.btnPrev.addEventListener('click', () => this.prev());
        this.btnNext.addEventListener('click', () => this.next());
        
        document.addEventListener('mathjax-ready', () => { this.render(); });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowRight' || e.key === ' ') this.next();
            if (e.key === 'ArrowLeft') this.prev();
        });
        this.render();
    }

    render() {
        if (this.currentCleanup) {
            this.currentCleanup();
            this.currentCleanup = null;
        }

        const slide = this.slides[this.index];
        this.container.innerHTML = slide.template();
        this.container.parentElement.scrollTop = 0; 

        this.progressBar.style.width = `${((this.index + 1) / this.slides.length) * 100}%`;
        this.btnPrev.disabled = this.index === 0;
        this.btnNext.disabled = this.index === this.slides.length - 1;

        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
            MathJax.typesetPromise([this.container]).catch(err => console.log("MathJax error: ", err));
        }

        requestAnimationFrame(() => {
            if (slide.script) {
                this.currentCleanup = slide.script(this.container);
            }
        });
    }

    next() { if (this.index < this.slides.length - 1) { this.index++; this.render(); } }
    prev() { if (this.index > 0) { this.index--; this.render(); } }
}

/**
 * SLIDE DATA (The Lesson Arc)
 */
const slides = [
    // 1. Hook (Engage)
    {
        template: () => `
            <div class="text-center anim-enter" style="margin-top: 5vh;">
                <i class="fa-solid fa-map-location-dot" style="font-size: 6rem; color: var(--accent); margin-bottom: 2rem; filter: drop-shadow(0 0 30px rgba(16, 185, 129, 0.4));"></i>

    {

                <div class="grid-2 delay-1 anim-enter" style="margin-top: 3rem;">

                <div class="grid-2 delay-1 anim-enter" style="margin-top: 3rem;">

                            <h3 style="margin-bottom:0; text-align:center;">The Grid Paper</h3>
                        </div>
                    </div>

                    <div class="pedagogical-note note-task" style="margin-top: 0;">

                            <p style="font-weight: 700; color: white; margin: 0; font-size: 1.2rem;"><i class="fa-solid fa-triangle-exclamation" style="color: var(--danger);"></i> The Problem:</p>

    // 4. Theory (Explain) - What is Map Scale
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>The Mathematics of Scale 📏</h2>
                <p>To fit reality onto paper, we use direct proportion.</p>
                
                <div class="pedagogical-note note-write delay-1 anim-enter" style="max-width: 900px; margin: 3rem auto;">
                    <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                    <h3><i class="fa-solid fa-book-open"></i> Definitions</h3>
                    
                    <div style="margin-top: 1.5rem;">
                        <p style="font-size: 1.4rem; color: white; margin-bottom: 0.5rem;"><strong>1. Map Scale:</strong></p>

                        </p>

    // 5. Theory (Explain) - Calculating the Factor
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>The Golden Rule of Map Making 🧠</h2>
                <p>How Architects convert measurements accurately.</p>
                
                <div class="pedagogical-note note-write delay-1 anim-enter" style="max-width: 900px; margin: 2rem auto; border-color: var(--accent);">
                    <div class="pedagogical-badge" style="background: var(--accent); color: black;"><i class="fa-solid fa-star"></i> Core Formula</div>

                        <p style="font-size: 2rem; color: white; margin: 0; font-family: 'Outfit', sans-serif;">
                            $$ \\text{Map Distance} = \\frac{\\text{Real World Distance}}{\\text{Scale Factor}} $$
                        </p>
                    </div>

                    <div class="grid-2" style="gap: 2rem; margin-top: 2rem;">
                        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">

                            <p style="font-size: 1.1rem;"><strong>Divide</strong> by the scale factor.<br><em>E.g., Reality is 20m. Scale is 1sq = 2m. Map = 20 ÷ 2 = 10 squares.</em></p>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                            <h4 style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Going from Map to World</h4>
                            <p style="font-size: 1.1rem;"><strong>Multiply</strong> by the scale factor.<br><em>E.g., You count 5 squares on the map. Scale is 1sq = 2m. Reality = 5 × 2 = 10m.</em></p>
                        </div>
                    </div>
                </div>
            </div>
        `
    },

    // 6. Elaborate (Calculation Tool)
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>The Architect's Calculator 🧮</h2>
                <p>Test out different scales before drawing. Find what fits your paper best!</p>
                
                <div class="grid-2 delay-1 anim-enter" style="margin-top: 2rem; max-width: 1000px; margin-left: auto; margin-right: auto;">
                    <div class="pedagogical-note note-task" style="margin-top: 0;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-gear"></i> Testing Tool</div>
                        <p style="margin-bottom: 1rem;">Use this to check if your Max Campus Length will fit on your paper squares.</p>
                        <p style="font-size: 1.1rem; color: var(--text-dim);">1. Enter a real measured distance (e.g., 85 meters).</p>
                        <p style="font-size: 1.1rem; color: var(--text-dim);">2. Guess a scale (e.g., 1 square represents 3 meters).</p>
                        <p style="font-size: 1.1rem; color: var(--text-dim);">3. See how many paper squares it will take up.</p>
                    </div>
                    
                    <div class="glass-card">
                        <h3 style="text-align: center; margin-bottom: 1.5rem;"><i class="fa-solid fa-calculator"></i> Maths Check</h3>
                        
                        <label style="display:block; margin-bottom:0.5rem; color: var(--text-dim);">Real World Distance (Meters):</label>
                        <input id="input-real" class="calc-input" type="number" placeholder="e.g., 85">
                        
                        <label style="display:block; margin-bottom:0.5rem; color: var(--text-dim);">Scale: 1 Square represents how many Meters?</label>
                        <input id="input-scale" class="calc-input" type="number" placeholder="e.g., 2">
                        
                        <button id="btn-calc" class="btn-action" style="margin-top: 1rem;">Calculate Map Size</button>
                        
                        <div id="result" class="calc-result"></div>
                    </div>
                </div>
            </div>
        `,
        script: (container) => {
            const btn = container.querySelector('#btn-calc');
            const inReal = container.querySelector('#input-real');
            const inScale = container.querySelector('#input-scale');
            const outResult = container.querySelector('#result');

            const calculate = () => {
                const real = parseFloat(inReal.value);
                const scale = parseFloat(inScale.value);

                if (isNaN(real) || isNaN(scale) || scale === 0) {
                    outResult.innerHTML = `<span style="color: var(--danger); font-size: 1.5rem;">Error: Invalid Input</span>`;
                    outResult.style.display = 'block';
                    return;
                }

                const mapSquares = (real / scale).toFixed(1);
                outResult.innerHTML = `${mapSquares} Squares`;
                outResult.style.display = 'block';
                outResult.style.animation = 'none';
                void outResult.offsetWidth; // trigger reflow
                outResult.style.animation = 'popIn 0.3s forwards';
            };

            btn.addEventListener('click', calculate);
            
            // Allow enter key triggering
            const handleEnter = (e) => { if (e.key === 'Enter') calculate(); };
            inReal.addEventListener('keydown', handleEnter);
            inScale.addEventListener('keydown', handleEnter);

            return () => {
                btn.removeEventListener('click', calculate);
                inReal.removeEventListener('keydown', handleEnter);
                inScale.removeEventListener('keydown', handleEnter);
            };
        }
    },

    // 7. Elaborate (Strategies & Video)
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>Drawing Strategies ✍️</h2>
                <p>Professional tips for Drafting your Map.</p>
                
                <div class="grid-2 delay-1 anim-enter" style="margin-top: 2rem;">
                    
                    <!-- Video Embed inside Glass Card -->
                    <div class="glass-card" style="padding: 1.5rem;">
                        <h3 style="font-size: 1.4rem;"><i class="fa-solid fa-play"></i> Scale Drawing Visualized</h3>
                        <div class="video-container" style="margin-top: 1rem;">
                            <!-- Using a generic safe educational YouTube embed about Scale Drawings -->
                            <iframe src="https://www.youtube.com/embed/XjmOKKhlJ2k?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>

                    <!-- Tips using Reveal Cards -->
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div class="reveal-card" role="button" tabindex="0">
                            <div class="pre-reveal">
                                <i class="fa-solid fa-crosshairs reveal-icon"></i>
                                <h3 style="font-size: 1.5rem;">Tip 1: The Anchor Point</h3>
                                <p style="font-size: 1rem;">Click to reveal strategy</p>
                            </div>
                            <div class="reveal-content">
                                <i class="fa-solid fa-crosshairs reveal-icon" style="color:var(--accent);"></i>
                                <h3 style="color: white; margin-bottom: 0.5rem; font-size: 1.5rem;">Pick a Baseline</h3>
                                <p>Start at a corner of the campus. Draw your longest straight wall first. Let all other measurements branch off this single line.</p>
                            </div>
                        </div>

                        <div class="reveal-card" role="button" tabindex="0">
                            <div class="pre-reveal">
                                <i class="fa-solid fa-eraser reveal-icon"></i>
                                <h3 style="font-size: 1.5rem;">Tip 2: Drafting Protocol</h3>
                                <p style="font-size: 1rem;">Click to reveal strategy</p>
                            </div>
                            <div class="reveal-content">
                                <i class="fa-solid fa-eraser reveal-icon" style="color:var(--warning);"></i>
                                <h3 style="color: white; margin-bottom: 0.5rem; font-size: 1.5rem;">Draw Lightly</h3>
                                <p>You WILL make mistakes. Use an HB pencil. Only ink the lines when the Architects and Managers have verified the map mathematically closes.</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        `,
        script: (container) => {
            const cards = container.querySelectorAll('.reveal-card');
            cards.forEach(card => {
                const handler = () => {
                    card.classList.add('revealed');
                    card.querySelector('.reveal-content').style.display = 'block';
                    card.querySelector('.pre-reveal').style.display = 'none';
                };
                card.addEventListener('click', handler);
                // Accessibility: Enter to click
                card.addEventListener('keydown', (e) => { if (e.key === 'Enter') handler(); });
            });
            // Cleanup not strictly necessary for simple toggles on removed DOM, but adhering to Bible
            return () => {}; 
        }
    },

    // 8. Assessment (Evaluate - Quiz)
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>Knowledge Check 🎯</h2>
                <p>Are you ready to draft? Answer this scenario to prove it.</p>
                
                <div class="glass-card delay-1 anim-enter" style="max-width: 800px; margin: 3rem auto; text-align: left;">
                    <div style="margin-bottom: 2rem;">
                        <h3 style="color: white;"><i class="fa-solid fa-clipboard-question"></i> The Architect's Dilemma</h3>
                        <p style="font-size: 1.3rem; margin-top: 1rem;">
                            Your paper is 40 squares wide. The school building is 80 meters wide.<br>
                            Which of the following Scale Factors should you choose to make the building fit perfectly across the whole width of the paper?
                        </p>
                    </div>

                    <div id="quiz-container">
                        <div class="quiz-option" role="button" tabindex="0" data-correct="false">
                            A) $1 \\text{ square} = 1 \\text{ meter}$
                        </div>
                        <div class="quiz-option" role="button" tabindex="0" data-correct="true">
                            B) $1 \\text{ square} = 2 \\text{ meters}$
                        </div>
                        <div class="quiz-option" role="button" tabindex="0" data-correct="false">
                            C) $1 \\text{ square} = 0.5 \\text{ meters}$
                        </div>
                    </div>

                    <div id="quiz-feedback" class="quiz-feedback"></div>
                </div>
            </div>
        `,
        script: (container) => {
            const options = container.querySelectorAll('.quiz-option');
            const feedback = container.querySelector('#quiz-feedback');
            let answered = false;

            const handleOptionClick = (e) => {
                if (answered) return;
                const opt = e.currentTarget;
                const isCorrect = opt.getAttribute('data-correct') === 'true';
                
                answered = true;

                // Highlight chosen
                if (isCorrect) {
                    opt.classList.add('correct');
                    feedback.style.color = 'var(--accent)';
                    feedback.innerHTML = '<i class="fa-solid fa-check-circle"></i> Correct! 80m ÷ 2 = 40 squares.';
                } else {
                    opt.classList.add('incorrect');
                    // Find and highlight correct answer
                    options.forEach(o => {
                        if(o.getAttribute('data-correct') === 'true') {
                            o.classList.add('correct');
                        }
                    });
                    feedback.style.color = 'var(--danger)';
                    feedback.innerHTML = '<i class="fa-solid fa-xmark-circle"></i> Incorrect. Using 1 square = 2m gives exactly 40 squares (80 / 2 = 40).';
                }
                
                feedback.style.display = 'block';
                feedback.style.animation = 'popIn 0.3s forwards';
            };

            options.forEach(opt => {
                opt.addEventListener('click', handleOptionClick);
                opt.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleOptionClick(e); });
            });

            return () => {
                options.forEach(opt => opt.removeEventListener('click', handleOptionClick));
            };
        }
    },

    // 9. Assessment / Conclusion (Evaluate)
    {
        template: () => `
            <div class="anim-enter text-center">
                <h2>Deploy to Drafting Teams 🚀</h2>
                <i class="fa-solid fa-compass-drafting" style="font-size: 5rem; color: var(--accent); margin: 1rem 0; filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));"></i>
                
                <div class="pedagogical-note note-success delay-1 anim-enter" style="max-width: 800px; margin: 2rem auto; text-align: left;">
                    <div class="pedagogical-badge"><i class="fa-solid fa-list-check"></i> Final Checklist</div>
                    <ul style="margin-left: 1.5rem; margin-top: 0.5rem; font-size: 1.6rem; line-height: 2;">
                        <li><i class="fa-solid fa-check" style="color: var(--success);"></i> Discuss the Max Measurements.</li>
                        <li><i class="fa-solid fa-check" style="color: var(--success);"></i> Count the Paper Squares.</li>
                        <li><i class="fa-solid fa-check" style="color: var(--success);"></i> <strong>Managers & Architects:</strong> Agree on a Scale Factor.</li>
                        <li><i class="fa-solid fa-check" style="color: var(--success);"></i> Write the chosen scale clearly at the bottom of your map.</li>
                    </ul>
                </div>

                <p style="font-size: 1.5rem; font-weight: bold; margin-top: 2rem; color: white;">You have the rest of the period to construct your maps. <br><span class="highlight-primary">Good luck.</span></p>
            </div>
        `
    }
];

// Initialize Application
document.addEventListener('DOMContentLoaded', () => {
    new LessonController(slides);
});
</script>
</body>
</html>
