<script>
/**
 * @class BackgroundAnimation
 * @description Engine mandated background animation.
 */
class BackgroundAnimation {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.symbols = ['+', '-', '×', '÷', '=', '%', '📐', 'x:y'];
        this.width = 0;
        this.height = 0;
        this.resize = this.resize.bind(this);
        this.animate = this.animate.bind(this);
        this.init();
    }
    init() {
        window.addEventListener('resize', this.resize);
        this.resize();
        this.createParticles(20);
        this.animate();
    }
    resize() {
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
    }
    createParticles(count) {
        this.particles = [];
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x: Math.random() * this.width,
                y: Math.random() * this.height,
                size: Math.random() * 20 + 10,
                speedY: Math.random() * 0.5 + 0.1,
                symbol: this.symbols[Math.floor(Math.random() * this.symbols.length)],
                opacity: Math.random() * 0.15 + 0.05
            });
        }
    }
    animate() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.particles.forEach(p => {
            p.y -= p.speedY;
            if (p.y < -50) p.y = this.height + 50;
            this.ctx.fillStyle = `rgba(139, 92, 246, ${p.opacity})`; // Chemical Purple
            this.ctx.font = `${p.size}px 'Outfit'`;
            this.ctx.fillText(p.symbol, p.x, p.y);
        });
        requestAnimationFrame(this.animate);
    }
}

/**
 * @class LessonController
 * @description Central logic for slides based on the Bowen Engine standard.
 */
class LessonController {
    constructor(slides) {
        this.slides = slides;
        this.index = 0;
        this.container = document.getElementById('slide-viewer');
        this.progressBar = document.getElementById('progress-bar');
        this.btnPrev = document.getElementById('btn-prev');
        this.btnNext = document.getElementById('btn-next');
        this.currentCleanup = null;
        this.init();
    }

    init() {
        new BackgroundAnimation('bg-canvas');
        this.btnPrev.addEventListener('click', () => this.prev());
        this.btnNext.addEventListener('click', () => this.next());
        
        document.addEventListener('mathjax-ready', () => {
             this.render(); 
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowRight' || e.key === ' ') this.next();
            if (e.key === 'ArrowLeft') this.prev();
        });
        this.render();
    }

    render() {
        // Enforce cleanup closure execution to stop memory leaks (timers, listeners)
        if (this.currentCleanup) {
            this.currentCleanup();
            this.currentCleanup = null;
        }

        const slide = this.slides[this.index];
        this.container.innerHTML = slide.template();
        
        // Use engine standard parent container scrolling
        this.container.parentElement.scrollTop = 0; 

        this.progressBar.style.width = `${((this.index + 1) / this.slides.length) * 100}%`;
        this.btnPrev.disabled = this.index === 0;
        this.btnNext.disabled = this.index === this.slides.length - 1;

        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
            MathJax.typesetPromise([this.container]).catch(err => console.log("MathJax typesetting failed: ", err));
        }

        requestAnimationFrame(() => {
            if (slide.script) {
                this.currentCleanup = slide.script(this.container);
            }
        });
    }

    next() { if (this.index < this.slides.length - 1) { this.index++; this.render(); } }
    prev() { if (this.index > 0) { this.index--; this.render(); } }
}

    {
        template: () => `
            <div class="anim-enter text-center">

                <p>Before the big project, you need a test run.</p>

                                <li>The map must have a clear <strong class="highlight-warn">Scale Distance</strong> <br> (Example: $1\\text{ square} = 0.5\\text{ meters}$).</li>
                            </ol>
                        </div>
                        
                        <div class="pedagogical-note note-theory" style="margin-top: 0; padding: 1.5rem;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-bolt"></i> Urgency</div>
                            <p style="font-weight: bold; margin-bottom: 0.5rem;">Move and be quick when the timer starts!</p>
                            <p>You have exactly 20 minutes to show Mr. Bowen an accurate map. Team Leads need to have a plan to get as much work done as possible as quickly as possible.</p>
                        </div>
                    </div>
                    
                    <div class="glass-card">
                        <h3 style="color: white;"><i class="fa-solid fa-crown" style="color: var(--warning);"></i> The Managers</h3>
                        <p style="margin-top: 1rem;">Year 8 Leads: <strong style="color: var(--accent); font-size: 1.3rem;">Angelo & Meelo</strong></p>
                        <p>Year 9 Leads: <strong style="color: var(--accent); font-size: 1.3rem;">Bao Long & Louis</strong></p>
                        <hr style="border-color: rgba(255,255,255,0.1); margin: 1rem 0;">
                        <p style="font-size: 1rem; color: var(--text-dim);">Managers: Organize your team and get to work.</p>
                    </div>

                    <!-- Functional Timer Section -->
                    <div class="glass-card text-center" style="grid-column: 1 / -1; padding: 1.5rem; border: 2px dashed var(--accent);">
                        <h3 style="color: white; margin-bottom: 0.5rem;"><i class="fa-solid fa-stopwatch"></i> Time Limit</h3>
                        <div id="classroom-timer" style="font-size: 4rem; font-weight: 900; color: var(--accent); font-family: 'Outfit'; margin: 0.5rem 0; line-height: 1;">20:00</div>
                        <button id="btn-start-timer" class="btn-action" style="margin-top: 1rem;">Start 20 Minutes</button>
                    </div>
                </div>
            </div>
        `,
        script: (container) => {
            const btn = container.querySelector('#btn-start-timer');
            const display = container.querySelector('#classroom-timer');
            let timerId = null;

            const startTimer = () => {
                btn.disabled = true;
                btn.innerText = "Running...";
                btn.style.opacity = "0.5";
                
                let time = 20 * 60; // 20 minutes
                
                if (timerId) clearInterval(timerId);
                
                timerId = setInterval(() => {
                    let m = Math.floor(time / 60);
                    let s = time % 60;
                    display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    
                    if (time <= 0) {
                        clearInterval(timerId);
                        display.innerText = "TIME'S UP!";
                        display.style.color = "var(--danger)";
                        btn.innerText = "Done";
                    }
                    time--;
                }, 1000);
            };

            btn.addEventListener('click', startTimer);

            // MANDATORY CLEANUP: Stop interval when navigating away
            return () => {
                if (timerId) clearInterval(timerId);
            };
        }
    },
