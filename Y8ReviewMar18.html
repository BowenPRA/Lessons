<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Grading - Year 8 Assessment</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for rendering math equations easily -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Cambridge Bible Standard) --- */
        :root {
            --bg-deep: #0f172a;        /* Deep Slate */
            --bg-panel: #1e293b;       /* Secondary Background */
            --primary: #8b5cf6;        /* Chemical Purple */
            --accent: #10b981;         /* Success/Acid Green */
            --warning: #f59e0b;        /* Hazard Orange */
            --danger: #ef4444;         /* Heat Red */
            --cold: #0ea5e9;           /* Cold Blue */
            --text-light: #f1f5f9;     /* Main Text */
            --text-dim: #94a3b8;       /* Subtitles */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--text-light); }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.15rem; line-height: 1.6; color: var(--text-dim); }

        strong { color: var(--text-light); }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .mark-badge {
            background: var(--accent);
            color: var(--bg-deep);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-left: 10px;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
            display: inline-block;
            margin-top: 0.5rem;
        }

        /* Questions and Reveal Buttons */
        .question-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.2rem;
            color: white;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .btn-reveal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-reveal:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .answer-content {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--accent);
            padding: 1.2rem;
            margin-top: 1rem;
            border-radius: 0 8px 8px 0;
            animation: fadeIn 0.4s ease-out;
        }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--bg-panel);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.3s ease; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }
        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }

        .math-text { font-size: 1.3rem; color: white; margin: 0.5rem 0; }
        
        table.math-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
        }
        table.math-table th, table.math-table td {
            border: 1px solid var(--text-dim);
            padding: 10px;
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }
        table.math-table th { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-check-double"></i> Peer Grading</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 0.9rem;">18 March Assessment solutions</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; color: var(--primary);">
            Year 8 Science & Math
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // Global function for revealing answers
    window.revealAnswer = function(btn) {
        btn.nextElementSibling.style.display = 'block';
        btn.style.display = 'none';
        // Re-trigger MathJax to format any hidden math that was just revealed
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Instructions
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-users delay-1" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: 3.5rem;">Time to Mark!</h1>
                    <h2 class="delay-1" style="color: var(--accent);">18 March Assessment solutions</h2>
                    
                    <div class="glass-card delay-2" style="max-width: 750px; margin: 2rem auto; text-align: left; border-top: 4px solid var(--warning);">
                        <h3 style="color: var(--warning);"><i class="fa-solid fa-exchange-alt"></i> Instructions</h3>
                        <ol style="margin-left: 2rem; margin-top: 1rem; color: white; line-height: 2;">
                            <li>Please <strong>trade papers</strong> with the person in front or behind you.</li>
                            <li>Take out a <strong>Pen or Colored Pencil</strong>. (No normal grey pencils!)</li>
                            <li>Go to the front page. Look for the word <strong style="text-decoration: line-through; color: var(--danger);">Teacher</strong>.</li>
                            <li><strong>Cross it out</strong> and write your name as the <strong>Grader</strong>.</li>
                            <li><strong>Write a comment:</strong> Write 1 thing they did good, and 1 thing to work on.</li>
                            <li>Be fair! Only give marks if they have the correct ideas.</li>
                        </ol>
                    </div>
                </div>
            `
        },

        // SLIDE 2: PDF Embed
        {
            template: () => `
                <div class="anim-enter text-center" style="display: flex; flex-direction: column; height: 100%;">
                    <h2 class="delay-1" style="margin-bottom: 0.5rem;">Assessment Reference</h2>
                    <p class="delay-1" style="color: var(--text-dim); margin-bottom: 1rem;">Original Assessment PDF</p>
                    
                    <div class="glass-card delay-2" style="flex: 1; min-height: 60vh; padding: 0.5rem; border-top: 4px solid var(--primary);">
                        <iframe src="Y8ReviewMar18.pdf" width="100%" height="100%" style="border: none; border-radius: 8px; min-height: 58vh;" title="Assessment Review PDF">
                            <p>Your browser does not support iframes. <a href="Y8ReviewMar18.pdf" style="color: var(--accent);">Download the PDF</a>.</p>
                        </iframe>
                    </div>
                </div>
            `
        },

        // SLIDE 3: Science Q1
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part A: Science <span style="color: var(--text-dim);">|</span> Q1: Atoms & Elements</h2>
                    
                    <div class="question-box delay-1">
                        <div class="question-text"><strong>(a) Define what an element is. (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">An element is a pure substance made of only <strong>one type</strong> of atom.</p>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(b) Complete the table stating the electrical charge (+, -, or 0) for each particle. (3 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Proton = <strong>+</strong> (Positive)</p>
                            <p style="color: white;">Neutron = <strong>0</strong> (Neutral or Zero)</p>
                            <p style="color: white;">Electron = <strong>-</strong> (Negative)</p>
                            <span class="mark-badge">3 marks (1 point for each correct symbol)</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(c) Which subatomic particle is responsible for chemical bonding? (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">The <strong>Electron</strong>.</p>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 4: Science Q2
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part A: Science <span style="color: var(--text-dim);">|</span> Q2: Reactions</h2>
                    
                    <div class="grid-2">
                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(a) Explain what happens to atoms during a chemical reaction. (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">They are <strong>rearranged</strong>. (Bonds break and new bonds are formed to make new things).</p>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>

                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(b) In a word equation, what term is used for the starting substances? (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;"><strong>Reactants</strong>.</p>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(c) Compare an exothermic reaction to an endothermic reaction in terms of thermal energy. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;"><strong>Exothermic:</strong> Gives out heat (gets hotter / releases thermal energy).</p>
                            <p style="color: white;"><strong>Endothermic:</strong> Takes in heat (gets colder / absorbs thermal energy).</p>
                            <span class="mark-badge">2 marks (1 for each definition)</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(d) Explain why a chemical reaction, such as a burning candle, eventually stops. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">It stops because the <strong>reactants are completely used up</strong>. When there is no more fuel/chemicals left, it can't react anymore.</p>
                            <span class="mark-badge">2 marks</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 5: Science Q3 (Part 1)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part A: Science <span style="color: var(--text-dim);">|</span> Q3: Metals & Oxygen (1/2)</h2>
                    
                    <div class="question-box delay-1">
                        <div class="question-text"><strong>(a) A scientist cuts a piece of sodium metal. Explain why the shiny cut surface quickly becomes dull. (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Because it quickly <strong>reacts with oxygen</strong> in the air (forming an oxide layer).</p>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(b) Magnesium burns blindingly bright in air. Write the word equation for this reaction. (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Magnesium + Oxygen &rarr; <strong>Magnesium oxide</strong></p>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(c) Some metals, like gold, are described as "inert". What does this mean? (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">It means they are <strong>unreactive</strong>. They do not react easily with other chemicals.</p>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 6: Science Q3 (Part 2)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part A: Science <span style="color: var(--text-dim);">|</span> Q3: Rusting (2/2)</h2>
                    <p class="text-center delay-1" style="margin-bottom: 1rem;">(d) A student investigates the rusting of iron nails using different test tubes.</p>

                    <div class="question-box delay-1">
                        <div class="question-text"><strong>(i) State the two conditions needed for iron to rust. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">1. <strong>Water</strong> (or moisture)</p>
                            <p style="color: white;">2. <strong>Oxygen</strong> (or air)</p>
                            <span class="mark-badge">2 marks (1 for each)</span>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(ii) In one test tube, an iron nail is placed in boiled water with a layer of oil on top. Explain why this nail will not rust. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Boiling the water removes all the <strong>oxygen</strong>. The layer of oil stops new <strong>air from getting in</strong>.</p>
                            <span class="mark-badge">2 marks (1 point for mentioning no oxygen, 1 for oil blocking air)</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(iii) State two ways to protect an iron gate from rusting. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Any two of the following:</p>
                            <ul style="color: white; margin-left: 2rem;">
                                <li><strong>Paint</strong> it.</li>
                                <li>Cover it in <strong>oil or grease</strong>.</li>
                                <li><strong>Galvanize</strong> it (cover in Zinc).</li>
                            </ul>
                            <span class="mark-badge">2 marks</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 7: Math Q4
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part B: Math <span style="color: var(--text-dim);">|</span> Q4: Fractions</h2>
                    
                    <div class="grid-2">
                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(a) Calculate: \\( 3\\frac{1}{4} - 1\\frac{5}{6} \\) (3 marks)</strong></div>
                            <button class="btn-reveal" style="background: var(--primary);" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content" style="border-left-color: var(--primary); background: rgba(139, 92, 246, 0.1);">
                                <div class="math-text">Change to improper: \\( \\frac{13}{4} - \\frac{11}{6} \\)</div>
                                <div class="math-text">Common Denominator (12): \\( \\frac{39}{12} - \\frac{22}{12} \\)</div>
                                <div class="math-text" style="color: var(--accent); font-weight: bold; font-size: 1.5rem; margin-top: 1rem;">Answer: \\( \\frac{17}{12} \\text{  or  } 1\\frac{5}{12} \\)</div>
                                <br>
                                <span class="mark-badge" style="background: var(--primary);">3 marks (1 for improper, 1 for /12, 1 for final)</span>
                            </div>
                        </div>

                        <div class="question-box delay-2">
                            <div class="question-text"><strong>(b) Calculate: \\( \\frac{4}{9} \\div \\frac{8}{15} \\) (3 marks)</strong></div>
                            <button class="btn-reveal" style="background: var(--primary);" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content" style="border-left-color: var(--primary); background: rgba(139, 92, 246, 0.1);">
                                <div class="math-text">Flip & Multiply (KFC): \\( \\frac{4}{9} \\times \\frac{15}{8} \\)</div>
                                <div class="math-text">Multiply straight across: \\( \\frac{60}{72} \\)</div>
                                <div class="math-text" style="color: var(--accent); font-weight: bold; font-size: 1.5rem; margin-top: 1rem;">Simplest form: \\( \\frac{5}{6} \\)</div>
                                <br>
                                <span class="mark-badge" style="background: var(--primary);">3 marks (1 for flip/multiply, 1 for 60/72, 1 for 5/6)</span>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 8: Math Q5
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part B: Math <span style="color: var(--text-dim);">|</span> Q5: Ratio</h2>
                    
                    <div class="grid-2">
                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(a) Simplify the ratio 45 : 60. (1 mark)</strong></div>
                            <button class="btn-reveal" style="background: var(--primary);" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content" style="border-left-color: var(--primary); background: rgba(139, 92, 246, 0.1);">
                                <p style="color: white; font-size: 1.1rem;">Divide both sides by 15.</p>
                                <p style="color: var(--accent); font-weight: bold; font-size: 1.5rem;">Answer: 3 : 4</p>
                                <span class="mark-badge" style="background: var(--primary);">1 mark</span>
                            </div>
                        </div>

                        <div class="question-box delay-2">
                            <div class="question-text"><strong>(b) A sum of $240 is shared between Alice and Bob in the ratio 3:5. How much money does Bob receive? (2 marks)</strong></div>

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML synchronously
        container.innerHTML = slide.template();
        
        // Ensure MathJax renders any initial visible math immediately
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
