<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Word Wall Puzzles: A fun educational word association game for primary students.">
    <title>Word Wall Puzzles</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            /* --- COLOR PALETTE: Sunny & Playful --- */
            --bg-main: #e0f2fe; /* Light sky blue */
            --bg-pattern: #bae6fd;
            
            /* UI Elements */
            --panel-bg: rgba(255, 255, 255, 0.95);
            --panel-border: #bae6fd;
            --text-primary: #0f172a;
            --text-secondary: #475569;

            /* Interactive Colors */
            --tile-bg: #ffffff;
            --tile-border: #cbd5e1;
            --tile-shadow: #94a3b8;
            --tile-hover: #f8fafc;
            
            /* Selected State (Bright Cyan/Blue) */
            --selected-bg: #38bdf8;
            --selected-shadow: #0284c7;
            --selected-text: #ffffff;

            /* Category Colors (Pastel & High Contrast) */
            --cat-yellow: #fde047;
            --cat-yellow-text: #713f12;
            
            --cat-green: #86efac;
            --cat-green-text: #14532d;
            
            --cat-blue: #93c5fd;
            --cat-blue-text: #1e3a8a;
            
            --cat-pink: #f9a8d4;
            --cat-pink-text: #831843;

            /* Dimensions */
            --sidebar-width: 280px;
            --max-board-width: 750px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            /* Fun, rounded fonts for young learners */
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-main);
            /* Playful polka dot background */
            background-image: radial-gradient(var(--bg-pattern) 20%, transparent 20%), radial-gradient(var(--bg-pattern) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 2000px;
            margin: 0 auto;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--panel-bg);
            border-right: 4px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
            z-index: 20;
            overflow-y: auto;
            flex-shrink: 0;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }

        .brand {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            line-height: 1.1;
            color: #f59e0b; /* Amber */
            text-align: center;
            text-shadow: 2px 2px 0px #fde68a;
            margin-bottom: 0.5rem;
        }
        .brand span { color: #0ea5e9; text-shadow: 2px 2px 0px #bae6fd;}

        .level-list { display: flex; flex-direction: column; gap: 12px; }

        .level-btn {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            background: #f1f5f9;
            border: 2px solid transparent;
            color: var(--text-secondary);
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            font-size: 1.05rem;
            width: 100%;
            box-shadow: 0 4px 0px #cbd5e1;
        }

        .level-btn i { font-size: 1.2rem; transition: transform 0.2s; width: 24px; text-align: center; }
        
        .level-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 0px #cbd5e1;
            background: #e2e8f0;
        }
        
        .level-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #cbd5e1;
        }

        .level-btn.active {
            background: #fffbeb;
            border: 2px solid #fcd34d;
            color: #b45309;
            box-shadow: 0 4px 0px #fcd34d;
        }
        .level-btn.active i { transform: scale(1.2); }

        /* --- MAIN GAME ARENA --- */
        .arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem; 
            position: relative;
            overflow-y: auto;
        }

        .game-board-wrapper {
            width: 100%;
            max-width: var(--max-board-width);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: auto; 
            margin-bottom: auto;
            background: var(--panel-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 0 0 4px #fff inset;
            border: 2px solid var(--panel-border);
        }

        @keyframes bounceIn { 
            0% { opacity: 0; transform: scale(0.9) translateY(20px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* Game Header */
        .game-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            border-bottom: 3px dashed #e2e8f0;
            padding-bottom: 15px;
        }

        .header-left { display: flex; flex-direction: column; gap: 4px; }

        .game-title {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 700;
            color: #1e293b;
            line-height: 1.1;
        }

        .instruction { 
            color: #64748b; 
            font-weight: 700; 
            margin: 0; 
            font-size: 1.1rem; 
        }

        /* Lives */
        .lives-wrapper {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f8fafc; 
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 0 #e2e8f0;
        }

        .lives-label { font-family: 'Fredoka'; font-weight: 700; font-size: 1rem; color: #475569; margin-right: 4px; }
        .life-heart { color: #f43f5e; font-size: 1.4rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .life-heart.lost { color: #cbd5e1; transform: scale(0.7); opacity: 0.5; }

        /* --- THE GRID --- */
        .grid-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px; 
            width: 100%;
        }

        /* TILE (Tactile Button Look) */
        .tile {
            background: var(--tile-bg);
            color: var(--text-primary);
            border: 2px solid var(--tile-border);
            border-radius: 16px;
            aspect-ratio: 1.6/1; 
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 1.8vw, 1.3rem);
            text-transform: uppercase;
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            line-height: 1.2;
            box-shadow: 0 6px 0 var(--tile-shadow);
        }

        .tile:hover {
            transform: translateY(-2px);
            background: var(--tile-hover);
            box-shadow: 0 8px 0 var(--tile-shadow);
        }

        .tile:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--tile-shadow);
        }

        .tile.selected {
            background: var(--selected-bg) !important;
            color: var(--selected-text) !important;
            border-color: var(--selected-shadow);
            box-shadow: 0 2px 0 var(--selected-shadow) !important;
            transform: translateY(4px);
            z-index: 10;
        }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 
            10%, 90% { transform: translate3d(-2px, 4px, 0); } 
            20%, 80% { transform: translate3d(4px, 4px, 0); } 
            30%, 50%, 70% { transform: translate3d(-6px, 4px, 0); } 
            40%, 60% { transform: translate3d(6px, 4px, 0); } 
        }

        /* --- SOLVED ROWS --- */
        .solved-row {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            border: 2px solid rgba(255,255,255,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .solved-category { font-family: 'Fredoka'; font-weight: 700; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 0.5px;}
        .solved-words { font-size: 1rem; font-weight: 700; opacity: 0.85; margin-top: 4px; }

        /* Connection Note (Replaces Teacher Drawer for kids) */
        .connection-note {
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            margin-top: 0;
            padding: 0 1rem;
            max-height: 0; overflow: hidden;
            transition: all 0.3s ease; 
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
        }
        .solved-row.open .connection-note { margin-top: 0.8rem; padding: 0.8rem; max-height: 150px; }
        .drawer-icon { position: absolute; right: 20px; top: 25px; transition: transform 0.3s; opacity: 0.6; font-size: 1.2rem;}
        .solved-row.open .drawer-icon { transform: rotate(180deg); opacity: 1;}

        /* --- CONTROLS --- */
        .controls-bar { display: flex; gap: 15px; width: 100%; margin-top: 15px; }
        
        .action-btn {
            flex: 1; padding: 14px; border-radius: 16px; border: 2px solid #cbd5e1;
            background: #fff; color: #475569;
            font-family: 'Fredoka', sans-serif; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; font-size: 1rem;
            box-shadow: 0 4px 0 #cbd5e1;
        }
        .action-btn:hover:not(:disabled) { background: #f8fafc; transform: translateY(-2px); box-shadow: 0 6px 0 #cbd5e1; }
        .action-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #cbd5e1; }
        
        .submit-btn {
            flex: 2; background: #e2e8f0; color: #94a3b8; border: 2px solid #cbd5e1; box-shadow: none; cursor: not-allowed;
        }
        .submit-btn.ready {
            background: #10b981; color: #fff; border-color: #059669;
            box-shadow: 0 6px 0 #059669; cursor: pointer;
            animation: gentlePulse 2s infinite;
        }
        .submit-btn.ready:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #059669; background: #34d399; }
        .submit-btn.ready:active { transform: translateY(4px); box-shadow: 0 2px 0 #059669; }

        @keyframes gentlePulse { 
            0% { filter: brightness(1); } 
            50% { filter: brightness(1.1); } 
            100% { filter: brightness(1); } 
        }

        /* --- ALERTS & MODALS --- */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px);
            background: #fff; color: #0f172a; padding: 16px 32px; border-radius: 50px;
            font-weight: 700; font-family: 'Fredoka'; z-index: 2000;
            border: 4px solid #e2e8f0; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }
        .toast.visible { transform: translate(-50%, 0); opacity: 1; }
        .toast.warn { border-color: #f59e0b; color: #d97706; }
        .toast.error { border-color: #ef4444; color: #b91c1c; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 2100;
        }
        .modal-card {
            background: #fff; color: #0f172a; padding: 3rem; border-radius: 32px;
            text-align: center; max-width: 450px; width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #f1f5f9;
        }
        .modal-card h2 { font-family: 'Fredoka'; font-size: 2.5rem; margin-bottom: 0.5rem; color: #0ea5e9; }
        .modal-card p { font-size: 1.2rem; color: #64748b; font-weight: 600; margin-bottom: 25px; }
        
        .modal-options { display: flex; flex-direction: column; gap: 15px; margin-top: 1rem; }
        .modal-btn {
            padding: 16px; border-radius: 16px; border: none;
            font-family: 'Fredoka'; font-weight: 700; font-size: 1.2rem; cursor: pointer;
            width: 100%; transition: all 0.2s;
        }
        .modal-btn.primary { background: #10b981; color: white; box-shadow: 0 6px 0 #059669; }
        .modal-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #059669; }
        .modal-btn.primary:active { transform: translateY(4px); box-shadow: 0 2px 0 #059669; }
        
        .modal-btn.secondary { background: #f1f5f9; color: #475569; box-shadow: 0 6px 0 #cbd5e1; }
        .modal-btn.secondary:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #cbd5e1; }
        .modal-btn.secondary:active { transform: translateY(4px); box-shadow: 0 2px 0 #cbd5e1; }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1500; }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; padding: 1rem; border-right: none; border-bottom: 4px solid var(--panel-border);
                flex-direction: row; align-items: center; overflow-x: auto;
            }
            .brand { font-size: 1.5rem; margin-bottom: 0; margin-right: 1rem;}
            .level-list { flex-direction: row; width: max-content; }
            .level-btn { width: auto; white-space: nowrap; padding: 10px 16px; font-size: 1rem; }
            
            .game-header { flex-direction: column; align-items: center; text-align: center; gap: 15px; }
            .header-left { align-items: center; }

            .arena { padding: 1rem; height: auto; min-height: calc(100vh - 100px); display: block; }
            .game-board-wrapper { gap: 15px; margin-top: 0; margin-bottom: 0; padding: 1.5rem; border-radius: 20px;}
            .grid { gap: 8px; }
            .tile { aspect-ratio: 1.4/1; font-size: 0.85rem; padding: 4px; box-shadow: 0 4px 0 var(--tile-shadow); border-width: 2px;}
            .tile.selected { transform: translateY(2px); box-shadow: 0 2px 0 var(--selected-shadow) !important;}
            .tile:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--tile-shadow);}
        }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div id="toast" class="toast" role="alert" aria-live="assertive">
        <i id="toast-icon" class="fa-solid fa-circle-exclamation"></i> <span id="toast-text">Alert</span>
    </div>

    <div class="app-container">
        
        <nav class="sidebar" aria-label="Game Levels">
            <div class="brand">Word Wall<br><span>Puzzles</span></div>
            <div class="level-list">
                <!-- Curated Primary Levels -->
                <button class="level-btn active" data-game="0"><i class="fa-solid fa-apple-whole" style="color:#ef4444"></i> The Hungry Caterpillar</button>
                <button class="level-btn" data-game="1"><i class="fa-solid fa-hand-sparkles" style="color:#0ea5e9"></i> The Sensory Fun Mix</button>
                <button class="level-btn" data-game="2"><i class="fa-solid fa-child-reaching" style="color:#f59e0b"></i> Me and My Day</button>
                <button class="level-btn" data-game="3"><i class="fa-solid fa-shapes" style="color:#10b981"></i> Phonics & Shapes</button>
                <button class="level-btn" data-game="4"><i class="fa-solid fa-music" style="color:#8b5cf6"></i> Rhyme Time</button>
            </div>
        </nav>

        <main class="arena">
            <div class="game-board-wrapper" id="board-wrapper">
                
                <header class="game-header">
                    <div class="header-left">
                        <h1 class="game-title" id="game-title-display">The Hungry Caterpillar</h1>
                        <p class="instruction">Find 4 groups of 4 matching words!</p>
                    </div>
                    <div class="lives-wrapper" aria-label="Lives remaining">
                        <span class="lives-label">Hearts:</span>
                        <i class="fa-solid fa-heart life-heart" id="life-1"></i>
                        <i class="fa-solid fa-heart life-heart" id="life-2"></i>
                        <i class="fa-solid fa-heart life-heart" id="life-3"></i>
                        <i class="fa-solid fa-heart life-heart" id="life-4"></i>
                    </div>
                </header>

                <div class="grid-container">
                    <div id="solved-stack" style="display: flex; flex-direction: column; gap: 10px; width: 100%;"></div>
                    
                    <div id="grid" class="grid" role="grid" aria-label="Word association grid"></div>
                </div>

                <div class="controls-bar">
                    <button class="action-btn" id="btn-shuffle">
                        <i class="fa-solid fa-shuffle"></i> Shuffle
                    </button>
                    <button class="action-btn" id="btn-deselect">
                        <i class="fa-regular fa-square-minus"></i> Clear
                    </button>
                    <button class="action-btn submit-btn" id="btn-submit" disabled>
                        Submit
                    </button>
                </div>

            </div>
        </main>
    </div>

    <div class="modal-overlay" id="end-modal" role="dialog" aria-modal="true">
        <div class="modal-card">
            <h2 id="modal-title">Awesome Job!</h2>
            <p id="modal-msg">You are a superstar!</p>
            
            <div id="win-actions" class="modal-options" style="display:none">
                <button class="modal-btn primary" id="btn-review">Look at the Board</button>
            </div>

            <div id="lose-actions" class="modal-options" style="display:none">
                <button class="modal-btn secondary" id="btn-keep-playing">Keep Trying (Unlimited Hearts)</button>
                <button class="modal-btn primary" id="btn-start-over">Play Again</button>
                <button class="modal-btn secondary" id="btn-see-groups">Show the Answers</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Word Wall Puzzles - For Cambridge Years 1-4
         * Optimized for young readers: Friendly UI, High Contrast, Encouraging Feedback.
         */

        // --- DATA CONFIGURATION ---
        const GAMES_DB = [
            // Level 1: The Hungry Caterpillar (Ages 5-6)
            [
                { category: "Red Fruits", bg: "var(--cat-pink)", text: "var(--cat-pink-text)", items: ["APPLE", "CHERRY", "BERRY", "TOMATO"], note: "Healthy foods that are red!" },
                { category: "Drinks", bg: "var(--cat-blue)", text: "var(--cat-blue-text)", items: ["WATER", "MILK", "JUICE", "TEA"], note: "Things we drink when we are thirsty." },
                { category: "Sweet Treats", bg: "var(--cat-yellow)", text: "var(--cat-yellow-text)", items: ["CAKE", "CANDY", "DONUT", "PIE"], note: "Yummy desserts with lots of sugar." },
                { category: "Things with Wings", bg: "var(--cat-green)", text: "var(--cat-green-text)", items: ["BIRD", "BEE", "BAT", "BUTTERFLY"], note: "Animals and bugs that can fly!" }
            ],
            // Level 2: The Sensory Fun Mix (Ages 5-7)
            [
                { category: "Loud Noises", bg: "var(--cat-yellow)", text: "var(--cat-yellow-text)", items: ["BOOM", "POP", "BANG", "CRASH"], note: "Words that sound exactly like the noise they make." },
                { category: "Sticky Things", bg: "var(--cat-pink)", text: "var(--cat-pink-text)", items: ["GLUE", "HONEY", "GUM", "TAPE"], note: "Things that hold other things together or feel messy!" },
                { category: "Cold Things", bg: "var(--cat-blue)", text: "var(--cat-blue-text)", items: ["ICE", "SNOW", "FRIDGE", "IGLOO"], note: "Things that are freezing or very chilly." },
                { category: "Things with Wheels", bg: "var(--cat-green)", text: "var(--cat-green-text)", items: ["CAR", "BIKE", "BUS", "TRUCK"], note: "Vehicles that roll on the ground to move." }
            ],
            // Level 3: Me and My Day (Ages 6-8)
            [
                { category: "Face Parts", bg: "var(--cat-pink)", text: "var(--cat-pink-text)", items: ["EYES", "NOSE", "MOUTH", "CHIN"], note: "Parts of the face we use to see, smell, and eat." },
                { category: "Things You Wear", bg: "var(--cat-blue)", text: "var(--cat-blue-text)", items: ["SHIRT", "SOCKS", "SHOES", "HAT"], note: "Clothes we put on to stay warm and look nice." },
                { category: "Action Words", bg: "var(--cat-green)", text: "var(--cat-green-text)", items: ["RUN", "JUMP", "SWIM", "SIT"], note: "Verbs! Things you can do with your body." },
                { category: "Family", bg: "var(--cat-yellow)", text: "var(--cat-yellow-text)", items: ["MOM", "DAD", "SISTER", "BABY"], note: "People who live in our home and love us." }
            ],
            // Level 4: Phonics & Shapes (Ages 7-9)
            [
                { category: "Rhymes with CAT", bg: "var(--cat-yellow)", text: "var(--cat-yellow-text)", items: ["HAT", "BAT", "MAT", "RAT"], note: "Words ending with the '-at' sound." },
                { category: "Double 'OO'", bg: "var(--cat-blue)", text: "var(--cat-blue-text)", items: ["MOON", "BOOT", "SPOON", "POOL"], note: "Spelling: Words that have 'oo' in the middle." },
                { category: "Shapes", bg: "var(--cat-green)", text: "var(--cat-green-text)", items: ["STAR", "HEART", "CIRCLE", "SQUARE"], note: "Simple shapes we can draw." },
                { category: "Weather", bg: "var(--cat-pink)", text: "var(--cat-pink-text)", items: ["RAIN", "SUN", "WIND", "SNOW"], note: "What it looks like outside in the sky." }
            ],
            // Level 5: Rhyme Time (Ages 7-9)
            [
                { category: "Wild Animals", bg: "var(--cat-green)", text: "var(--cat-green-text)", items: ["LION", "TIGER", "MONKEY", "ZEBRA"], note: "Animals you might see on a safari or in the jungle." },
                { category: "Fruit", bg: "var(--cat-pink)", text: "var(--cat-pink-text)", items: ["APPLE", "BANANA", "LEMON", "GRAPE"], note: "Healthy snacks that grow on trees or vines." },
                { category: "Shapes", bg: "var(--cat-blue)", text: "var(--cat-blue-text)", items: ["CIRCLE", "TRIANGLE", "OVAL", "RECTANGLE"], note: "Math shapes with different numbers of sides." },
                { category: "Rhymes with BEAR", bg: "var(--cat-yellow)", text: "var(--cat-yellow-text)", items: ["PEAR", "CHAIR", "HAIR", "SQUARE"], note: "Words that all sound the same at the end!" }
            ]
        ];

        const TITLES = [
            "The Hungry Caterpillar", 
            "The Sensory Fun Mix", 
            "Me and My Day", 
            "Phonics & Shapes",
            "Rhyme Time"
        ];

        // --- STATE MANAGEMENT ---
        const state = {
            gameIndex: 0,
            gridItems: [],
            selectedIndices: [],
            mistakes: 0,
            maxMistakes: 4,
            isGameOver: false,
            infiniteMode: false,
            isProcessing: false
        };

        // --- DOM REFERENCES ---
        const DOM = {
            grid: document.getElementById('grid'),
            solvedStack: document.getElementById('solved-stack'),
            modal: document.getElementById('end-modal'),
            modalTitle: document.getElementById('modal-title'),
            modalMsg: document.getElementById('modal-msg'),
            winActions: document.getElementById('win-actions'),
            loseActions: document.getElementById('lose-actions'),
            submitBtn: document.getElementById('btn-submit'),
            titleDisplay: document.getElementById('game-title-display'),
            lifePips: document.querySelectorAll('.life-heart'),
            boardWrapper: document.getElementById('board-wrapper'),
            toast: document.getElementById('toast'),
            toastText: document.getElementById('toast-text'),
            toastIcon: document.getElementById('toast-icon'),
            confetti: document.getElementById('confetti')
        };

        // --- INIT & EVENTS ---
        document.addEventListener('DOMContentLoaded', () => {
            initGame(0);
            setupEventListeners();
            setupConfettiResize();
        });

        function setupEventListeners() {
            // Navigation
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.currentTarget.dataset.game);
                    if (!isNaN(idx)) initGame(idx);
                });
            });

            // Game Controls
            document.getElementById('btn-shuffle').addEventListener('click', () => {
                if(!state.isProcessing && !state.isGameOver) shuffleGrid();
            });
            document.getElementById('btn-deselect').addEventListener('click', () => {
                if(!state.isProcessing && !state.isGameOver) deselectAll();
            });
            DOM.submitBtn.addEventListener('click', submitGuess);

            // Modal Actions
            document.getElementById('btn-review').addEventListener('click', hideModal);
            document.getElementById('btn-keep-playing').addEventListener('click', enableInfiniteMode);
            document.getElementById('btn-start-over').addEventListener('click', () => initGame(state.gameIndex));
            document.getElementById('btn-see-groups').addEventListener('click', revealAllAndClose);
        }

        // --- GAME LOGIC ---

        function initGame(gameIndex) {
            // Reset Logical State
            state.gameIndex = gameIndex;
            state.mistakes = 0;
            state.isGameOver = false;
            state.infiniteMode = false;
            state.selectedIndices = [];
            state.gridItems = [];
            state.isProcessing = false;

            // Clear UI
            DOM.grid.innerHTML = '';
            DOM.solvedStack.innerHTML = '';
            hideModal();
            updateSubmitButton();

            // Update Navigation UI
            document.querySelectorAll('.level-btn').forEach((btn, idx) => {
                if (idx === gameIndex) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Set Title
            DOM.titleDisplay.innerText = TITLES[gameIndex];

            // Reset Lives UI
            DOM.lifePips.forEach(p => {
                p.classList.remove('lost');
                p.style.color = ''; 
                p.style.filter = '';
            });

            // Populate Data
            const currentData = GAMES_DB[gameIndex];
            currentData.forEach(group => {
                group.items.forEach(word => {
                    state.gridItems.push({
                        word: word,
                        category: group.category,
                        bg: group.bg,
                        textColor: group.text,
                        note: group.note,
                        groupRef: group,
                        id: Math.random().toString(36).substr(2, 9)
                    });
                });
            });

            // Initial Shuffle & Render
            shuffleArray(state.gridItems);
            renderGrid(true);

            // Re-trigger Page Fade In
            DOM.boardWrapper.style.animation = 'none';
            DOM.boardWrapper.offsetHeight; // force reflow
            DOM.boardWrapper.style.animation = 'bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function renderGrid(animate = false) {
            DOM.grid.innerHTML = '';
            
            state.gridItems.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isSelected = state.selectedIndices.includes(idx);
                
                btn.className = `tile ${isSelected ? 'selected' : ''}`;
                btn.innerText = item.word;
                btn.type = "button";
                btn.setAttribute('aria-pressed', isSelected);
                btn.setAttribute('aria-label', `${item.word}${isSelected ? ', selected' : ''}`);

                btn.onclick = () => toggleSelect(idx);
                
                if (animate) {
                    btn.style.animation = `bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${idx * 0.03}s backwards`;
                }
                
                DOM.grid.appendChild(btn);
            });
            updateSubmitButton();
        }

        function toggleSelect(idx) {
            if (state.isGameOver || state.isProcessing) return;

            if (state.selectedIndices.includes(idx)) {
                state.selectedIndices = state.selectedIndices.filter(i => i !== idx);
            } else {
                if (state.selectedIndices.length < 4) {
                    state.selectedIndices.push(idx);
                }
            }

            const tiles = DOM.grid.children;
            Array.from(tiles).forEach((tile, i) => {
                const isSel = state.selectedIndices.includes(i);
                if (isSel) tile.classList.add('selected');
                else tile.classList.remove('selected');
                tile.setAttribute('aria-pressed', isSel);
            });
            
            updateSubmitButton();
        }

        function deselectAll() {
            state.selectedIndices = [];
            const tiles = DOM.grid.children;
            Array.from(tiles).forEach(t => {
                t.classList.remove('selected');
                t.setAttribute('aria-pressed', 'false');
            });
            updateSubmitButton();
        }

        function shuffleGrid() {
            const selectedIds = state.selectedIndices.map(i => state.gridItems[i].id);
            shuffleArray(state.gridItems);
            
            state.selectedIndices = [];
            state.gridItems.forEach((item, idx) => {
                if (selectedIds.includes(item.id)) state.selectedIndices.push(idx);
            });
            
            renderGrid(true);
        }

        function updateSubmitButton() {
            if (state.selectedIndices.length === 4) {
                DOM.submitBtn.disabled = false;
                DOM.submitBtn.classList.add('ready');
            } else {
                DOM.submitBtn.disabled = true;
                DOM.submitBtn.classList.remove('ready');
            }
        }

        // --- SUBMISSION HANDLING ---

        function submitGuess() {
            if (state.selectedIndices.length !== 4) return;
            state.isProcessing = true; 

            const selection = state.selectedIndices.map(i => state.gridItems[i]);
            const firstCategory = selection[0].category;
            const isMatch = selection.every(item => item.category === firstCategory);

            if (isMatch) {
                handleSuccess(selection[0].groupRef);
            } else {
                handleFailure(selection);
            }

            setTimeout(() => { state.isProcessing = false; }, 600);
        }

        function handleSuccess(group) {
            // Remove from gridItems
            state.gridItems = state.gridItems.filter((item, idx) => !state.selectedIndices.includes(idx));
            state.selectedIndices = [];

            createSolvedRow(group);
            renderGrid(true); 

            if (state.gridItems.length === 0) {
                setTimeout(triggerWin, 600);
            }
        }

        function handleFailure(selection) {
            const counts = {};
            selection.forEach(s => counts[s.category] = (counts[s.category] || 0) + 1);
            const isOneAway = Object.values(counts).some(count => count === 3);

            const tiles = DOM.grid.children;
            state.selectedIndices.forEach(i => tiles[i].classList.add('shake'));
            setTimeout(() => {
                Array.from(tiles).forEach(t => t.classList.remove('shake'));
            }, 500);

            if (!state.infiniteMode) {
                state.mistakes++;
                updateLivesUI();
            }

            if (isOneAway) {
                showToast("So close! You're one away.", "warn", "fa-star-half-stroke");
            } else {
                showToast("Oops! Not quite.", "error", "fa-circle-xmark");
            }

            if (!state.infiniteMode && state.mistakes >= state.maxMistakes) {
                state.isGameOver = true;
                setTimeout(showLoseOptions, 1000);
            }
        }

        function createSolvedRow(group) {
            const row = document.createElement('div');
            row.className = 'solved-row';
            row.style.background = group.bg;
            row.style.color = group.text;
            
            row.innerHTML = `
                <div class="solved-category">${group.category}</div>
                <div class="solved-words">${group.items.join(', ')}</div>
                <i class="fa-solid fa-chevron-down drawer-icon"></i>
                <div class="connection-note">
                    <i class="fa-solid fa-lightbulb" style="color: #f59e0b; margin-right: 5px;"></i> ${group.note}
                </div>
            `;
            
            row.addEventListener('click', function() {
                this.classList.toggle('open');
            });
            
            DOM.solvedStack.appendChild(row);
        }

        function updateLivesUI() {
            for(let i=0; i < state.maxMistakes; i++) {
                if (i < state.mistakes) {
                    DOM.lifePips[i].classList.add('lost');
                }
            }
        }

        // --- ALERTS & MODALS ---

        function triggerWin() {
            startConfetti();
            DOM.modalTitle.innerText = "Awesome Job!";
            DOM.modalTitle.style.color = "#10b981"; // Green
            DOM.modalMsg.innerText = "You found all the puzzle groups! You are a superstar.";
            DOM.winActions.style.display = 'flex';
            DOM.loseActions.style.display = 'none';
            DOM.modal.style.display = 'flex';
        }

        function showLoseOptions() {
            DOM.modalTitle.innerText = "Oh no!";
            DOM.modalTitle.style.color = "#ef4444"; // Red
            DOM.modalMsg.innerText = "You used up all your hearts. Don't worry, you can keep trying!";
            DOM.winActions.style.display = 'none';
            DOM.loseActions.style.display = 'flex';
            DOM.modal.style.display = 'flex';
        }

        function enableInfiniteMode() {
            hideModal();
            state.isGameOver = false;
            state.infiniteMode = true;
            DOM.lifePips.forEach(p => {
                p.classList.remove('lost');
                p.style.color = "#fcd34d"; // Gold hearts for infinite mode
                p.style.transform = "scale(1.1)";
            });
            showToast("Unlimited hearts activated!", "", "fa-infinity");
        }

        function revealAllAndClose() {
            hideModal();
            DOM.grid.innerHTML = '';
            
            const currentData = GAMES_DB[state.gameIndex];
            const solvedCats = Array.from(document.querySelectorAll('.solved-category')).map(c => c.innerText);
            
            currentData.forEach(g => {
                if(!solvedCats.includes(g.category)) {
                    createSolvedRow(g);
                }
            });
        }

        function hideModal() { DOM.modal.style.display = 'none'; }

        function showToast(msg, typeClass, iconClass) {
            DOM.toastText.innerText = msg;
            DOM.toastIcon.className = `fa-solid ${iconClass || 'fa-circle-exclamation'}`;
            DOM.toast.className = `toast visible ${typeClass || ''}`;
            
            // Clear existing timeout to prevent rapid clicking bugs
            if(state.toastTimeout) clearTimeout(state.toastTimeout);
            
            state.toastTimeout = setTimeout(() => {
                DOM.toast.classList.remove('visible');
            }, 2500);
        }

        // --- CONFETTI EFFECT ---
        function startConfetti() {
            const canvas = DOM.confetti;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            // Bright primary/pastel colors
            const colors = ['#fde047', '#38bdf8', '#86efac', '#f9a8d4', '#f43f5e'];
            
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, 
                    y: canvas.height / 2 + 100, // Start slightly lower
                    vx: (Math.random() - 0.5) * 25, 
                    vy: (Math.random() - 1) * 25 - 5, // Shoot upwards
                    size: Math.random() * 8 + 6, 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 10
                });
            }
            
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.x += p.vx; 
                    p.y += p.vy; 
                    p.vy += 0.6; // Gravity
                    p.vx *= 0.96; // Friction
                    p.rot += p.rotSpeed;
                    
                    if (p.y < canvas.height + 20) active = true;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; 
                    // Draw little squares
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });
                if(active) requestAnimationFrame(loop);
                else ctx.clearRect(0,0,canvas.width,canvas.height); // Final clear
            }
            loop();
        }

        function setupConfettiResize() {
            window.addEventListener('resize', () => {
                DOM.confetti.width = window.innerWidth;
                DOM.confetti.height = window.innerHeight;
            });
        }

    </script>
</body>
</html>
