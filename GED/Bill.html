<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED Social Studies: The Bill of Rights (ESL Support)</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- CSS VARIABLES & THEME --- */
        :root {
            /* Palette - Premium Federal Slate Theme */
            --bg-deep: #0b1120;        
            --bg-card: rgba(30, 41, 59, 0.65); 
            
            --federal-blue: #3b82f6;    
            --federal-blue-glow: rgba(59, 130, 246, 0.4);
            --constitution-gold: #fbbf24; 
            --constitution-gold-glow: rgba(251, 191, 36, 0.3);
            
            --text-main: #f8fafc;        
            --text-muted: #94a3b8;       
            --text-vn: #cbd5e1;         

            --header-h: 75px;
            --footer-h: 85px;
            --border-radius: 16px;
            
            --fs-h1: clamp(2.5rem, 6vw, 4.5rem);
            --fs-h2: clamp(1.8rem, 4vw, 2.8rem);
            
            /* Font Families */
            --font-heading: 'Libre Baskerville', serif; 
            --font-ui: 'Outfit', sans-serif;           
            --font-body: 'Plus Jakarta Sans', sans-serif; 
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background-color: var(--bg-deep);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(59, 130, 246, 0.08), transparent 30%), 
                radial-gradient(circle at 85% 75%, rgba(251, 191, 36, 0.06), transparent 30%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e293b' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2.5rem;
            background: rgba(11, 17, 32, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            z-index: 50;
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--federal-blue), #1d4ed8);
            padding: 0.5rem 1.4rem;
            border-radius: 50px;
            font-family: var(--font-ui);
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: white;
            box-shadow: 0 4px 20px var(--federal-blue-glow);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .slide-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: start;
            padding: 3rem 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .slide-center { justify-content: center; }

        .footer {
            height: var(--footer-h);
            background: rgba(11, 17, 32, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            backdrop-filter: blur(16px);
            z-index: 50;
        }

        /* --- COMPONENTS --- */
        .btn-nav {
            width: 56px;
            height: 56px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 1.3rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--federal-blue);
            box-shadow: 0 0 20px var(--federal-blue-glow);
            transform: scale(1.08);
            border-color: rgba(255,255,255,0.3);
        }
        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; transform: scale(0.95); }

        .progress-container {
            flex: 1;
            margin: 0 3rem;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--federal-blue), var(--constitution-gold));
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 15px var(--constitution-gold-glow);
            border-radius: 10px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(16px);
        }

        /* --- NOTEBOOK PEDAGOGY --- */
        .notebook-alert {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
            border: 2px solid var(--constitution-gold);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.15);
            position: relative;
            overflow: hidden;
        }
        .notebook-alert::before {
            content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%;
            background: var(--constitution-gold);
        }
        .alert-icon {
            font-size: 2.5rem;
            color: var(--constitution-gold);
            text-shadow: 0 0 15px var(--constitution-gold-glow);
        }
        .alert-title {
            font-family: var(--font-ui);
            font-weight: 800;
            color: var(--constitution-gold);
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .alert-text-en { font-size: 1.15rem; font-weight: 500; margin-bottom: 0.8rem; line-height: 1.5; color: white; }
        .alert-text-vn { font-size: 1.05rem; font-style: italic; color: var(--text-vn); line-height: 1.5; font-family: 'Times New Roman', serif;}

        .copy-prompt {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(251, 191, 36, 0.15);
            color: var(--constitution-gold);
            border: 1px dashed var(--constitution-gold);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: var(--font-ui);
            font-weight: 600;
            margin-bottom: 1.5rem;
            animation: float-prompt 3s ease-in-out infinite;
        }
        @keyframes float-prompt {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* --- DIAGRAMS (Sketch-Friendly) --- */
        .diagram-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            padding: 1rem 0;
            margin-top: 1rem;
        }
        .diagram-level {
            display: flex;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            flex-wrap: wrap;
        }
        .diagram-box {
            background: rgba(11, 17, 32, 0.7);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; /* Sharper corners for drawing */
            padding: 1.5rem;
            text-align: center;
            min-width: 220px;
            position: relative;
            transition: all 0.3s;
        }
        .box-root {
            border-color: var(--constitution-gold);
            border-width: 3px;
            width: 60%;
            background: rgba(30, 41, 59, 0.9);
        }
        .box-branch {
            flex: 1;
            border-top-color: var(--federal-blue);
            border-top-width: 4px;
        }
        .diagram-connector {
            width: 3px;
            height: 30px;
            background: var(--text-muted);
            margin: -1rem 0;
            opacity: 0.5;
        }
        .diagram-label {
            font-family: var(--font-heading);
            color: white;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .diagram-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }
        .amend-group {
            display: inline-block;
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--constitution-gold);
            border: 1px solid rgba(251, 191, 36, 0.4);
            margin-top: 1rem;
            font-weight: 700;
        }

        /* RAPPS Grid */
        .rapps-header {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--constitution-gold);
            letter-spacing: 5px;
            text-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            margin-bottom: 1rem;
        }
        .freedom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }
        .freedom-card {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }
        .freedom-letter {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--federal-blue);
            font-weight: 700;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
        .freedom-title { color: white; font-family: var(--font-ui); font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; }
        .freedom-vn { color: var(--constitution-gold); font-size: 0.9rem; font-style: italic; margin-bottom: 1rem; }

        /* --- READING LAYOUT --- */
        .reading-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        .col-en { font-size: 1.25rem; line-height: 1.8; color: var(--text-main); font-weight: 400; }
        .col-en p { margin-bottom: 1.8rem; }
        
        .col-vn {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: var(--text-vn);
            font-size: 1.25rem;
            line-height: 1.8;
            border-left: 2px solid rgba(255,255,255,0.08);
            padding-left: 2.5rem;
        }
        .col-vn p { margin-bottom: 1.8rem; }

        /* Interactive Keywords (Animated Pulse) */
        .keyword {
            color: var(--constitution-gold);
            font-weight: 700;
            border-bottom: 2px dashed rgba(251, 191, 36, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            padding: 0 2px;
            animation: pulse-keyword 2.5s infinite;
        }
        @keyframes pulse-keyword {
            0% { text-shadow: 0 0 2px rgba(251, 191, 36, 0.1); }
            50% { text-shadow: 0 0 10px rgba(251, 191, 36, 0.8); }
            100% { text-shadow: 0 0 2px rgba(251, 191, 36, 0.1); }
        }
        .keyword:hover {
            background: rgba(251, 191, 36, 0.15);
            border-bottom-style: solid;
            border-radius: 4px;
            animation: none;
            text-shadow: 0 0 10px var(--constitution-gold);
        }

        /* Definition Dock */
        .def-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(11, 17, 32, 0.98);
            border-top: 3px solid var(--constitution-gold);
            padding: 2rem;
            backdrop-filter: blur(24px);
            transform: translateY(110%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .def-dock.active { transform: translateY(0); }
        .def-content { max-width: 1000px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
        
        /* Quiz */
        .quiz-option {
            width: 100%;
            padding: 1.4rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            font-size: 1.15rem;
            font-family: var(--font-ui);
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quiz-option:hover:not(:disabled) { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--federal-blue); 
            transform: translateX(5px);
        }
        .quiz-option.correct { background: rgba(16, 185, 129, 0.15); border-color: #10b981; color: white; }
        .quiz-option.incorrect { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; color: white; }
        .explanation-box {
            padding: 1.5rem;
            margin-top: 1.5rem;
            border-radius: 0 12px 12px 0;
            display: none;
            animation: fadeIn 0.5s ease;
            font-size: 1.1rem;
            line-height: 1.6;
            border-left: 4px solid;
        }

        /* Typography & Utilities */
        .text-center { text-align: center; }
        .text-gold { color: var(--constitution-gold); font-weight: 700; }
        h1 { font-family: var(--font-heading); font-size: var(--fs-h1); font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
        h2 { font-family: var(--font-heading); font-size: var(--fs-h2); font-weight: 700; color: white; margin-bottom: 1.5rem; letter-spacing: -0.5px;}
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        .slide-up { animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(30px); animation-delay: 0.2s; }
        
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .reading-layout { grid-template-columns: 1fr; gap: 2rem; }
            .col-vn { border-left: none; border-top: 1px dashed rgba(255,255,255,0.2); padding-left: 0; padding-top: 2rem; }
            .diagram-level { flex-direction: column; }
            .box-root { width: 100%; }
            .card { padding: 2rem; }
            .notebook-alert { flex-direction: column; gap: 1rem; padding: 1.5rem; }
            .alert-icon { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">GED Civics</div>
            <span style="font-weight: 600; color: var(--text-muted); font-size: 1rem; font-family: var(--font-ui); display: none; margin-left: 0.5rem; @media(min-width:600px){display:inline;}">The Bill of Rights</span>
        </div>
        <div style="color: var(--constitution-gold); font-size: 1.5rem; text-shadow: 0 0 10px rgba(251,191,36,0.5);">
            <i class="fa-solid fa-scale-balanced"></i>
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Content injected via JS -->
        </div>
        <div style="height: 60px;"></div>
    </main>
    
    <div id="def-dock" class="def-dock">
        <div class="def-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                <div>
                    <span style="color: var(--federal-blue); font-size: 0.9rem; font-family: var(--font-ui); font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Vocabulary Defintion</span>
                    <h3 id="dock-term" style="color: var(--constitution-gold); font-size: 2.2rem; font-family: var(--font-heading); margin: 0.2rem 0 0 0;">Term</h3>
                </div>
                <button onclick="hideDock()" style="background:transparent; border:none; color: white; font-size: 1.5rem; cursor:pointer; opacity: 0.7; transition: opacity 0.2s;"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                    <span style="display: inline-block; background: rgba(255,255,255,0.1); color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem;">ENG</span>
                    <p id="dock-def" style="color: white; font-size: 1.3rem; margin: 0; line-height: 1.5;"></p>
                </div>
                <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--text-vn);">
                    <span style="display: inline-block; background: var(--federal-blue); color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem;">VIE</span>
                    <p id="dock-vn" style="color: var(--text-vn); font-size: 1.2rem; font-weight: 700; margin: 0 0 0.2rem 0;"></p>
                    <p id="dock-vn-def" style="color: var(--text-vn); font-size: 1.15rem; margin: 0; font-style: italic; line-height: 1.5;"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
        <button class="btn-nav" id="btn-next"><i class="fa-solid fa-chevron-right"></i></button>
    </footer>
</div>

<script>
    const glossary = {
        "bill of rights": {
            def: "The first 10 amendments to the U.S. Constitution, listing individual freedoms.",
            vn: "Tuyên ngôn Nhân quyền",
            vn_def: "10 Tu chính án đầu tiên của Hiến pháp Hoa Kỳ, liệt kê các quyền tự do cá nhân."
        },
        "ratify": {
            def: "To officially approve a formal document or treaty.",
            vn: "Phê chuẩn",
            vn_def: "Chính thức chấp thuận một văn bản hoặc hiệp ước."
        },
        "amendment": {
            def: "A change or addition to the Constitution.",
            vn: "Tu chính án",
            vn_def: "Sự thay đổi hoặc bổ sung vào Hiến pháp."
        },
        "warrant": {
            def: "A legal paper, issued by a court, giving police permission to make an arrest, seizure, or search.",
            vn: "Lệnh khám xét / Lệnh bắt giữ",
            vn_def: "Văn bản pháp lý do tòa án cấp, cho phép cảnh sát thực hiện việc bắt giữ, tịch thu hoặc khám xét."
        },
        "probable cause": {
            def: "Reasonable grounds for making a search or pressing a charge.",
            vn: "Căn cứ hợp lý / Lý do chính đáng",
            vn_def: "Cơ sở hợp lý để tiến hành khám xét hoặc buộc tội."
        },
        "seizure": {
            def: "The taking of property or a person by the government.",
            vn: "Tịch thu (Tài sản) / Bắt giữ (Người)",
            vn_def: "Việc chính phủ lấy đi tài sản hoặc bắt giữ một người."
        },
        "due process": {
            def: "Fair treatment through the normal judicial system.",
            vn: "Quy trình tố tụng công bằng",
            vn_def: "Sự đối xử công bằng thông qua hệ thống tư pháp thông thường."
        },
        "double jeopardy": {
            def: "Being tried twice for the same crime (which is forbidden).",
            vn: "Bị xét xử hai lần",
            vn_def: "Việc bị xét xử hai lần cho cùng một tội danh (điều này bị Hiến pháp cấm)."
        },
        "self-incrimination": {
            def: "Giving testimony that can be used against oneself.",
            vn: "Tự buộc tội",
            vn_def: "Đưa ra lời khai có thể được sử dụng để chống lại chính mình."
        },
        "counsel": {
            def: "A lawyer or attorney given to help a defendant.",
            vn: "Luật sư bào chữa",
            vn_def: "Luật sư được chỉ định để giúp đỡ bị cáo."
        },
        "bail": {
            def: "Money paid as a condition for the release of an arrested person until their trial.",
            vn: "Tiền bảo lãnh",
            vn_def: "Tiền được trả như một điều kiện để thả một người bị bắt cho đến khi họ bị xét xử."
        },
        "civil case": {
            def: "A legal dispute between two or more parties (not a criminal charge).",
            vn: "Vụ án dân sự",
            vn_def: "Tranh chấp pháp lý giữa hai hoặc nhiều bên (không phải là cáo buộc hình sự)."
        },
        "federalism": {
            def: "A system where power is divided between national and state governments.",
            vn: "Chủ nghĩa liên bang / Hệ thống liên bang",
            vn_def: "Một hệ thống nơi quyền lực được chia sẻ giữa chính quyền quốc gia và các tiểu bang."

    function renderSlide() {
        // Clear inner HTML to trigger CSS animations on fresh insert
        slideContainer.innerHTML = ''; 
        
        // Small timeout ensures browser registers the DOM clear before adding new content
        setTimeout(() => {
            slideContainer.innerHTML = slides[currentSlide].render();
            const progress = ((currentSlide + 1) / slides.length) * 100;
            progressBar.style.width = `${progress}%`;
            
            btnPrev.disabled = currentSlide === 0;
            btnNext.disabled = currentSlide === slides.length - 1;
            document.getElementById('viewport').scrollTop = 0;
            attachKeywordListeners();
        }, 50);
    }

    function changeSlide(direction) {
        if (direction === 'next' && currentSlide < slides.length - 1) {
            currentSlide++;
            hideDock();
        } else if (direction === 'prev' && currentSlide > 0) {
            currentSlide--;
            hideDock();
        }
        renderSlide();
    }

    function attachKeywordListeners() {
        const keywords = document.querySelectorAll('.keyword');
        keywords.forEach(el => {
            const termKey = el.dataset.term.toLowerCase();
            const data = glossary[termKey];
            if (!data) return;

            el.addEventListener('click', (e) => {
                e.stopPropagation(); 
                showDock(termKey, data);
            });
        });
    }

    function showDock(term, data) {

        document.getElementById('dock-def').innerText = data.def;
        document.getElementById('dock-vn').innerText = data.vn;
        document.getElementById('dock-vn-def').innerText = data.vn_def; 
        dock.classList.add('active');

        dock.classList.remove('active');

        const explainBox = document.getElementById(qId + '-explain');
        const options = parent.querySelectorAll('.quiz-option');
        
        // Disable all buttons in this question
        options.forEach(opt => {
            opt.disabled = true;
            opt.style.cursor = 'default';
            opt.style.opacity = '0.5';
        });

        // Highlight the selected button
        btn.style.opacity = '1';
        btn.style.transform = 'none';
        
        if (isCorrect) {
            btn.classList.add('correct');
            btn.innerHTML += ' <i class="fa-solid fa-check-circle" style="font-size:1.5rem;"></i>';
        } else {
            btn.classList.add('incorrect');
            btn.innerHTML += ' <i class="fa-solid fa-times-circle" style="font-size:1.5rem;"></i>';
        }

        // Show and style the explanation box dynamically
        if(explainBox) {
            explainBox.style.display = 'block';
            const explanationText = explainBox.getAttribute('data-explain');
            
            if (isCorrect) {
                explainBox.style.borderLeftColor = '#10b981';
                explainBox.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                explainBox.innerHTML = `<strong style="color: #10b981; font-size: 1.2rem; display: block; margin-bottom: 0.5rem;">Correct!</strong> ${explanationText}`;

                explainBox.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';

        if(e.key === 'ArrowLeft') changeSlide('prev');
        if(e.key === 'Escape') hideDock();
    });

    // Init
    renderSlide();
