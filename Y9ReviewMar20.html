<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Grading - Year 9 Assessment</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for rendering math equations easily -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Cambridge Bible Standard) --- */
        :root {
            --bg-deep: #0f172a;        /* Deep Slate */
            --bg-panel: #1e293b;       /* Secondary Background */
            --primary: #8b5cf6;        /* Chemical Purple */
            --accent: #10b981;         /* Success/Acid Green */
            --warning: #f59e0b;        /* Hazard Orange */
            --danger: #ef4444;         /* Heat Red */
            --cold: #0ea5e9;           /* Cold Blue */
            --text-light: #f1f5f9;     /* Main Text */
            --text-dim: #94a3b8;       /* Subtitles */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--text-light); }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.15rem; line-height: 1.6; color: var(--text-dim); }

        strong { color: var(--text-light); }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .mark-badge {
            background: var(--accent);
            color: var(--bg-deep);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-left: 10px;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
            display: inline-block;
            margin-top: 0.5rem;
        }

        /* Questions and Reveal Buttons */
        .question-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.2rem;
            color: white;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .btn-reveal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-reveal:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .answer-content {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--accent);
            padding: 1.2rem;
            margin-top: 1rem;
            border-radius: 0 8px 8px 0;
            animation: fadeIn 0.4s ease-out;
        }

        .explanation-box {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--text-dim);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 4px;
        }

        .explanation-box p {
            font-size: 1rem;
            margin-bottom: 0;
        }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--bg-panel);
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-container { flex: 1; margin: 0 2rem; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.3s ease; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }
        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }

        .math-text { font-size: 1.3rem; color: white; margin: 0.5rem 0; }
        
        table.math-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
        }
        table.math-table th, table.math-table td {
            border: 1px solid var(--text-dim);
            padding: 10px;
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }
        table.math-table th { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-check-double"></i> Peer Grading</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 0.9rem;">20 March Assessment solutions</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; color: var(--primary);">
            Year 9 Science & Math
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // Global function for revealing answers
    window.revealAnswer = function(btn) {
        btn.nextElementSibling.style.display = 'block';
        btn.style.display = 'none';
        // Re-trigger MathJax to format any hidden math that was just revealed
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Instructions
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-users delay-1" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: 3.5rem;">Time to Mark!</h1>
                    <h2 class="delay-1" style="color: var(--accent);">20 March Assessment solutions</h2>
                    
                    <div class="glass-card delay-2" style="max-width: 750px; margin: 2rem auto; text-align: left; border-top: 4px solid var(--warning);">
                        <h3 style="color: var(--warning);"><i class="fa-solid fa-exchange-alt"></i> Instructions</h3>
                        <ol style="margin-left: 2rem; margin-top: 1rem; color: white; line-height: 2;">
                            <li>Please <strong>trade papers</strong> with the person in front or behind you.</li>
                            <li>Take out a <strong>Pen or Colored Pencil</strong>. (No normal grey pencils!)</li>
                            <li>Go to the front page. Look for the word <strong style="text-decoration: line-through; color: var(--danger);">Marker</strong>.</li>
                            <li><strong>Cross it out</strong> and write your name as the <strong>Marker</strong>.</li>
                            <li><strong>Write a comment:</strong> Write 1 thing they did well, and 1 thing to work on.</li>
                            <li>Be fair! Only give marks if they have the correct ideas. Read the explanations to help you understand.</li>
                        </ol>
                    </div>
                </div>
            `
        },

        // SLIDE 2: PDF Embed
        {
            template: () => `
                <div class="anim-enter text-center" style="display: flex; flex-direction: column; height: 100%;">
                    <h2 class="delay-1" style="margin-bottom: 0.5rem;">Assessment Reference</h2>
                    <p class="delay-1" style="color: var(--text-dim); margin-bottom: 1rem;">Original Assessment PDF</p>
                    
                    <div class="glass-card delay-2" style="flex: 1; min-height: 60vh; padding: 0.5rem; border-top: 4px solid var(--primary);">
                        <iframe src="Y9ReivewMar20.pdf" width="100%" height="100%" style="border: none; border-radius: 8px; min-height: 58vh;" title="Assessment Review PDF">
                            <p>Your browser does not support iframes. <a href="Y9ReivewMar20.pdf" style="color: var(--accent);">Download the PDF</a>.</p>
                        </iframe>
                    </div>
                </div>
            `
        },

        // SLIDE 3: Science Q1 (Part 1)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Q1: Intro Chemistry <span style="color: var(--text-dim);">|</span> (1/2)</h2>
                    
                    <div class="question-box delay-1">
                        <div class="question-text"><strong>(a) Match each keyword to its definition. (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <ul style="color: white; margin-left: 1rem;">
                                <li><strong>Atom</strong> &rarr; The smallest, single building block of all matter.</li>
                                <li><strong>Element</strong> &rarr; A pure substance made of only one type of atom.</li>
                                <li><strong>Molecule</strong> &rarr; Two or more atoms strongly bonded together.</li>
                            </ul>
                            <div class="explanation-box">
                                <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> Think of an <strong>Atom</strong> as a single Lego brick. An <strong>Element</strong> is a box full of identical Lego bricks. A <strong>Molecule</strong> is when you snap different bricks together to make something new!</p>
                            </div>
                            <span class="mark-badge">1 mark (all must be correct)</span>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(b) Complete the table for subatomic particles. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Proton = Nucleus, <strong>Positive (+)</strong></p>
                            <p style="color: white;"><strong>Neutron</strong> = Nucleus, Neutral (0)</p>
                            <p style="color: white;">Electron = <strong>Shells</strong>, Negative (-)</p>
                            <div class="explanation-box">
                                <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> Remember the trick: <strong>P</strong>rotons are <strong>P</strong>ositive. <strong>N</strong>eutrons are <strong>N</strong>eutral. Electrons are the tiny negative ones zooming around the outside (shells).</p>
                            </div>
                            <span class="mark-badge">2 marks (All 3 blanks correct = 2 marks. 1 or 2 blanks correct = 1 mark)</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(c) The beaker feels cold. Is it exothermic or endothermic, and what is happening to the thermal energy? (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">It is <strong>Endothermic</strong>.</p>
                            <p style="color: white;">It is <strong>taking in</strong> (absorbing) thermal energy from the surroundings.</p>
                            <div class="explanation-box">
                                <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> "Endo" means "in". The chemicals are stealing (taking in) the heat from the air and your hand, which leaves your hand feeling very cold!</p>
                            </div>
                            <span class="mark-badge">2 marks (1 for Endothermic, 1 for taking in heat)</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 4: Science Q1 (Part 2)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Q1: Intro Chemistry <span style="color: var(--text-dim);">|</span> (2/2)</h2>
                    
                    <div class="grid-2">
                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(d) Hydrogen + Oxygen &rarr; Water. Identify Reactants and Products. (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">Reactants: <strong>Hydrogen, Oxygen</strong></p>
                                <p style="color: white;">Products: <strong>Water</strong></p>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> Reactants are the starting ingredients you mix together. Products are what gets made at the end (like baking a cake!).</p>
                                </div>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>

                        <div class="question-box delay-2">
                            <div class="question-text"><strong>(e) Which particle is responsible for chemical bonding? (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">The <strong>Electron</strong>.</p>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> Because electrons live on the outside shells of the atom, they are the parts that can touch, share, or swap with other atoms to make a bond.</p>
                                </div>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="question-box delay-3">
                            <div class="question-text"><strong>(f) True or False: Atoms are destroyed and disappear during a reaction. (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;"><strong>False</strong>.</p>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> Atoms are never destroyed! They are just taken apart and put back together in a new shape. We call this being <strong>rearranged</strong>.</p>
                                </div>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>

                        <div class="question-box delay-3">
                            <div class="question-text"><strong>(g) State two visible signs of a chemical reaction. (2 marks)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">Any two of:</p>
                                <ul style="color: white; margin-left: 1.5rem;">
                                    <li>Color change</li>
                                    <li>Bubbles / Fizzing / Gas</li>
                                    <li>Temperature change (hot/cold)</li>
                                    <li>Light or flame</li>
                                </ul>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> "Visible signs" means things you can easily see or feel happening without needing to do a complex lab test.</p>
                                </div>
                                <span class="mark-badge">2 marks</span>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 5: Science Q2 (Part 1)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Q2: Temp. & Rate <span style="color: var(--text-dim);">|</span> (1/2)</h2>
                    
                    <div class="question-box delay-1">
                        <div class="question-text"><strong>(a) Define the term 'rate of reaction'. (1 mark)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">How <strong>fast</strong> or <strong>slow</strong> a chemical reaction happens.</p>
                            <div class="explanation-box">
                                <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> It is simply the speed at which the starting ingredients turn into the final products.</p>
                            </div>
                            <span class="mark-badge">1 mark</span>
                        </div>
                    </div>

                    <div class="question-box delay-2">
                        <div class="question-text"><strong>(b) Explain 2 reasons why increasing temperature makes a reaction faster using particle theory. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">1. The heat makes the particles move <strong>faster</strong> (more kinetic energy).</p>
                            <p style="color: white;">2. Because they move faster, they crash into each other (<strong>collide</strong>) more often and with more power.</p>
                            <span class="mark-badge">2 marks (1 for moving faster, 1 for more collisions)</span>
                        </div>
                    </div>

                    <div class="question-box delay-3">
                        <div class="question-text"><strong>(c) Explain why using crushed marble powder instead of a large lump increases the rate. (2 marks)</strong></div>
                        <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                        <div class="answer-content">
                            <p style="color: white;">Powder has a much larger <strong>surface area</strong>.</p>
                            <p style="color: white;">This means the acid can touch more of the marble at the same time, leading to <strong>more frequent collisions</strong>.</p>
                            <div class="explanation-box">
                                <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> If it's a big lump, the acid can only touch the outside shell. If you crush it into powder, all the inside pieces are now exposed and can be attacked by the acid immediately!</p>
                            </div>
                            <span class="mark-badge">2 marks</span>
                        </div>
                    </div>
                </div>
            `
        },

        // SLIDE 6: Science Q2 (Part 2)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Q2: Temp. & Rate <span style="color: var(--text-dim);">|</span> (2/2)</h2>
                    
                    <div class="grid-2">
                        <div class="question-box delay-1">
                            <div class="question-text"><strong>(d)(i) Explain how the graph visually shows the 40°C reaction is faster. (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">The line goes up much faster (it is <strong>steeper</strong>).</p>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> A steeper line means more gas is being created in a very short amount of time.</p>
                                </div>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>

                        <div class="question-box delay-2">
                            <div class="question-text"><strong>(d)(ii) Both lines level off. Explain why the reactions stop. (1 mark)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">Because one of the reactants is <strong>completely used up</strong>.</p>
                                <div class="explanation-box">
                                    <p><i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i> <strong>Teacher Explanation:</strong> The reaction has run out of ingredients (like fuel). Once it runs out, it can't make any more gas!</p>
                                </div>
                                <span class="mark-badge">1 mark</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="question-box delay-3">
                            <div class="question-text"><strong>(e) Name two other factors that can change the rate of reaction. (2 marks)</strong></div>
                            <button class="btn-reveal" onclick="window.revealAnswer(this)"><i class="fa-solid fa-eye"></i> Show Answer</button>
                            <div class="answer-content">
                                <p style="color: white;">1. <strong>Concentration</strong> (adding more particles into the liquid).</p>

                    <h1 class="delay-1" style="font-size: 3.5rem;">All Done!</h1>
                    
                    <div class="glass-card delay-2" style="max-width: 650px; margin: 2rem auto; text-align: left; border-top: 4px solid var(--accent);">
                        <ol style="margin-left: 1rem; color: white; font-size: 1.3rem; line-height: 2.2;">
                            <li><strong style="color: var(--danger);">Do NOT</strong> tally up the total score. The person who took the assessment can choose to do that for themselves later.</li>
                            <li>Check that you wrote your name under "Marker" on the front page.</li>
                            <li>Check that you wrote your <strong style="color: var(--warning);">two comments</strong> (1 good thing, 1 thing to work on).</li>
                            <li>Return the paper to the owner!</li>
                        </ol>
                    </div>
                    
                    <h2 class="delay-3" style="color: var(--text-dim);">Thank you for marking fairly!</h2>
                </div>
            `
        }
    ];

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML synchronously
        container.innerHTML = slide.template();
        
        // Ensure MathJax renders any initial visible math immediately
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
</script>

</body>
</html>
