        html, body {

            width: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            background-image:

            align-items: center;

            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 5, 24, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- BUTTONS & CONTROLS --- */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-nav {
            width: 56px;
            height: 56px;
            background: var(--bg-panel);
            color: var(--text-main);
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.2);

            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
        }

        .btn-action {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-top: 1rem;
        }
        .btn-action:hover { background: #7c3aed; transform: translateY(-2px); }

        .progress-container {
            flex: 1;
            margin: 0 2rem;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--warning), var(--accent));
            transition: width 0.4s ease;

        .text-center { text-align: center; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; color: white; }
        h1 { font-size: var(--fs-h1); line-height: 1.1; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        h2 { font-size: var(--fs-h2); margin-bottom: 1.5rem; }
        h3 { font-size: var(--fs-h3); margin-bottom: 1rem; }
        p, li { font-size: var(--fs-body); color: var(--text-dim); line-height: 1.6; font-weight: 500; margin-bottom: 0.5rem; }
        strong { color: white; font-weight: 800; }
        .term { color: var(--warning); font-weight: 800; font-family: 'Outfit', sans-serif;}

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; align-items: center; }

        /* --- CAMBRIDGE PEDAGOGICAL COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }

        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.05);
            position: relative;
        }
        .pedagogical-badge {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .note-write { border-left: 5px solid var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }

        .note-task .pedagogical-badge { color: var(--warning); }

        .note-theory .pedagogical-badge { color: var(--danger); }

        .note-success .pedagogical-badge { color: var(--accent); }

        /* Legacy Pills */
        .draw-pill {
            display: inline-block;
            background: rgba(236, 72, 153, 0.15);
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        /* --- REVEAL CARD COMPONENT --- */
        .reveal-card {
            background: var(--bg-panel);
            border: 2px dashed var(--warning);
            border-radius: var(--border-radius);
            padding: 2rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
        }
        .reveal-card:hover, .reveal-card:focus { background: rgba(245, 158, 11, 0.1); }
        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .reveal-card.revealed { border-style: solid; border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .reveal-card.revealed .pre-reveal { color: var(--text-dim); }
        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }
        .reveal-icon { font-size: 2rem; color: var(--warning); margin-bottom: 1rem; }

        /* --- MATHS CHECK / CALCULATOR --- */
        .calc-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1.2rem;
            width: 100%;
            margin-bottom: 1rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .calc-input:focus { border-color: var(--accent); outline: none; }
        .calc-result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            font-size: 1.5rem;
            text-align: center;
            display: none;
        }
        
        /* Table Styles */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            color: white;
        }
        .data-table th, .data-table td {
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .data-table th { background: rgba(255,255,255,0.1); font-weight: 700; color: var(--accent); }
        .data-table td { font-size: 1.2rem; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .anim-enter-up { animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        
        .fire-icon { color: var(--warning); filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6)); }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>

            template: () => `
                <div class="grid-2 anim-enter">
                    <div>
                        <h2><i class="fa-solid fa-calculator" style="color: var(--accent);"></i> The Maths Check</h2>
                        <p>To compare reactions fairly, we calculate the <strong>Temperature Change (\(\\Delta T\))</strong>.</p>
                        
                        <div class="pedagogical-note note-write" style="margin-top: 1.5rem;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Formula</div>
                            <p style="font-size: 1.4rem; text-align: center; font-weight: 700;">
                                \\( \\Delta T = T_{end} - T_{start} \\)
                            </p>
                        </div>
                        
                        <p style="margin-top: 1rem;">Use the calculator on the right to find the temperature change for Sofia and Marcus from the previous slide.</p>
                    </div>
                    
                    <div class="glass-card anim-enter-up delay-1 text-center" style="border-top: 4px solid var(--accent);">
                        <h3 style="margin-bottom: 1.5rem;">Calculate \(\\Delta T\)</h3>
                        
                        <div style="text-align: left;">
                            <label style="color: var(--text-dim); font-size: 0.9rem;">Start Temperature (°C)</label>
                            <input id="input-start" class="calc-input" type="number" placeholder="e.g. 18">
                            
                            <label style="color: var(--text-dim); font-size: 0.9rem;">End Temperature (°C)</label>

            `,

                const btn = container.querySelector('#btn-calc');

                const inStart = container.querySelector('#input-start');
                const inEnd = container.querySelector('#input-end');

                const handleCalc = () => {
                    if(inStart.value === '' || inEnd.value === '') return;
                    const start = Number(inStart.value);
                    const end = Number(inEnd.value);
                    const dt = end - start;
                    
                    res.style.display = 'block';
                    res.innerHTML = `<strong>\\( \\Delta T = ${dt} \\ ^\\circ C \\)</strong>`;
                    
                    // Re-run MathJax for the new dynamic content
                    if (window.MathJax) {
                        MathJax.typesetPromise([res]).catch((err) => console.log(err));
                    }
                };

                btn.addEventListener('click', handleCalc);

                // MANDATORY CLEANUP
                return () => {

    // --- REUSABLE SCRIPTS ---
    function setupRevealCards(container) {
        const reveals = container.querySelectorAll('.reveal-card');
        const handlers = [];
        
        reveals.forEach(r => {
            const handler = (e) => {
                if(e.type === 'click' || (e.type === 'keypress' && e.key === 'Enter')) {
                    r.classList.toggle('revealed');
                }
            };
            r.addEventListener('click', handler);
            r.addEventListener('keypress', handler);
            handlers.push({r, handler});
        });

        // MANDATORY CLEANUP
        return () => {
            handlers.forEach(h => {
                h.r.removeEventListener('click', h.handler);
                h.r.removeEventListener('keypress', h.handler);
            });
        };
    }

    // --- CORE ENGINE LOGIC ---
    function render() {
        // 1. Execute Cleanup of previous slide to prevent memory leaks
        if (state.currentCleanupFn && typeof state.currentCleanupFn === 'function') {
            state.currentCleanupFn();
            state.currentCleanupFn = null;
        }

        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        // 2. Render Template
        container.innerHTML = slide.template();
        
        // 3. Execute Script & Store Cleanup
        if (slide.script) {
            state.currentCleanupFn = slide.script(container);
        }
        
        // 4. Update UI Elements
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;

        // 5. Typeset MathJax dynamically for the new content
        if (window.MathJax) {
            MathJax.typesetPromise([container]).catch((err) => console.log('MathJax Error:', err));
        }
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- GLOBAL EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        // Ignore keydown if user is inside an input (like the calculator)
        if(e.target.tagName.toLowerCase() === 'input') return;
        
        if (e.key === 'ArrowRight') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize Engine
    render();

</script>
