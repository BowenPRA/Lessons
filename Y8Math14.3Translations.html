<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14.3 Translating 2D Shapes - Year 8 Math</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for formulas -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (BOWEN ENGINE) --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #3b82f6;        
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;         
            --warning: #f59e0b;        
            --danger: #ef4444;         
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto; 
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #93c5fd; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        p, li { line-height: 1.6; margin-bottom: 1rem; font-size: 1.3rem; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-nav {
            width: 56px; height: 56px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-light);
            font-size: 1.4rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.4); }

        /* Progress Bar */
        .progress-container { flex: 1; margin: 0 3rem; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #60a5fa); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow); }

        /* Math Styling */
        .math-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            font-size: 2rem; 
            color: white;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); } 50% { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.8)); } 100% { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); } }
        
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }

        .hidden { display: none !important; }
        .text-center { text-align: center; }

    </style>
</head>
<body>

<!-- GLOBAL SVG DEFS FOR GRIDS AND GRAPHICS -->
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <defs>
        <pattern id="cartesian-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        </pattern>
        <pattern id="cartesian-grid-thick" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        </pattern>
        
        <filter id="field-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Base Cartesian Grid 400x400 -->
        <g id="base-axes">
            <rect width="400" height="400" fill="url(#cartesian-grid)" />
            <rect width="400" height="400" fill="url(#cartesian-grid-thick)" />
            <line x1="200" y1="0" x2="200" y2="400" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
            <line x1="0" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
            <polygon points="200,0 195,12 205,12" fill="rgba(255,255,255,0.8)"/>
            <text x="215" y="15" fill="rgba(255,255,255,0.9)" font-family="Outfit" font-weight="bold" font-size="16">y</text>
            <polygon points="400,200 388,195 388,205" fill="rgba(255,255,255,0.8)"/>
            <text x="380" y="185" fill="rgba(255,255,255,0.9)" font-family="Outfit" font-weight="bold" font-size="16">x</text>
            <text x="182" y="218" fill="rgba(255,255,255,0.6)" font-size="12" font-family="Outfit" font-weight="bold">0</text>
            <g fill="rgba(255,255,255,0.7)" font-size="12" font-family="Outfit" font-weight="bold" text-anchor="middle">
                <text x="240" y="218">2</text><line x1="240" y1="195" x2="240" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="280" y="218">4</text><line x1="280" y1="195" x2="280" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="320" y="218">6</text><line x1="320" y1="195" x2="320" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="360" y="218">8</text><line x1="360" y1="195" x2="360" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="160" y="218">-2</text><line x1="160" y1="195" x2="160" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="120" y="218">-4</text><line x1="120" y1="195" x2="120" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="80" y="218">-6</text><line x1="80" y1="195" x2="80" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="40" y="218">-8</text><line x1="40" y1="195" x2="40" y2="205" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
            </g>
            <g fill="rgba(255,255,255,0.7)" font-size="12" font-family="Outfit" font-weight="bold" text-anchor="end" dominant-baseline="middle">
                <text x="190" y="160">2</text><line x1="195" y1="160" x2="205" y2="160" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="120">4</text><line x1="195" y1="120" x2="205" y2="120" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="80">6</text><line x1="195" y1="80" x2="205" y2="80" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="40">8</text><line x1="195" y1="40" x2="205" y2="40" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="240">-2</text><line x1="195" y1="240" x2="205" y2="240" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="280">-4</text><line x1="195" y1="280" x2="205" y2="280" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="320">-6</text><line x1="195" y1="320" x2="205" y2="320" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
                <text x="190" y="360">-8</text><line x1="195" y1="360" x2="205" y2="360" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
            </g>
        </g>
    </defs>
</svg>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 8 Math</div>
            <span style="font-weight: 700; color: #cbd5e1; font-size: 1.2rem; letter-spacing: 0.5px;">14.3 Translating 2D Shapes</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);">
            14 April 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // --- THE BOWEN ENGINE ---

    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            document.querySelector('.slide-wrapper').scrollTo({ top: 0, behavior: 'auto' });

            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                MathJax.typesetPromise([container]).catch((err) => console.log('MathJax error:', err));
            }
        }
    };

    // --- LESSON CONTENT ---

    const lessonSlides = [
        // Slide 1: Objective
        {
            template: () => `
                <div class="anim-enter text-center">
                    <div style="position: relative; display: inline-block; margin-bottom: 2rem; animation: pulseGlow 4s infinite;">
                        <svg viewBox="0 0 400 200" width="300" height="150" style="filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.3));">
                            <!-- Ghost shape -->
                            <rect x="50" y="50" width="80" height="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-dasharray="8 8"/>
                            <!-- Arrow -->
                            <path d="M 140 90 L 250 90" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 5">
                                <animate attributeName="stroke-dashoffset" from="15" to="0" dur="1s" repeatCount="indefinite" />
                            </path>
                            <polygon points="260,90 245,80 245,100" fill="var(--accent)"/>
                            <!-- Solid shape -->
                            <rect x="270" y="50" width="80" height="80" fill="rgba(59, 130, 246, 0.8)" stroke="var(--primary)" stroke-width="4"/>
                        </svg>
                    </div>
                    <h1>14.3 Translating 2D Shapes</h1>
                    
                    <div style="background: rgba(16, 185, 129, 0.15); border-left: 6px solid var(--accent); padding: 1.5rem 2rem; border-radius: 12px; max-width: 850px; margin: 3rem auto; text-align: left;" class="delay-1">
                        <p style="font-size: 1.2rem; text-transform: uppercase; font-weight: bold; color: #34d399; margin-bottom: 0.5rem; letter-spacing: 1px;">Lesson Objective</p>
                        <p style="font-size: 2rem; font-weight: bold; line-height: 1.3; margin: 0; color: white;">
                            We will learn how to slide shapes across a coordinate grid using translations and column vectors.
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: Starter Task (Draw Square)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Starter Task</h2>
                    
                    <div class="grid-2" style="max-width: 1100px; margin: 2rem auto; align-items: center;">
                        <div class="delay-1">
                            <ol style="font-size: 1.5rem; line-height: 1.8;">
                                <li style="margin-bottom: 1.5rem;">Plot the following coordinates and connect them to form a square:</li>
                            </ol>
                            
                            <div class="glass-card text-center" style="padding: 1.5rem; margin: 1.5rem 0; border-color: var(--primary);">
                                <h3 style="font-size: 1.8rem; margin: 0;">
                                    \\( A(-4, 2) \\) &nbsp;&nbsp; \\( B(-2, 2) \\) <br><br>
                                    \\( C(-2, 0) \\) &nbsp;&nbsp; \\( D(-4, 0) \\)
                                </h3>
                            </div>

                            <p style="font-size: 1.3rem; color: var(--accent); font-weight: bold; margin-bottom: 2rem;">
                                Bonus: From our last lesson, find and mark the midpoint of each side!
                            </p>

                            <button id="btn-reveal-1" class="btn btn-action" style="width: 100%;">
                                <i class="fa-solid fa-eye"></i> Show Answer
                            </button>
                        </div>

                        <!-- SVG Grid -->
                        <div class="glass-card delay-2 text-center" style="padding: 1.5rem; display: flex; align-items: center; justify-content: center; background: #020617;">
                            <svg viewBox="0 0 400 400" width="100%" height="400" style="max-width: 400px;">
                                <use href="#base-axes" />
                                
                                <g id="answer-group-1" style="opacity: 0; transition: opacity 0.5s ease;">
                                    <!-- A(-4,2)->(120,160), B(-2,2)->(160,160), C(-2,0)->(160,200), D(-4,0)->(120,200) -->
                                    <polygon points="120,160 160,160 160,200 120,200" fill="rgba(59, 130, 246, 0.3)" stroke="var(--primary)" stroke-width="4" filter="url(#field-glow)"/>
                                    
                                    <!-- Vertices -->
                                    <circle cx="120" cy="160" r="5" fill="white"/><text x="105" y="155" fill="white" font-weight="bold">A</text>
                                    <circle cx="160" cy="160" r="5" fill="white"/><text x="170" y="155" fill="white" font-weight="bold">B</text>
                                    <circle cx="160" cy="200" r="5" fill="white"/><text x="170" y="215" fill="white" font-weight="bold">C</text>
                                    <circle cx="120" cy="200" r="5" fill="white"/><text x="105" y="215" fill="white" font-weight="bold">D</text>

                                    <!-- Midpoints -->
                                    <!-- M_AB (-3, 2) -> (140, 160) -->
                                    <circle cx="140" cy="160" r="4" fill="var(--accent)"/><text x="140" y="150" fill="var(--accent)" font-size="12" font-weight="bold" text-anchor="middle">M</text>
                                    <!-- M_BC (-2, 1) -> (160, 180) -->
                                    <circle cx="160" cy="180" r="4" fill="var(--accent)"/><text x="175" y="185" fill="var(--accent)" font-size="12" font-weight="bold">M</text>
                                    <!-- M_CD (-3, 0) -> (140, 200) -->
                                    <circle cx="140" cy="200" r="4" fill="var(--accent)"/><text x="140" y="215" fill="var(--accent)" font-size="12" font-weight="bold" text-anchor="middle">M</text>
                                    <!-- M_DA (-4, 1) -> (120, 180) -->
                                    <circle cx="120" cy="180" r="4" fill="var(--accent)"/><text x="105" y="185" fill="var(--accent)" font-size="12" font-weight="bold" text-anchor="end">M</text>
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const btn = container.querySelector('#btn-reveal-1');
                const answer = container.querySelector('#answer-group-1');
                const reveal = () => { answer.style.opacity = '1'; btn.style.display = 'none'; };
                btn.addEventListener('click', reveal);
                return () => btn.removeEventListener('click', reveal);
            }
        },

        // Slide 3: Draw a Triangle
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Plot a Triangle</h2>
                    
                    <div class="grid-2" style="max-width: 1100px; margin: 2rem auto; align-items: center;">
                        <div>
                            <p style="font-size: 1.5rem; margin-bottom: 2rem;">Draw a new coordinate grid. Plot these points and connect them to form a triangle:</p>
                            
                            <div class="glass-card text-center" style="padding: 1.5rem; margin: 1.5rem 0;">
                                <h3 style="font-size: 2rem; color: #ec4899; margin: 0;">
                                    \\( P(1, -1) \\) <br><br> \\( Q(5, -1) \\) <br><br> \\( R(3, 3) \\)
                                </h3>
                            </div>

                            <button id="btn-reveal-2" class="btn btn-action" style="width: 100%; background: linear-gradient(135deg, #ec4899, #be185d);">
                                <i class="fa-solid fa-eye"></i> Show Triangle
                            </button>
                        </div>

                        <!-- SVG Grid -->
                        <div class="glass-card text-center" style="padding: 1.5rem; display: flex; align-items: center; justify-content: center; background: #020617;">
                            <svg viewBox="0 0 400 400" width="100%" height="400" style="max-width: 400px;">
                                <use href="#base-axes" />
                                
                                <g id="answer-group-2" style="opacity: 0; transition: opacity 0.5s ease;">
