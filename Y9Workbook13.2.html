<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13.2 Experimental vs Theoretical Probabilities</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg-paper: #fdfbf7;       
            --bg-panel: #ffffff;       
            --primary: #2563eb;        
            --accent: #16a34a;         
            --warning: #ea580c;        
            --danger: #dc2626;         
            --cold: #0284c7;           
            --purple: #9333ea;
            --text-main: #334155;      
            --text-dim: #64748b;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            overflow: hidden;
            display: grid;
            place-items: center;
        }

        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-main); margin: 0; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; text-align: center; width: 100%; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); margin: 0; margin-bottom: 0.5rem;}

        strong { color: var(--text-main); font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        
        /* Layout Grids */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; width: 100%; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; align-items: stretch; width: 100%; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; align-items: stretch; width: 100%; }

        /* --- LAYOUT SHELL --- */
        .app-shell { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw;
        }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: #ffffff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
            flex-shrink: 0;
        }

        .brand-pill {
            background: var(--purple);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 2px 2px 0px rgba(147, 51, 234, 0.3);
        }

        .viewport {
            flex: 1;
            position: relative;
            background-image:
                linear-gradient(90deg, transparent 60px, rgba(220, 38, 38, 0.2) 60px, rgba(220, 38, 38, 0.2) 62px, transparent 62px),
                linear-gradient(rgba(147, 51, 234, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 32px;
            background-attachment: local;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        /* Strict Slide Container Guidelines */
        .slide-container {
            align-items: center;
            background-color: transparent; 
            display: flex;
            flex-direction: column;
            min-height: 100%;
            justify-content: center;
            padding: 40px 60px 40px 100px;
            position: relative;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
        }

        .slide-container > * { width: 100%; }
        .content-area { display: flex; flex-direction: column; flex-grow: 1; justify-content: center; width: 100%; align-items: center;}

        .footer {
            height: var(--footer-h);
            background: #ffffff;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
            flex-shrink: 0;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            width: 100%;
        }

        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            background: #ffffff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            animation: slideIn 0.5s ease;
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
            width: 100%;
        }
        .pedagogical-note p, .pedagogical-note li, .pedagogical-note h3 { font-family: 'Kalam', cursive; }
        .pedagogical-badge {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        .note-theory { border-color: var(--purple); }
        .note-theory .pedagogical-badge { color: var(--purple); }

        .problem-block {
            background: #ffffff;
            border: 2px dashed var(--purple);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            width: 100%;
        }
        .problem-number {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--purple);
            margin-right: 0.5rem;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            width: 100%;
        }
        .btn-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 4px 4px 0px rgba(0,0,0,0.2); }
        .btn-action.btn-accent { background: var(--accent); }
        .btn-action.btn-warning { background: var(--warning); }
        .btn-action.btn-purple { background: var(--purple); }
        .btn-action.btn-small { padding: 0.5rem 1rem; font-size: 1rem; }

        .answer-box {
            display: none; 
            background: #ffffff; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border: 2px solid var(--accent); 
            margin-top: 1rem; 
            box-shadow: 3px 3px 0px rgba(22, 163, 74, 0.2);
            text-align: center;
            width: 100%;
        }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; margin-bottom: 0.5rem; color: var(--text-main); background: #ffffff; font-size: 1.2rem; }
        .data-table th, .data-table td { border: 2px solid rgba(0,0,0,0.2); padding: 0.5rem; text-align: center; }
        .data-table th { background: rgba(147, 51, 234, 0.1); color: var(--text-main); font-family: 'Outfit'; font-weight: bold; }

        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        .progress-container { flex: 1; margin: 0 2rem; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cold), var(--purple)); transition: width 0.3s ease; }

        /* Formula Containers */
        .formula-container {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0.5rem 0;
            width: 100%;
        }
        math { font-size: 1.4rem; color: var(--text-main); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-enter { animation: fadeIn 0.4s ease-out; width: 100%; }
        .delay-1 { animation: slideIn 0.4s ease-out 0.1s both; }
        .delay-2 { animation: slideIn 0.4s ease-out 0.2s both; }

        /* Spinner CSS */
        .spinner-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto;
        }
        .spinner-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: #1e293b;
            z-index: 10;
        }
        .spinner-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            transition: transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .spinner-slice { cursor: pointer; transition: opacity 0.2s; }
        .spinner-slice:hover { opacity: 0.8; }
        
        /* Utility */
        .color-badge { display: inline-block; width: 15px; height: 15px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .bg-red { background-color: var(--danger); }
        .bg-green { background-color: var(--accent); }
        .bg-blue { background-color: var(--primary); }

    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-dice"></i> Year 8 Math</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;">13.2 Experimental vs Theoretical Probabilities</span>
        </div>
        <div style="font-family: 'Kalam', cursive; font-weight: 700; color: var(--text-main); font-size: 1.2rem;">
            31 March 2026
        </div>
    </header>

    <main class="viewport">
        <!-- Slides are injected here -->
        <div id="slide-root" style="width: 100%; height: 100%;"></div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
        <button class="btn-nav" id="btn-next" aria-label="Next Slide"><i class="fa-solid fa-chevron-right"></i></button>
    </footer>
</div>

<script>
    // --- GLOBAL STATE ---
    // Start with a mix of colors (No Blank options allowed)
    window.spinnerColors = ['red', 'green', 'blue', 'red', 'green', 'blue', 'red', 'green', 'blue', 'red'];
    
    const state = { currentSlide: 0, slides: [], cleanupFn: null };

    // --- HELPER FUNCTIONS ---
    const bindReveals = (container) => {
        const btns = container.querySelectorAll('.reveal-btn');
        const handlers = [];
        btns.forEach(btn => {
            const handler = () => {
                const targetId = btn.getAttribute('data-target');
                const target = container.querySelector('#' + targetId);
                target.style.display = 'block';
                target.classList.add('anim-enter');
                btn.style.display = 'none';
                
                // Re-typeset math if needed
                if (window.MathJax) { window.MathJax.typesetPromise([target]); }
            };
            handlers.push({ el: btn, fn: handler });
            btn.addEventListener('click', handler);
        });
        return () => handlers.forEach(h => h.el.removeEventListener('click', h.fn));
    };

    // Generates SVG code for a 10-piece pie chart based on window.spinnerColors
    const drawSpinnerSVG = (colors) => {
        let svg = `<svg viewBox="0 0 100 100" class="spinner-svg" id="active-spinner">`;
        for(let i=0; i<10; i++) {
            let a1 = (i * 36 - 90) * Math.PI / 180; // Start at -90deg (top)
            let a2 = ((i+1) * 36 - 90) * Math.PI / 180;
            let x1 = 50 + 50 * Math.cos(a1);
            let y1 = 50 + 50 * Math.sin(a1);
            let x2 = 50 + 50 * Math.cos(a2);
            let y2 = 50 + 50 * Math.sin(a2);
            
            let colorCode = '#cbd5e1'; 
            if (colors[i] === 'red') colorCode = 'var(--danger)';
            else if (colors[i] === 'green') colorCode = 'var(--accent)';
            else if (colors[i] === 'blue') colorCode = 'var(--primary)';
            
            // Draw pie slice path
            svg += `<path d="M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z" fill="${colorCode}" stroke="#fff" stroke-width="0.5" data-idx="${i}" class="spinner-slice" />`;
        }
        svg += '</svg>';
        return svg;
    };

    // Calculate theoretical probability based on current colors
    const getTheoreticalCount = (color) => {
        return window.spinnerColors.filter(c => c === color).length;
    };

    // --- SLIDES DEFINITION ---
    state.slides = [
        // SLIDE 1: Title & Objective
        {
            template: () => `
                <div class="slide-container" id="slide1">
                    <div class="anim-enter text-center content-area" style="justify-content: center;">
                        <i class="fa-solid fa-bullseye delay-1" style="font-size: 5rem; color: var(--purple); margin-bottom: 1rem;"></i>
                        <h1 class="delay-1" style="font-size: 3.5rem;">Experimental vs. Theoretical</h1>
                        <h2 class="delay-1" style="color: var(--accent);">Putting Probability to the Test</h2>
                        
                        <div class="pedagogical-note note-write delay-2" style="max-width: 800px; margin: 3rem auto; text-align: left; transform: rotate(-1deg);">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Today's Objective</div>
                            <h3 style="color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem;">I will...</h3>
                            <p style="font-size: 1.6rem; line-height: 1.4;">Calculate theoretical probabilities and compare them directly to experimental probabilities.</p>
                        </div>
                    </div>
                </div>
            `,
            script: () => () => {}
        },

        // SLIDE 2: Crucial Rule Note
        {
            template: () => `
                <div class="slide-container" id="slide2">
                    <div class="anim-enter content-area" style="justify-content: center;">
                        <div class="pedagogical-note note-write" style="max-width: 900px; margin: 0 auto; padding: 3rem; transform: rotate(0.5deg);">
                            <div class="pedagogical-badge" style="font-size: 1.2rem; margin-bottom: 1rem;"><i class="fa-solid fa-book-open"></i> Write This Down in Your Notebook</div>
                            <h3 style="color: var(--primary); font-size: 2.2rem; margin-bottom: 1.5rem; text-align: center;">The Golden Rule of Probability</h3>
                            
                            <p style="font-size: 2rem; text-align: center; margin: 1.5rem 0; color: var(--text-main); line-height: 1.5;">
                                Probability is always between <strong>0% and 100%</strong>.
                            </p>
                            
                            <hr style="border: 1px dashed rgba(0,0,0,0.1); margin: 2rem 0;">
                            
                            <p style="font-size: 2rem; text-align: center; margin: 1.5rem 0; color: var(--purple); line-height: 1.5;">
                                This is exactly the same as being a decimal between <strong>0 and 1</strong>.
                            </p>
                        </div>
                    </div>
                </div>
            `,
            script: () => () => {}
        },

        // SLIDE 3: Interactive Spinner (1 Spin)
        {
            template: () => `
                <div class="slide-container" id="slide3">
                    <h2>Interactive Spinner (10 Equal Pieces)</h2>
                    <div class="content-area">
                        <div class="grid-2">
                            <!-- Left: Spinner -->
                            <div class="glass-card" style="text-align: center; border-top: 4px solid var(--primary);">
                                <h3 style="margin-bottom: 0.5rem;">Customise Your Spinner</h3>
                                <p style="font-size: 1.1rem; color: var(--text-dim); margin-bottom: 1.5rem;">Click the pieces below to change their colours.</p>
                                
                                <div class="spinner-wrapper" id="spinner-container-1">
                                    <i class="fa-solid fa-caret-down spinner-pointer"></i>
                                    <!-- SVG Injected Here -->
                                </div>
                            </div>

                            <!-- Right: Simulation & Results -->
                            <div class="glass-card" style="border-top: 4px solid var(--warning); display: flex; flex-direction: column;">
                                <div>
                                    <h3 style="color: var(--warning);"><i class="fa-solid fa-rotate"></i> Spin 1 Time</h3>
                                    <p style="margin-bottom: 1.5rem;">Let's test out your spinner. Give it a spin!</p>
                                    
                                    <button class="btn-action btn-warning" id="btn-spin-1"><i class="fa-solid fa-play"></i> Spin 1 Time</button>
                                </div>
                                
                                <div id="results-1" style="display: none; margin-top: 1.5rem; background: rgba(0,0,0,0.03); padding: 1.5rem; border-radius: 8px; flex-grow: 1;">
                                    <h4 style="margin-bottom: 1rem; font-size: 1.4rem;">Result:</h4>
                                    <p style="font-size: 1.5rem; text-align: center; font-weight: bold; margin-bottom: 1rem;" id="spin-result-text">-</p>
                                    
                                    <div class="pedagogical-note note-theory" style="margin-top: 1.5rem; margin-bottom: 0; padding: 1rem; font-size: 1.1rem;">
                                        <strong>Question for the Class:</strong><br>
                                        Based on how you coloured the spinner, what is the <strong>Theoretical Probability</strong> of landing on Red? Green? Blue?
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const spinnerDiv = container.querySelector('#spinner-container-1');
                
                // Render and bind click events to change slice colors (No blank)
                const renderSpinner = () => {
                    spinnerDiv.innerHTML = '<i class="fa-solid fa-caret-down spinner-pointer"></i>' + drawSpinnerSVG(window.spinnerColors);
                    spinnerDiv.querySelectorAll('.spinner-slice').forEach(el => {
                        el.addEventListener('click', (e) => {
                            let idx = parseInt(e.target.getAttribute('data-idx'));
                            let cycle = { 'red': 'green', 'green': 'blue', 'blue': 'red' };
                            window.spinnerColors[idx] = cycle[window.spinnerColors[idx]];
                            renderSpinner(); // Re-render visual
                        });
                    });
                };
                renderSpinner();

                const btn = container.querySelector('#btn-spin-1');
                const resultsDiv = container.querySelector('#results-1');
                const resultText = container.querySelector('#spin-result-text');
                const handlers = [];

                const spinHandler = () => {
                    // Pick 1 random slice
                    let randIdx = Math.floor(Math.random() * 10);
                    let winningColor = window.spinnerColors[randIdx];
                    
                    // Visual Spin Animation
                    let svg = spinnerDiv.querySelector('.spinner-svg');
                    let currentRot = parseInt(svg.dataset.rot || 0);
                    let newRot = currentRot + 1080 + Math.floor(Math.random()*360);
                    svg.style.transform = `rotate(${newRot}deg)`;
                    svg.dataset.rot = newRot;

                    setTimeout(() => {
                        resultsDiv.style.display = 'block';
                        resultsDiv.classList.add('anim-enter');
                        
                        if (winningColor === 'red') {
                            resultText.innerHTML = '<span style="color: var(--danger);">Landed on Red!</span>';
                        } else if (winningColor === 'green') {
                            resultText.innerHTML = '<span style="color: var(--accent);">Landed on Green!</span>';
                        } else if (winningColor === 'blue') {
                            resultText.innerHTML = '<span style="color: var(--primary);">Landed on Blue!</span>';
                        }
                    }, 1500); // Wait for spin animation
                };

                btn.addEventListener('click', spinHandler);
                handlers.push({ el: btn, fn: spinHandler });

                return () => handlers.forEach(h => h.el.removeEventListener('click', h.fn));
            }
        },

        // SLIDE 4: Large Simulation (500 Spins)
        {
            template: () => `
                <div class="slide-container" id="slide4">
                    <h2>Large Scale Simulation (500 Spins)</h2>
                    <div class="content-area">
                        <div class="grid-2">
                            <!-- Left: Spinner Read-Only -->
                            <div class="glass-card" style="text-align: center; border-top: 4px solid var(--purple);">
                                <h3 style="margin-bottom: 1rem;">Current Spinner Setup</h3>
                                <div class="spinner-wrapper" id="spinner-container-2" style="width: 180px; height: 180px; margin-bottom: 2rem;">
                                    <i class="fa-solid fa-caret-down spinner-pointer" style="top: -10px;"></i>
                                    <!-- SVG Injected Here -->
                                </div>
                                <button class="btn-action btn-purple" id="btn-spin-500"><i class="fa-solid fa-forward-fast"></i> Simulate 500 Spins</button>
                            </div>

                            <!-- Right: Detailed Table -->
                            <div class="glass-card" style="padding: 1.5rem;">
                                <h3 style="color: var(--text-main); font-size: 1.4rem;">Simulation Results</h3>
                                <table class="data-table" id="sim-table" style="font-size: 1.1rem; opacity: 0.3; transition: opacity 0.5s;">
                                    <tr>
                                        <th>Colour</th>
                                        <th>Frequency</th>
                                        <th>Experimental Prob</th>
                                    </tr>
                                    <tr>
                                        <td><span class="color-badge bg-red"></span> Red</td>
                                        <td id="sim-freq-red">-</td>
                                        <td id="sim-exp-red">-</td>
                                    </tr>
                                    <tr>
                                        <td><span class="color-badge bg-green"></span> Green</td>
                                        <td id="sim-freq-green">-</td>
                                        <td id="sim-exp-green">-</td>
                                    </tr>
                                    <tr>
                                        <td><span class="color-badge bg-blue"></span> Blue</td>
                                        <td id="sim-freq-blue">-</td>
                                        <td id="sim-exp-blue">-</td>
                                    </tr>
                                </table>
                                
                                <div style="text-align: center; margin-top: 1.5rem;">
                                    <button class="btn-action btn-accent" id="btn-reveal-exp" style="display: none;"><i class="fa-solid fa-eye"></i> Calculate Experimental Probability</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const spinnerDiv = container.querySelector('#spinner-container-2');
                spinnerDiv.innerHTML = '<i class="fa-solid fa-caret-down spinner-pointer" style="top: -10px;"></i>' + drawSpinnerSVG(window.spinnerColors);

                const btnSimulate = container.querySelector('#btn-spin-500');
                const btnRevealExp = container.querySelector('#btn-reveal-exp');
                const table = container.querySelector('#sim-table');
                const handlers = [];
                
                let currentCounts = { red: 0, green: 0, blue: 0 };

                const simHandler = () => {
                    currentCounts = { red: 0, green: 0, blue: 0 };
                    for(let i=0; i<500; i++) {
                        let randIdx = Math.floor(Math.random() * 10);
                        currentCounts[window.spinnerColors[randIdx]]++;
                    }
                    
                    // Visual Spin Animation
                    let svg = spinnerDiv.querySelector('.spinner-svg');
                    let currentRot = parseInt(svg.dataset.rot || 0);
                    let newRot = currentRot + 1800 + Math.floor(Math.random()*360);
                    svg.style.transform = `rotate(${newRot}deg)`;
                    svg.dataset.rot = newRot;

                    setTimeout(() => {
                        // Reveal Frequencies only
                        container.querySelector('#sim-freq-red').innerText = currentCounts.red;
                        container.querySelector('#sim-freq-green').innerText = currentCounts.green;
                        container.querySelector('#sim-freq-blue').innerText = currentCounts.blue;

                        // Reset Exp Prob column visually
                        container.querySelector('#sim-exp-red').innerText = '-';
                        container.querySelector('#sim-exp-green').innerText = '-';
                        container.querySelector('#sim-exp-blue').innerText = '-';

                        table.style.opacity = '1';
                        btnRevealExp.style.display = 'inline-flex';
                        btnRevealExp.classList.add('anim-enter');
                    }, 1500);
                };

                const revealExpHandler = () => {
                    container.querySelector('#sim-exp-red').innerText = ((currentCounts.red / 500) * 100).toFixed(1) + '%';
                    container.querySelector('#sim-exp-green').innerText = ((currentCounts.green / 500) * 100).toFixed(1) + '%';
                    container.querySelector('#sim-exp-blue').innerText = ((currentCounts.blue / 500) * 100).toFixed(1) + '%';
                    btnRevealExp.style.display = 'none';
                };

                btnSimulate.addEventListener('click', simHandler);
                btnRevealExp.addEventListener('click', revealExpHandler);
                
                handlers.push({ el: btnSimulate, fn: simHandler });
                handlers.push({ el: btnRevealExp, fn: revealExpHandler });

                return () => handlers.forEach(h => h.el.removeEventListener('click', h.fn));
            }
        },

                                    <div class="formula-container" style="margin: 0.3rem 0;"><math style="display: inline-block;"><mtext>1 Head: </mtext><mfrac><mn>180</mn><mn>500</mn></mfrac><mo>=</mo><mfrac><mn>9</mn><mn>25</mn></mfrac><mo>=</mo><mn>36</mn><mo>%</mo></math></div>
                                    <div class="formula-container" style="margin: 0.3rem 0;"><math style="display: inline-block;"><mtext>2 Heads: </mtext><mfrac><mn>192</mn><mn>500</mn></mfrac><mo>=</mo><mfrac><mn>48</mn><mn>125</mn></mfrac><mo>=</mo><mn>38.4</mn><mo>%</mo></math></div>

                                <div id="ans-5bc" class="answer-box" style="padding: 1rem; text-align: left; border-color: var(--purple);">
                                    <p style="font-size: 1.1rem; color: var(--text-dim); margin-bottom: 0.5rem;">There are exactly 8 total outcomes for 3 coins: (HHH, HHT, HTH, THH, HTT, THT, TTH, TTT).</p>
                                    <div class="formula-container" style="margin: 0.3rem 0;"><math style="display: inline-block;"><mtext>0H (TTT): </mtext><mfrac><mn>1</mn><mn>8</mn></mfrac><mo>=</mo><mn>12.5</mn><mo>%</mo></math></div>
                                    <div class="formula-container" style="margin: 0.3rem 0;"><math style="display: inline-block;"><mtext>1H (3 ways): </mtext><mfrac><mn>3</mn><mn>8</mn></mfrac><mo>=</mo><mn>37.5</mn><mo>%</mo></math></div>
                                    <div class="formula-container" style="margin: 0.3rem 0;"><math style="display: inline-block;"><mtext>2H (3 ways): </mtext><mfrac><mn>3</mn><mn>8</mn></mfrac><mo>=</mo><mn>37.5</mn><mo>%</mo></math></div>

            `,
            script: (container) => { 
                if(window.MathJax) window.MathJax.typesetPromise([container]);
                return bindReveals(container); 
            }
        }
    ];

    // --- ENGINE LOGIC ---
    function render() {
        const root = document.getElementById('slide-root');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        root.innerHTML = slide.template();
        if (slide.script) { state.cleanupFn = slide.script(root); }
        
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Boot Up
    render();
</script>
