<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Solutions - Fractions & Probability</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Notebook Edutech Standard) --- */
        :root {
            --bg-paper: #fdfbf7;       /* Warm paper white */
            --bg-panel: #ffffff;       /* Pure white for cards */
            --primary: #2563eb;        /* Blue Ink */
            --accent: #16a34a;         /* Green Ink */
            --warning: #ea580c;        /* Orange Highlighter */
            --danger: #dc2626;         /* Red Pen */
            --cold: #0284c7;           /* Light Blue */
            --text-main: #334155;      /* Dark slate text */
            --text-dim: #64748b;       /* Secondary text */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-main); }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); }

        strong { color: var(--text-main); font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; align-items: start; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; align-items: start; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: #ffffff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .brand-pill {
            background: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 2px 2px 0px rgba(37, 99, 235, 0.3);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
            /* Notebook Paper Effect */
            background-image:
                linear-gradient(90deg, transparent 60px, rgba(220, 38, 38, 0.2) 60px, rgba(220, 38, 38, 0.2) 62px, transparent 62px),
                linear-gradient(rgba(37, 99, 235, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 32px;
            background-attachment: local;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 80px; /* Offset for margin line */
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: #ffffff;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            position: relative;
        }

        /* Signposting System */
        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            background: #ffffff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            animation: slideIn 0.5s ease;
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
        }
        .pedagogical-note p, .pedagogical-note li, .pedagogical-note h3 {
            font-family: 'Kalam', cursive;
        }
        .pedagogical-badge {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        
        .note-task { border-color: var(--warning); }
        .note-task .pedagogical-badge { color: var(--warning); }
        
        .note-theory { border-color: var(--danger); }
        .note-theory .pedagogical-badge { color: var(--danger); }
        
        .note-success { border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        /* Problem Blocks */
        .problem-block {
            background: #ffffff;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.4rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
        }
        .problem-number {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            width: 100%;
        }
        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .btn-action.btn-accent { background: var(--accent); }
        .btn-action.btn-warning { background: var(--warning); }
        .btn-action.btn-danger { background: var(--danger); }
        .btn-action.btn-cold { background: var(--cold); }

        /* Answer Reveal Blocks */
        .answer-box {
            display: none; 
            background: #ffffff; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border: 2px solid var(--accent); 
            margin-top: 1rem; 
            box-shadow: 3px 3px 0px rgba(22, 163, 74, 0.2);
            text-align: center;
        }
        .answer-box p {
            font-family: 'Kalam', cursive;
            font-size: 1.5rem;
            line-height: 1.5;
        }
        .final-ans {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.8rem !important;
            margin-top: 0.5rem;
        }

        /* Light Theme Tables */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; margin-bottom: 1rem; color: var(--text-main); background: #ffffff; font-size: 1.3rem; }
        .data-table th, .data-table td { border: 2px solid rgba(0,0,0,0.2); padding: 0.8rem; text-align: left; }
        .data-table th { background: rgba(37,99,235,0.1); color: var(--text-main); font-family: 'Outfit'; font-weight: bold; }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        .progress-container { flex: 1; margin: 0 2rem; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cold), var(--primary)); transition: width 0.3s ease; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-enter { animation: fadeIn 0.4s ease-out; }
        .delay-1 { animation: slideIn 0.4s ease-out 0.1s both; }
        .delay-2 { animation: slideIn 0.4s ease-out 0.2s both; }
        .delay-3 { animation: slideIn 0.4s ease-out 0.3s both; }

        /* Math Sizing */
        .math-lg { font-size: 1.8rem; }

        @media (max-width: 1024px) {
            .slide-wrapper { padding-left: 60px; }
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; gap: 1rem; }
            h1 { font-size: 2rem; }
            .slide-wrapper { padding-left: 2rem; }
            .viewport { background-image: none; background-color: var(--bg-paper); }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-book"></i> Year 8 Math</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;">Homework Solutions</span>
        </div>
        <div style="font-family: 'Kalam', cursive; font-weight: 700; color: var(--text-main); font-size: 1.2rem;">
            23 March 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- CORE ENGINE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    const renderMath = () => {
        if (window.MathJax) {
            window.MathJax.typesetPromise().catch((err) => console.log('MathJax error:', err));
        }
    };

    const bindReveals = (container) => {
        const btns = container.querySelectorAll('.reveal-btn');
        const handlers = [];
        btns.forEach(btn => {
            const handler = () => {
                const targetId = btn.getAttribute('data-target');
                const target = container.querySelector('#' + targetId);
                target.style.display = 'block';
                target.classList.add('anim-enter');
                btn.style.display = 'none';
                renderMath(); 
            };
            handlers.push({ el: btn, fn: handler });
            btn.addEventListener('click', handler);
        });
        return () => handlers.forEach(h => h.el.removeEventListener('click', h.fn));
    };

    // --- SLIDES ---
    state.slides = [
        // SLIDE 1: Title
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-pen-to-square delay-1" style="font-size: 5rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: 3.5rem;">Homework Solutions</h1>
                    <h2 class="delay-1" style="color: var(--accent);">Fractions & Probability</h2>
                    
                    <div class="pedagogical-note note-write delay-2" style="max-width: 700px; margin: 3rem auto; text-align: left; transform: rotate(-1deg);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                        <h3 style="color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem;">Objective:</h3>
                        <p style="font-size: 1.4rem;">We will review our assignment and write down the correct solutions with <strong>full work shown</strong>.</p>
                        
                        <div style="background: rgba(0,0,0,0.05); padding: 1rem; border-radius: 8px; margin-top: 1.5rem; border: 1px dashed var(--text-dim);">
                            <p style="font-size: 1.1rem; color: var(--text-dim); text-align: center; font-family: 'Plus Jakarta Sans', sans-serif;">
                                <i class="fa-solid fa-lightbulb"></i> Check your assignment carefully. If you made a mistake, cross it out neatly and copy the correct working down.
                            </p>
                        </div>
                    </div>
                </div>
            `,
            script: () => { return () => {}; }
        },

        // SLIDE 2: Fractions Part 1 (Q1 - Q4)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part 1: Fractions Operations (Q1 - Q4)</h2>
                    
                    <div class="grid-2 delay-1" style="max-width: 1000px; margin: 0 auto;">
                        
                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">1) &nbsp; $$\\frac{2}{3} + \\frac{3}{4}$$</h3>
                            <button class="btn-action reveal-btn" data-target="ans-q1"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q1" class="answer-box">
                                <p style="font-size: 1.1rem; color: var(--text-dim);">1. Find Lowest Common Multiple of 3 & 4 (LCM = 12).</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">2. Multiply first fraction by $$\\frac{4}{4}$$ and second by $$\\frac{3}{3}$$.</p>
                                <p>$$\\frac{8}{12} + \\frac{9}{12} = \\frac{17}{12}$$</p>
                                <p class="final-ans">$$1 \\frac{5}{12}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">2) &nbsp; $$\\frac{4}{5} - \\frac{1}{2}$$</h3>
                            <button class="btn-action btn-accent reveal-btn" data-target="ans-q2"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q2" class="answer-box">
                                <p style="font-size: 1.1rem; color: var(--text-dim);">1. Find Common Denominator for 5 & 2 (LCM = 10).</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">2. Multiply first fraction by $$\\frac{2}{2}$$ and second by $$\\frac{5}{5}$$.</p>
                                <p>$$\\frac{8}{10} - \\frac{5}{10}$$</p>
                                <p class="final-ans">$$\\frac{3}{10}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">3) &nbsp; $$\\frac{3}{4} \\times \\frac{2}{5}$$</h3>
                            <button class="btn-action btn-warning reveal-btn" data-target="ans-q3"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q3" class="answer-box" style="border-color: var(--warning);">
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Multiply numerators together, then denominators together.</p>
                                <p>$$\\frac{3 \\times 2}{4 \\times 5} = \\frac{6}{20}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Divide top and bottom by 2 to simplify.</p>
                                <p class="final-ans" style="color: var(--warning);">$$\\frac{3}{10}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">4) &nbsp; $$\\frac{5}{8} \\div \\frac{3}{4}$$</h3>
                            <button class="btn-action btn-danger reveal-btn" data-target="ans-q4"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q4" class="answer-box" style="border-color: var(--danger);">
                                <p style="font-size: 1.1rem; color: var(--text-dim);"><strong>KCF:</strong> Keep first, Change sign to $$\\times$$, Flip second.</p>
                                <p>$$\\frac{5}{8} \\times \\frac{4}{3} = \\frac{20}{24}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Divide top and bottom by 4 to simplify.</p>
                                <p class="final-ans" style="color: var(--danger);">$$\\frac{5}{6}$$</p>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            script: (container) => { renderMath(); return bindReveals(container); }
        },

        // SLIDE 3: Fractions Part 1 (Q5 - Q8)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part 1: Order of Operations (Q5 - Q8)</h2>
                    
                    <div class="grid-2 delay-1" style="max-width: 1050px; margin: 0 auto;">
                        
                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">5) &nbsp; $$(\\frac{2}{3})^2 + \\frac{1}{9}$$</h3>
                            <button class="btn-action reveal-btn" data-target="ans-q5"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q5" class="answer-box">
                                <p style="font-size: 1.1rem; color: var(--text-dim);"><strong>BIDMAS:</strong> Evaluate indices (exponents) first.</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">$$(\\frac{2}{3})^2 = \\frac{2}{3} \\times \\frac{2}{3} = \\frac{4}{9}$$</p>
                                <p>$$\\frac{4}{9} + \\frac{1}{9}$$</p>
                                <p class="final-ans">$$\\frac{5}{9}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">6) &nbsp; $$\\frac{5}{6} \\times (1 \\frac{1}{2} - \\frac{3}{4})$$</h3>
                            <button class="btn-action btn-accent reveal-btn" data-target="ans-q6"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q6" class="answer-box">
                                <p style="font-size: 1.1rem; color: var(--text-dim);"><strong>BIDMAS:</strong> Brackets first! Convert $$1 \\frac{1}{2}$$ to $$\\frac{3}{2}$$, then to $$\\frac{6}{4}$$.</p>
                                <p>$$\\frac{5}{6} \\times (\\frac{6}{4} - \\frac{3}{4}) = \\frac{5}{6} \\times \\frac{3}{4}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Multiply straight across, then simplify.</p>
                                <p class="final-ans">$$\\frac{15}{24} = \\frac{5}{8}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">7) &nbsp; $$3 \\frac{1}{4} - 1 \\frac{5}{6}$$</h3>
                            <button class="btn-action btn-warning reveal-btn" data-target="ans-q7"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q7" class="answer-box" style="border-color: var(--warning);">
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Convert both to improper fractions first.</p>
                                <p>$$\\frac{13}{4} - \\frac{11}{6}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Find common denominator (12).</p>
                                <p>$$\\frac{39}{12} - \\frac{22}{12} = \\frac{17}{12}$$</p>
                                <p class="final-ans" style="color: var(--warning);">$$1 \\frac{5}{12}$$</p>
                            </div>
                        </div>

                        <div class="glass-card">
                            <h3 style="color: var(--text-main);">8) &nbsp; $$2 \\frac{2}{5} \\div 1 \\frac{1}{3} + \\frac{1}{5}$$</h3>
                            <button class="btn-action btn-danger reveal-btn" data-target="ans-q8"><i class="fa-solid fa-eye"></i> Show Work</button>
                            <div id="ans-q8" class="answer-box" style="border-color: var(--danger);">
                                <p style="font-size: 1.1rem; color: var(--text-dim);"><strong>BIDMAS:</strong> Division before Addition. Convert mixed numbers.</p>
                                <p>$$(\\frac{12}{5} \\div \\frac{4}{3}) + \\frac{1}{5}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Use Keep-Change-Flip for the division block.</p>
                                <p>$$(\\frac{12}{5} \\times \\frac{3}{4}) + \\frac{1}{5} = \\frac{36}{20} + \\frac{1}{5}$$</p>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">Simplify $$\\frac{36}{20}$$ to $$\\frac{9}{5}$$.</p>
                                <p class="final-ans" style="color: var(--danger);">$$\\frac{9}{5} + \\frac{1}{5} = \\frac{10}{5} = 2$$</p>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            script: (container) => { renderMath(); return bindReveals(container); }
        },

        // SLIDE 4: Part 2 Simple Prob (Q9 - Q11)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Part 2: Simple Probabilities (Q9 - Q11)</h2>
                    <p class="text-center delay-1" style="color: var(--text-dim); margin-bottom: 2rem; font-size: 1.3rem;">Using the 100% Rule: All outcomes must total exactly 100%.</p>

                    <div class="grid-3 delay-2" style="max-width: 1100px; margin: 0 auto;">
                        
                        <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                            <h3 style="font-size: 1.2rem; color: var(--text-dim); margin-bottom: 1rem;">Q9: Rain</h3>
                            <p style="font-size: 1.1rem; margin-bottom: 1rem;">Probability it rains = <strong>15%</strong>. <br>Probability it does NOT rain?</p>
                            <button class="btn-action reveal-btn" data-target="ans-q9"><i class="fa-solid fa-eye"></i> Check</button>
                            <div id="ans-q9" class="answer-box" style="padding: 1rem;">
                                <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 0.5rem;">Subtract the 15% chance of rain from the 100% total.</p>
                                <p>$$100\\% - 15\\%$$</p>
                                <p class="final-ans">85%</p>
                            </div>
                        </div>

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        // Execute cleanup from previous slide if it exists
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML synchronously
        container.innerHTML = slide.template();
        
        // Execute script immediately
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
</script>
