<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound: Amplitude and Frequency Revisions - Year 9 Science</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (BOWEN ENGINE) --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #8b5cf6;        
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #10b981;         
            --warning: #f59e0b;        
            --danger: #ef4444;         
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #c4b5fd; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        p, li { line-height: 1.6; margin-bottom: 1rem; font-size: 1.3rem; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; align-items: stretch; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-nav {
            width: 56px; height: 56px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-light);
            font-size: 1.4rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            color: white;
            padding: 1.2rem 2.5rem;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: linear-gradient(135deg, #7c3aed, #5b21b6); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.4); }

        /* Progress Bar */
        .progress-container { flex: 1; margin: 0 3rem; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #a78bfa); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow); }

        /* --- SIGNPOSTING (PEDAGOGICAL NOTES) --- */
        .pedagogical-note {
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 6px solid;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .pedagogical-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1.5px;
        }

        .note-write { border-left-color: #3b82f6; background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-write .pedagogical-badge { color: #60a5fa; }
        .note-task { border-left-color: var(--warning); background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-task .pedagogical-badge { color: #fbbf24; }
        .note-theory { border-left-color: var(--primary); background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-theory .pedagogical-badge { color: #a78bfa; }
        .note-success { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-success .pedagogical-badge { color: #34d399; }

        /* --- INTERACTIVE TOOLS --- */
        
        /* Reveal Card */
        .reveal-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .reveal-card:hover { border-color: var(--primary); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.2); transform: translateY(-5px); }
        .reveal-card .reveal-content { display: none; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem; }
        .reveal-card.revealed .reveal-content { display: block; animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal-card.revealed .pre-reveal { opacity: 0.5; transform: scale(0.95); transition: all 0.4s ease; }

        /* Sliders for Simulation */
        .slider-container {
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .slider-label {
            font-weight: 700;
            min-width: 130px;
            color: #cbd5e1;
            font-family: 'Outfit';
            font-size: 1.3rem;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 10px;
            border-radius: 5px;
            outline: none;
            flex: 1;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range].accent-slider::-webkit-slider-thumb {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        .val-badge {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Outfit';
            font-weight: 800;
            min-width: 100px;
            text-align: center;
            color: white;
        }

        /* Summative Quiz */
        .quiz-block { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--border-radius); padding: 2rem; margin-bottom: 2rem; }
        .quiz-question { font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; color: #cbd5e1; }
        .quiz-option { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); padding: 1.2rem 1.5rem; border-radius: 12px; margin-bottom: 0.8rem; cursor: pointer; transition: all 0.2s; font-size: 1.2rem; display: flex; align-items: center; gap: 1rem; }
        .quiz-option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateX(5px); }
        .quiz-option.correct { border-color: var(--accent); background: rgba(16, 185, 129, 0.15); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .quiz-option.incorrect { border-color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .quiz-feedback { margin-top: 1rem; font-size: 1.3rem; font-weight: bold; min-height: 30px; display: none; }

        /* Video Embed */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.4)); } 50% { filter: drop-shadow(0 0 35px rgba(16, 185, 129, 0.8)); } 100% { filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.4)); } }
        
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }

        .hidden { display: none !important; }
        .text-center { text-align: center; }

    </style>
</head>
<body>

<!-- GLOBAL SVG DEFS -->
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <defs>
        <filter id="wave-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="strong-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
    </defs>
</svg>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 9 Science</div>
            <span style="font-weight: 700; color: #cbd5e1; font-size: 1.2rem; letter-spacing: 0.5px;">Sound: Amplitude and Frequency Revisions</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);">
            Revision Module
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // --- THE BOWEN ENGINE ---

    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            const wrapper = document.querySelector('.slide-wrapper');
            if(wrapper) wrapper.scrollTop = 0;

            if (window.MathJax) {
                MathJax.typesetPromise([container]);
            }
        }
    };

    // --- LESSON CONTENT ---

    const lessonSlides = [
        // Slide 1: Objective
        {
            template: () => `
                <div class="anim-enter text-center">
                    <div style="position: relative; display: inline-block; margin-bottom: 2rem; animation: pulseGlow 4s infinite;">
                        <svg viewBox="0 0 400 200" width="300" height="150" style="filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));">
                            <path d="M 0 100 C 50 0, 50 200, 100 100 C 150 0, 150 200, 200 100 C 250 0, 250 200, 300 100 C 350 0, 350 200, 400 100" 
                                  fill="none" stroke="url(#wave-gradient)" stroke-width="12" stroke-linecap="round" filter="url(#wave-glow)"/>
                        </svg>
                    </div>
                    <h1>Sound Waves</h1>
                    <h2 style="color: var(--text-dim); font-size: 2rem; margin-top: -1rem;">Amplitude and Frequency Revisions</h2>
                    
                    <div class="pedagogical-note note-success delay-1" style="max-width: 900px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objective</div>
                        <p style="font-size: 2rem; font-weight: 800; line-height: 1.4; margin: 0; color: white;">
                            We will investigate how changing amplitude and frequency alters the shape and sound of a wave.
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: The Investigation (Interactive Oscilloscope)
        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2 style="margin-bottom: 0.5rem;">Virtual Oscilloscope</h2>
                    <p style="font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--text-dim);">Experiment with the Amplitude (Volume) and Frequency (Pitch) sliders to see how the wave changes.</p>

                    <div class="glass-card delay-1" style="padding: 2rem;">
                        
                        <!-- Canvas Container -->
                        <div style="position: relative; width: 100%; max-width: 1100px; margin: 0 auto; background: #020617; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 40px rgba(0,0,0,0.8);">
                            
                            <!-- Y-Axis Label -->
                            <div style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; color: var(--text-dim); font-weight: bold; font-size: 1rem; letter-spacing: 1px;">
                                Displacement (cm)
                            </div>
                            
                            <!-- X-Axis Label -->
                            <div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--text-dim); font-weight: bold; font-size: 1rem; letter-spacing: 1px;">
                                Time (ms)
                            </div>

                            <canvas id="waveCanvas" width="1100" height="450" style="display: block; width: 100%;"></canvas>
                        </div>

                        <!-- Controls -->
                        <div style="max-width: 800px; margin: 1.5rem auto 0 auto;">
                            <!-- Amplitude Slider -->
                            <div class="slider-container">
                                <div class="slider-label"><i class="fa-solid fa-volume-high" style="color: var(--primary);"></i> Amplitude</div>
                                <input type="range" id="ampSlider" min="0" max="200" value="100">
                                <div class="val-badge" id="ampDisplay">10.0 cm</div>
                            </div>
                            
                            <!-- Frequency Slider -->
                            <div class="slider-container">
                                <div class="slider-label"><i class="fa-solid fa-music" style="color: var(--accent);"></i> Pitch</div>
                                <input type="range" id="freqSlider" class="accent-slider" min="100" max="1000" value="440">
                                <div class="val-badge" id="freqDisplay" style="color: var(--accent);">440 Hz</div>
                            </div>

                            <!-- Sound and Freeze Buttons -->
                            <div style="display: flex; gap: 1.5rem; justify-content: center; margin-top: 2rem;">
                                <button id="btn-sound" class="btn btn-action" style="background: var(--primary);"><i class="fa-solid fa-volume-up"></i> Play Sound</button>
                                <button id="btn-freeze" class="btn btn-action" style="background: var(--warning);"><i class="fa-solid fa-pause"></i> Freeze Wave</button>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            script: (container) => {
                const canvas = container.querySelector('#waveCanvas');
                const ctx = canvas.getContext('2d');
                
                const ampSlider = container.querySelector('#ampSlider');
                const freqSlider = container.querySelector('#freqSlider');
                const ampDisplay = container.querySelector('#ampDisplay');
                const freqDisplay = container.querySelector('#freqDisplay');

                const btnSound = container.querySelector('#btn-sound');
                const btnFreeze = container.querySelector('#btn-freeze');

                let animId;
                let timeOffset = 0;
                let isFrozen = false;
                let isPlaying = false;
                
                let audioCtx;
                let oscillator;
                let gainNode;

                const drawGrid = () => {
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.lineWidth = 1;
                    
                    for(let x = 0; x <= canvas.width; x += 50) {
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                    }
                    for(let y = 0; y <= canvas.height; y += 50) {
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                    }

                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height/2);
                    ctx.lineTo(canvas.width, canvas.height/2);
                    ctx.stroke();
                };

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawGrid();

                    const amplitude = parseInt(ampSlider.value);
                    const frequency = parseInt(freqSlider.value);

                    ampDisplay.innerText = (amplitude / 10).toFixed(1) + " cm";
                    freqDisplay.innerText = frequency + " Hz";

                    const visualFreq = frequency * 0.00015; 

                    ctx.beginPath();
                    ctx.strokeStyle = '#10b981'; 
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#10b981';

                    for(let x = 0; x < canvas.width; x++) {
                        const y = (canvas.height / 2) + amplitude * Math.sin(x * visualFreq - timeOffset);
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    if (!isFrozen) {
                        timeOffset += 0.1;
                    }
                    
                    animId = requestAnimationFrame(animate);
                };

                btnSound.addEventListener('click', () => {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        oscillator = audioCtx.createOscillator();
                        gainNode = audioCtx.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        oscillator.type = 'sine';
                        oscillator.frequency.value = parseInt(freqSlider.value);
                        gainNode.gain.value = 0;
                        oscillator.start();
                    }

                    if (isPlaying) {
                        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                        btnSound.innerHTML = '<i class="fa-solid fa-volume-up"></i> Play Sound';
                        btnSound.style.background = 'var(--primary)';
                    } else {
                        oscillator.frequency.setTargetAtTime(parseInt(freqSlider.value), audioCtx.currentTime, 0.01);
                        const vol = (parseInt(ampSlider.value) / 200) * 0.3;
                        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
                        btnSound.innerHTML = '<i class="fa-solid fa-volume-xmark"></i> Stop Sound';
                        btnSound.style.background = 'var(--danger)';
                        
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }
                    }
                    isPlaying = !isPlaying;
                });

                btnFreeze.addEventListener('click', () => {
                    isFrozen = !isFrozen;
                    if (isFrozen) {
                        btnFreeze.innerHTML = '<i class="fa-solid fa-play"></i> Resume Wave';
                        btnFreeze.style.background = 'var(--accent)';
                    } else {
                        btnFreeze.innerHTML = '<i class="fa-solid fa-pause"></i> Freeze Wave';
                        btnFreeze.style.background = 'var(--warning)';
                    }
                });

                ampSlider.addEventListener('input', () => {
                    if (isPlaying && gainNode) {
                        const vol = (parseInt(ampSlider.value) / 200) * 0.3;
                        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
                    }
                });
                
                freqSlider.addEventListener('input', () => {
                    if (isPlaying && oscillator) {
                        oscillator.frequency.setTargetAtTime(parseInt(freqSlider.value), audioCtx.currentTime, 0.1);
                    }
                });

                animate();

                return () => {
                    cancelAnimationFrame(animId);
                    if (audioCtx && audioCtx.state !== 'closed') {
                        audioCtx.close();
                    }
                };
            }
        },

        {
            template: () => `
                <div class="anim-enter text-center">
                    <h2>Interference Visualizer</h2>
                    
                    <div class="pedagogical-note note-task text-left" style="max-width: 1000px; margin: 0 auto 2rem auto;">

                    </div>

                    <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
                        <button id="btn-reinf" class="btn btn-action" style="background: var(--accent);"><i class="fa-solid fa-plus"></i> Reinforcement</button>

                    <div class="grid-2" style="max-width: 1400px; margin: 0 auto; gap: 2rem; align-items: stretch;">

                            <canvas id="interferenceCanvas" width="600" height="500" style="width: 100%; background: #020617; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.8);"></canvas>

                            <h3 style="color: #cbd5e1; margin-bottom: 1rem; font-size: 1.4rem;"><i class="fa-solid fa-camera"></i> Static Graph Snapshot</h3>
                            <svg id="staticGraph" viewBox="0 0 600 500" style="width: 100%; background: #020617; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.8);">
                                <!-- Drawn by JS -->
                            </svg>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                let mode = 0; // 0=reinf, 1=cancel, 2=sync
                const canvas = container.querySelector('#interferenceCanvas');
                const ctx = canvas.getContext('2d');
                const svg = container.querySelector('#staticGraph');
                
                const btnReinf = container.querySelector('#btn-reinf');
                const btnCancel = container.querySelector('#btn-cancel');
                const btnSync = container.querySelector('#btn-sync');

                let time = 0;
                let animId;

                const getWaveParams = () => {
                    if (mode === 0) return { phase: 0, freqB: 1.0, color: '#10b981', label: 'Reinforcement (Constructive)' };
                    if (mode === 1) return { phase: Math.PI, freqB: 1.0, color: '#94a3b8', label: 'Canceling (Destructive)' };
                    return { phase: 0, freqB: 1.15, color: '#f59e0b', label: 'Out of Sync (Beat Frequency)' };
                };

                const updateStaticGraph = () => {
                    const { phase, freqB, color, label } = getWaveParams();
                    let pathA = '', pathB = '', pathC = '';
                    
                    for(let x=0; x<=600; x+=2) {
                        let yA = 90 + 50 * Math.sin(x*0.05);
                        let yB = 250 + 50 * Math.sin(x*0.05 * freqB + phase);
                        let yC = 410 + (50 * Math.sin(x*0.05) + 50 * Math.sin(x*0.05 * freqB + phase));
                        
                        pathA += (x===0?'M':'L') + `${x},${yA} `;
                        pathB += (x===0?'M':'L') + `${x},${yB} `;
                        pathC += (x===0?'M':'L') + `${x},${yC} `;
                    }

                    svg.innerHTML = `
                        <line x1="0" y1="90" x2="600" y2="90" stroke="rgba(255,255,255,0.2)" stroke-dasharray="4 4" />
                        <line x1="0" y1="250" x2="600" y2="250" stroke="rgba(255,255,255,0.2)" stroke-dasharray="4 4" />
                        <line x1="0" y1="410" x2="600" y2="410" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
                        
                        <path d="${pathA}" fill="none" stroke="#38bdf8" stroke-width="3"/>
                        <path d="${pathB}" fill="none" stroke="#f43f5e" stroke-width="3"/>
                        <path d="${pathC}" fill="none" stroke="${color}" stroke-width="4"/>

                        <text x="10" y="30" fill="#38bdf8" font-family="Outfit" font-size="16" font-weight="bold">Wave A</text>
                        <text x="10" y="190" fill="#f43f5e" font-family="Outfit" font-size="16" font-weight="bold">Wave B</text>
                        <text x="10" y="350" fill="${color}" font-family="Outfit" font-size="16" font-weight="bold">Result (A + B): ${label}</text>
                    `;
                };

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.setLineDash([4, 4]);
                    [90, 250].forEach(y => {
                        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(600,y); ctx.stroke();
                    });
                    ctx.setLineDash([]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0,410); ctx.lineTo(600,410); ctx.stroke();

                    const { phase, freqB, color, label } = getWaveParams();

                    ctx.beginPath();
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineWidth = 3;
                    for(let x=0; x<600; x+=2) {
                        let y = 90 + 50 * Math.sin(x*0.05 - time);
                        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.strokeStyle = '#f43f5e';
                    for(let x=0; x<600; x+=2) {
                        let y = 250 + 50 * Math.sin(x*0.05 * freqB - time + phase);
                        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 4;
                    for(let x=0; x<600; x+=2) {
                        let valA = 50 * Math.sin(x*0.05 - time);
                        let valB = 50 * Math.sin(x*0.05 * freqB - time + phase);
                        let y = 410 + (valA + valB);
                        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.stroke();

                    ctx.fillStyle = '#38bdf8';
                    ctx.font = 'bold 16px Outfit';
                    ctx.fillText('Wave A', 10, 30);
                    ctx.fillStyle = '#f43f5e';
                    ctx.fillText('Wave B', 10, 190);
                    ctx.fillStyle = color;
                    ctx.fillText('Result: ' + label, 10, 350);

                    time += 0.05;
                    animId = requestAnimationFrame(animate);
                };

                const updateActiveButton = () => {
                    [btnReinf, btnCancel, btnSync].forEach(b => b.style.opacity = '0.4');
                    if (mode === 0) btnReinf.style.opacity = '1';
                    if (mode === 1) btnCancel.style.opacity = '1';
                    if (mode === 2) btnSync.style.opacity = '1';
                };

                btnReinf.addEventListener('click', () => { mode = 0; updateStaticGraph(); updateActiveButton(); });
                btnCancel.addEventListener('click', () => { mode = 1; updateStaticGraph(); updateActiveButton(); });
                btnSync.addEventListener('click', () => { mode = 2; updateStaticGraph(); updateActiveButton(); });

                updateStaticGraph();
                updateActiveButton();
                animate();

                return () => {
                    cancelAnimationFrame(animId);
                };
            }
        },

        // Slide 10: Formative Assessment (Quiz)
        {

                    <div style="max-width: 900px; margin: 0 auto;">
                        
                        <!-- Question 1 -->

                                <div class="quiz-option" data-correct="true"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">B</span> The Amplitude</div>
                                <div class="quiz-option" data-correct="false"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">C</span> The Pitch</div>
                            </div>
                            <div class="quiz-feedback"></div>
                        </div>

                        <!-- Question 2 -->
                        <div class="quiz-block delay-2">
                            <div class="quiz-question">2. If a wave has a very high frequency, how will it sound?</div>
                            <div class="quiz-options-container">
                                <div class="quiz-option" data-correct="false"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">A</span> It will be very loud.</div>
                                <div class="quiz-option" data-correct="false"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">B</span> It will be a low, deep rumble.</div>
                                <div class="quiz-option" data-correct="true"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">C</span> It will have a very high pitch.</div>
                            </div>
                            <div class="quiz-feedback"></div>
                        </div>

                        <!-- Question 3 -->
                        <div class="quiz-block delay-3">
                            <div class="quiz-question">3. What is the standard scientific unit used to measure Frequency?</div>
                            <div class="quiz-options-container">
                                <div class="quiz-option" data-correct="false"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">A</span> Decibels (dB)</div>
                                <div class="quiz-option" data-correct="true"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">B</span> Hertz (Hz)</div>
                                <div class="quiz-option" data-correct="false"><span style="background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;">C</span> Meters (m)</div>
                            </div>
                            <div class="quiz-feedback"></div>
                        </div>

                    </div>
                </div>
            `,
            script: (container) => {
                const quizBlocks = container.querySelectorAll('.quiz-block');
                const handlers = [];

                quizBlocks.forEach(block => {
                    const options = block.querySelectorAll('.quiz-option');
                    const feedback = block.querySelector('.quiz-feedback');

                    const handleQuiz = (e) => {
                        options.forEach(opt => {
                            opt.classList.remove('correct', 'incorrect');
                            opt.style.pointerEvents = 'none';
                        });

                        const selected = e.currentTarget;
                        const isCorrect = selected.getAttribute('data-correct') === 'true';
                        
                        feedback.style.display = 'block';

                        if (isCorrect) {
                            selected.classList.add('correct');
                            feedback.innerHTML = '<span style="color: var(--accent);"><i class="fa-solid fa-check-circle"></i> Correct!</span>';
                        } else {
                            selected.classList.add('incorrect');
                            block.querySelector('[data-correct="true"]').classList.add('correct');
                            feedback.innerHTML = '<span style="color: var(--danger);"><i class="fa-solid fa-times-circle"></i> Incorrect. Review the correct answer highlighted.</span>';
                        }
                    };

                    options.forEach(opt => {
                        opt.addEventListener('click', handleQuiz);
                        handlers.push({ element: opt, handler: handleQuiz });
                    });
                });

                return () => {
                    handlers.forEach(({element, handler}) => {
                        element.removeEventListener('click', handler);
                    });
                };
            }
        },

        // Slide 11: Final Written Task
        {
            template: () => `

                        <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; padding: 2rem; margin-top: 2rem;">

                    </div>

            `

        {

                    <p style="font-size: 1.4rem; margin-bottom: 3rem;">Compare your paragraph with this exemplary Year 9 response.</p>
                    
                    <div class="glass-card delay-1" style="max-width: 900px; margin: 0 auto; text-align: left; padding: 3rem; border-top: 6px solid var(--accent);">
                        
                        <div class="pedagogical-note note-success">
                            <div class="pedagogical-badge"><i class="fa-solid fa-star"></i> Exemplar Response</div>
                            <p style="font-size: 1.3rem; line-height: 1.8; margin-top: 1rem; color: white;">
                                "Initially, the quiet, low-pitched rumble would appear as a wave with a <strong>small amplitude</strong> (not very tall on the y-axis) because it has low volume. The peaks would also be spread far apart horizontally because it has a <strong>low frequency</strong> (a small number of Hertz, meaning fewer waves per second).<br><br>
                                As the sound changes into a loud, high-pitched screech, the wave on the screen would undergo two major visual changes. First, the <strong>amplitude would increase significantly</strong>, making the wave much taller due to the increased volume. Secondly, the <strong>frequency would increase</strong> to a higher number of Hertz, which means the waves would look 'squished' together horizontally as many more complete cycles pass across the screen every second."
                            </p>
                        </div>
                        
                    </div>
                </div>
            `
        }
    ];

        Engine.init(lessonSlides);
