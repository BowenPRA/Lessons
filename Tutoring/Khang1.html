<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomials & The Factor Theorem - Additional Maths</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --bg-paper: #fdfbf7;       
            --bg-panel: #ffffff;       
            --primary: #2563eb;        
            --accent: #16a34a;         
            --warning: #ea580c;        
            --danger: #dc2626;         
            --cold: #0284c7;           
            --text-main: #334155;      
            --text-dim: #64748b;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            overflow: hidden;
            font-size: 16px;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-main); }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 0.5rem; }
        h2 { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); }

        strong { color: var(--text-main); font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
            background: #ffffff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .brand-pill {
            background: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 2px 2px 0px rgba(37, 99, 235, 0.3);
            white-space: nowrap;
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-image:
                linear-gradient(90deg, transparent 60px, rgba(220, 38, 38, 0.2) 60px, rgba(220, 38, 38, 0.2) 62px, transparent 62px),
                linear-gradient(rgba(37, 99, 235, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 32px;
            background-attachment: local;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: #ffffff;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius);
            padding: clamp(1rem, 3vw, 2rem);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            height: 100%;
        }

        .pedagogical-note {
            padding: clamp(1rem, 3vw, 1.5rem);
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            background: #ffffff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            animation: slideIn 0.5s ease;
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
        }
        .pedagogical-note p, .pedagogical-note li, .pedagogical-note h3 {
            font-family: 'Kalam', cursive;
        }
        .pedagogical-badge {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        .note-task { border-color: var(--warning); }
        .note-task .pedagogical-badge { color: var(--warning); }
        .note-theory { border-color: var(--danger); }
        .note-theory .pedagogical-badge { color: var(--danger); }
        .note-success { border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        .reveal-card {
            background: #ffffff;
            border: 3px dashed var(--primary);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
        }
        .reveal-card:hover, .reveal-card:focus { transform: translateY(-2px); box-shadow: 6px 6px 0px rgba(0,0,0,0.06); }
        .reveal-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid rgba(0,0,0,0.05); }
        .reveal-card.revealed { border-style: solid; border-color: var(--accent); cursor: default; transform: none; box-shadow: 4px 4px 0px rgba(0,0,0,0.06); }
        .reveal-card.revealed .pre-reveal { display: none; }
        .reveal-card.revealed .reveal-content { display: block; animation: fadeIn 0.4s ease; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .btn-action:hover, .btn-action:focus {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .btn-action:active {
            transform: translateY(0);
            box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
        }

        /* Long Division Step Helpers */
        .hidden-step { visibility: hidden; opacity: 0; filter: blur(4px); transition: opacity 0.4s ease, filter 0.4s ease; }
        .active-step { visibility: visible; opacity: 1; filter: blur(0); }
        
        /* Division Table */
        .div-table-wrapper {
            flex: 1; 
            overflow-x: auto; 
            display: flex; 
            justify-content: center; 
            padding: 2rem 1rem;
            -webkit-overflow-scrolling: touch;
        }
        .div-table { width: max-content; font-family: 'Outfit', sans-serif; font-size: clamp(1.2rem, 3vw, 1.6rem); text-align: center; border-collapse: collapse; margin: 0 auto; }
        .div-table td { padding: 12px; min-width: 60px; }
        .div-table .bb { border-bottom: 2px solid var(--text-main); }
        .div-table .bt { border-top: 2px solid var(--text-main); }
        .div-table .br { border-right: 2px solid var(--text-main); font-weight: bold; text-align: right; padding-right: 20px; }
        .div-table .red { color: var(--danger); }
        .div-table .blue { color: var(--primary); font-weight: bold; }

        /* Navigation Buttons */
        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .btn-nav:hover:not(:disabled), .btn-nav:focus:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        .progress-container { flex: 1; margin: 0 1rem; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.3s ease; }

        /* SVG Graph Styling */
        .math-graph { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.02); border-radius: 8px; margin-bottom: 1rem; overflow: visible; }
        .axis { stroke: #cbd5e1; stroke-width: 2; }
        .curve { stroke: var(--primary); fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
        .root-dot { fill: var(--danger); r: 5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .anim-enter { animation: fadeIn 0.6s ease-out; }
        .delay-1 { animation: slideIn 0.6s ease-out 0.2s both; }
        .delay-2 { animation: slideIn 0.6s ease-out 0.4s both; }
        .delay-3 { animation: slideIn 0.6s ease-out 0.6s both; }

        /* Responsive Utilities */
        @media (max-width: 1024px) {
            .slide-wrapper { padding-left: 60px; }
        }
        @media (max-width: 768px) {
            .slide-wrapper { padding: 1.5rem; }
            .viewport { background-image: none; background-color: var(--bg-paper); }
            .header-date { display: none; }
            
            /* Make instructions stacked naturally on small screens */
            .instructions-stack { flex-direction: column !important; align-items: flex-start !important; gap: 1rem; }
            .instructions-stack > div { padding-right: 0 !important; }
            .btn-action-group { width: 100%; display: flex; justify-content: stretch; }
            .btn-action-group button { flex: 1; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-superscript"></i> Add Maths</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;" class="header-subtitle">Unit 3: Polynomials</span>
        </div>
        <div class="header-date" style="font-family: 'Kalam', cursive; font-weight: 700; color: var(--text-main); font-size: 1.2rem;">
            Polynomial & Factor Theorem
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // Defensive MathJax render wrapper
    const renderMath = () => {
        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
            window.MathJax.typesetPromise().catch((err) => console.log('MathJax error:', err));
        }
    };

    // Helper function to create interactive long division scripts
    const createLongDivisionScript = (texts) => {
        return (container) => {
            renderMath();
            const btnNext = container.querySelector('.btn-next-step');
            const btnReset = container.querySelector('.btn-reset-step');
            const instTitle = container.querySelector('.inst-title');
            const instDesc = container.querySelector('.inst-desc');
            
            const step1Els = container.querySelectorAll('.step1');
            const step2Els = container.querySelectorAll('.step2');
            const step3Els = container.querySelectorAll('.step3');
            
            let currentStep = 0;

            const updateUI = () => {
                instTitle.innerHTML = texts[currentStep].t;
                instDesc.innerHTML = texts[currentStep].d;
                renderMath(); 
                
                if (currentStep >= 1) step1Els.forEach(el => el.classList.add('active-step'));
                else step1Els.forEach(el => el.classList.remove('active-step'));
                
                if (currentStep >= 2) step2Els.forEach(el => el.classList.add('active-step'));
                else step2Els.forEach(el => el.classList.remove('active-step'));
                
                if (currentStep >= 3) step3Els.forEach(el => el.classList.add('active-step'));
                else step3Els.forEach(el => el.classList.remove('active-step'));

                if (currentStep === 3) {
                    btnNext.style.display = 'none';
                    btnReset.style.display = 'flex';
                } else {
                    btnNext.style.display = 'flex';
                    btnReset.style.display = 'none';
                }
            };

            const nextHandler = () => {
                if (currentStep < 3) {
                    currentStep++;
                    updateUI();
                }
            };
            
            const resetHandler = () => {
                currentStep = 0;
                updateUI();
            };

            btnNext.addEventListener('click', nextHandler);
            btnReset.addEventListener('click', resetHandler);

            return () => {
                btnNext.removeEventListener('click', nextHandler);
                btnReset.removeEventListener('click', resetHandler);
            };
        };
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 0: Title & Objectives
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-calculator delay-1" style="font-size: 5rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: clamp(2.5rem, 6vw, 3.5rem);">Polynomials & The Factor Theorem</h1>
                    <h2 class="delay-1" style="color: var(--accent);">Breaking down complex equations</h2>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 750px; margin: 3rem auto; text-align: left; transform: rotate(-1deg);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>
                        <ul style="margin-left: 1rem; display: grid; gap: 1rem; list-style-type: none; padding: 0; margin-top: 0.5rem;">
                            <li style="font-size: 1.4rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>📚</span>
                                <span>Learn the vocabulary and degrees of <strong>Polynomials</strong>.</span>
                            </li>
                            <li style="font-size: 1.4rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>➗</span>
                                <span>Understand how to divide polynomials safely.</span>
                            </li>
                            <li style="font-size: 1.4rem; display: flex; align-items: flex-start; gap: 10px; color: var(--text-main);">
                                <span>⚡</span>
                                <span>Use the <strong>Factor Theorem</strong> to completely factorise cubic expressions.</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // SLIDE 1: Polynomial Basics (Vocabulary)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Polynomial Basics: The Vocabulary</h2>
                    
                    <div class="glass-card delay-1" style="max-width: 900px; margin: 0 auto 2rem auto; text-align: center;">
                        <h3 style="color: var(--primary);">What is a Polynomial?</h3>
                        <p style="font-size: 1.3rem;">An algebraic expression made up of variables and constants. <br>The general form looks like this:</p>
                        <p style="font-size: clamp(1.2rem, 3vw, 1.8rem); margin-top: 1rem; color: var(--warning); font-weight: bold; overflow-x: auto;">
                            $a_nx^n + a_{n-1}x^{n-1} + ... + a_1x + a_0$
                        </p>
                    </div>

                    <div class="grid-2 delay-2" style="max-width: 1000px; margin: 0 auto; align-items: stretch;">
                        <div class="pedagogical-note note-write" style="margin: 0; transform: rotate(1deg);">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Key Terms to Know</div>
                            <ul style="margin-left: 1.5rem; font-size: 1.2rem; line-height: 1.6;">
                                <li><strong>Variable:</strong> The letter (usually $x$).</li>
                                <li><strong>Degree:</strong> The <em>highest power</em> of $x$ in the expression.</li>
                                <li><strong>Coefficients:</strong> The numbers multiplying the variables.</li>
                                <li><strong>Constant Term:</strong> The number on its own without an $x$ ($a_0$).</li>
                            </ul>
                        </div>

                        <div class="pedagogical-note note-success" style="margin: 0; transform: rotate(-1deg); display: flex; flex-direction: column; justify-content: center;">
                            <div class="pedagogical-badge"><i class="fa-solid fa-arrow-down-9-1"></i> Standard Form</div>
                            <p style="font-size: 1.2rem; margin-bottom: 1rem;">When writing a polynomial, always arrange the terms from the <strong>highest power down to the smallest</strong>.</p>
                            <div style="background: rgba(0,0,0,0.03); padding: 1rem; border-radius: 8px;">
                                <p style="font-size: 1.1rem; color: var(--text-dim); font-family: 'Outfit';">Example: Write $4x + x^3 - 2$ as:<br><strong style="color: var(--accent); font-size: 1.4rem;">$x^3 + 4x - 2$</strong></p>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // SLIDE 2: Types of Polynomials & Graphs
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Types of Polynomials</h2>
                    <p class="text-center delay-1" style="margin-bottom: 2rem;">Higher degrees mean <strong>higher curves</strong> (more turns) and more potential roots!</p>

                    <div class="grid-4 delay-2" style="max-width: 1100px; margin: 0 auto;">
                        
                        <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                            <h3 style="color: var(--primary); font-size: 1.2rem; margin-bottom: 0.5rem;">Linear</h3>
                            <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 1rem;">Degree 1 ($ax+b$)</p>
                            <svg class="math-graph" viewBox="0 0 100 100">
                                <line x1="10" y1="50" x2="90" y2="50" class="axis"/>
                                <line x1="50" y1="10" x2="50" y2="90" class="axis"/>
                                <path d="M 10 90 L 90 10" class="curve"/>
                                <circle cx="50" cy="50" class="root-dot"/>
                            </svg>
                        </div>

                        <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                            <h3 style="color: var(--warning); font-size: 1.2rem; margin-bottom: 0.5rem;">Quadratic</h3>
                            <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 1rem;">Degree 2 ($ax^2...$)</p>
                            <svg class="math-graph" viewBox="0 0 100 100">
                                <line x1="10" y1="50" x2="90" y2="50" class="axis"/>
                                <line x1="50" y1="10" x2="50" y2="90" class="axis"/>
                                <path d="M 10 10 Q 50 130 90 10" class="curve" style="stroke: var(--warning);"/>
                                <circle cx="26.9" cy="50" class="root-dot"/>
                                <circle cx="73.1" cy="50" class="root-dot"/>
                            </svg>
                        </div>

                        <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                            <h3 style="color: var(--accent); font-size: 1.2rem; margin-bottom: 0.5rem;">Cubic</h3>
                            <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 1rem;">Degree 3 ($ax^3...$)</p>
                            <svg class="math-graph" viewBox="0 0 100 100">
                                <line x1="10" y1="50" x2="90" y2="50" class="axis"/>
                                <line x1="50" y1="10" x2="50" y2="90" class="axis"/>
                                <path d="M 10 90 Q 25 10 50 50 T 90 10" class="curve" style="stroke: var(--accent);"/>
                                <circle cx="21.1" cy="50" class="root-dot"/>
                                <circle cx="50" cy="50" class="root-dot"/>
                                <circle cx="78.9" cy="50" class="root-dot"/>
                            </svg>
                        </div>

                        <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                            <h3 style="color: var(--danger); font-size: 1.2rem; margin-bottom: 0.5rem;">Quartic</h3>
                            <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 1rem;">Degree 4 ($ax^4...$)</p>
                            <svg class="math-graph" viewBox="0 0 100 100">
                                <line x1="10" y1="50" x2="90" y2="50" class="axis"/>
                                <line x1="50" y1="10" x2="50" y2="90" class="axis"/>
                                <path d="M 10 20 Q 25 100 50 40 Q 75 100 90 20" class="curve" style="stroke: var(--danger);"/>
                                <circle cx="17.7" cy="50" class="root-dot"/>
                                <circle cx="45.4" cy="50" class="root-dot"/>
                                <circle cx="54.6" cy="50" class="root-dot"/>
                                <circle cx="82.3" cy="50" class="root-dot"/>
                            </svg>
                        </div>

                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        },

        // SLIDE 3: Roots, Solutions, and Zeroes 
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Roots, Solutions, and Zeroes</h2>
                    
                    <div class="grid-2 delay-1" style="max-width: 1000px; margin: 2rem auto; align-items: center;">
                        
                        <div class="pedagogical-note note-write" style="margin: 0; transform: rotate(-1deg);">
                            <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                            <p style="font-size: 1.4rem; margin-bottom: 1rem;">These three words all mean the exact same thing in polynomials!</p>

                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Your Task Now</div>
                        <h3 style="color: var(--warning); margin-bottom: 0.5rem; font-size: 1.8rem;">Independent Practice</h3>
                        <p style="font-size: 1.4rem; margin-bottom: 1rem;">
                            In your notebooks, fully factorise the following cubic expression:
                        </p>
                        <p style="font-size: clamp(1.5rem, 4vw, 2rem); font-weight: bold; text-align: center; color: var(--primary); margin-bottom: 1rem; overflow-x: auto;">
                            $x^3 + 8x^2 + 4ax - 3a$
                        </p>
                        <p style="font-size: 1.2rem; text-align: center;"><em>Hint: The question states $(x + a)$ is a factor. Start there!</em></p>
                    </div>
                </div>
            `,
            script: () => { renderMath(); return () => {}; }
        }
    ];

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        // Execute cleanup from previous slide if it exists
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML synchronously
        container.innerHTML = slide.template();
        
        // Execute script immediately
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        // Prevent spacebar scrolling if it's acting as 'Next'
        if (e.key === ' ') {
            // Ignore if focus is on interactive elements like buttons or reveal cards
            if(document.activeElement.tagName === 'BUTTON' || document.activeElement.classList.contains('reveal-card')) return;
            e.preventDefault();
            changeSlide(1);
        }
        if (e.key === 'ArrowRight') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
</script>

</body>
