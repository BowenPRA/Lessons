<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13.2 Probability Trees - Year 8 Math</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for Formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (Notebook Edutech Standard) --- */
        :root {
            --bg-paper: #fdfbf7;       /* Warm paper white */
            --bg-panel: #ffffff;       /* Pure white for cards */
            --primary: #2563eb;        /* Blue Ink */
            --accent: #16a34a;         /* Green Ink */
            --warning: #ea580c;        /* Orange Highlighter */
            --danger: #dc2626;         /* Red Pen */
            --cold: #0284c7;           /* Light Blue */
            --purple: #7c3aed;         /* Purple Ink */
            --text-main: #334155;      /* Dark slate text */
            --text-dim: #64748b;       /* Secondary text */
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; color: var(--text-main); }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        p, li { font-size: 1.2rem; line-height: 1.6; color: var(--text-main); }

        strong { color: var(--text-main); font-weight: 800; }
        
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; align-items: start; }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: #ffffff;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .brand-pill {
            background: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 2px 2px 0px rgba(37, 99, 235, 0.3);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-image:
                linear-gradient(90deg, transparent 60px, rgba(220, 38, 38, 0.2) 60px, rgba(220, 38, 38, 0.2) 62px, transparent 62px),
                linear-gradient(rgba(37, 99, 235, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 32px;
            background-attachment: local;
        }

        .slide-wrapper {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer {
            height: var(--footer-h);
            background: #ffffff;
            border-top: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--bg-panel);
            border: 2px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
        }

        .pedagogical-note {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            border-left: 5px solid;
            background: #ffffff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
            animation: slideIn 0.5s ease;
            font-family: 'Kalam', cursive;
            font-size: 1.3rem;
        }
        .pedagogical-note p, .pedagogical-note li, .pedagogical-note h3 {
            font-family: 'Kalam', cursive;
        }
        .pedagogical-badge {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        
        .note-write { border-color: var(--primary); }
        .note-write .pedagogical-badge { color: var(--primary); }
        .note-task { border-color: var(--warning); }
        .note-task .pedagogical-badge { color: var(--warning); }
        .note-theory { border-color: var(--danger); }
        .note-theory .pedagogical-badge { color: var(--danger); }
        .note-success { border-color: var(--accent); }
        .note-success .pedagogical-badge { color: var(--accent); }

        .problem-block {
            background: #ffffff;
            border: 2px dashed var(--purple);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.4rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.06);
        }
        .problem-number {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--purple);
            margin-right: 0.5rem;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            width: 100%;
        }
        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .btn-action.btn-accent { background: var(--accent); }
        .btn-action.btn-warning { background: var(--warning); }
        .btn-action.btn-purple { background: var(--purple); }

        .answer-box {
            display: none; 
            background: #ffffff; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border: 2px solid var(--accent); 
            margin-top: 1rem; 
            box-shadow: 3px 3px 0px rgba(22, 163, 74, 0.2);
            text-align: center;
        }
        .answer-box p {
            font-family: 'Kalam', cursive;
            font-size: 1.5rem;
            line-height: 1.5;
        }
        .final-ans {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.8rem !important;
            margin-top: 0.5rem;
        }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; margin-bottom: 1rem; color: var(--text-main); background: #ffffff; font-size: 1.3rem; }
        .data-table th, .data-table td { border: 2px solid rgba(0,0,0,0.2); padding: 0.8rem; text-align: left; }
        .data-table th { background: rgba(37,99,235,0.1); color: var(--text-main); font-family: 'Outfit'; font-weight: bold; }

        .list-item {
            background: white;
            border: 2px solid rgba(0,0,0,0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            font-family: 'Kalam', cursive;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .list-icon { color: var(--primary); font-size: 1.5rem; width: 30px; text-align: center; }

        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .btn-nav:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        .progress-container { flex: 1; margin: 0 2rem; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--cold), var(--primary)); transition: width 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-enter { animation: fadeIn 0.4s ease-out; }
        .delay-1 { animation: slideIn 0.4s ease-out 0.1s both; }
        .delay-2 { animation: slideIn 0.4s ease-out 0.2s both; }

        /* Tree SVG Classes */
        .svg-tree { width: 100%; height: auto; max-height: 55vh; display: block; margin: 0 auto; }
        .tree-line { stroke: var(--text-dim); stroke-width: 3; fill: none; stroke-linecap: round; }
        .tree-node { fill: white; stroke: var(--primary); stroke-width: 3; }
        .tree-node-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; fill: var(--primary); text-anchor: middle; dominant-baseline: central; }
        .tree-prob { font-family: 'Kalam', cursive; font-size: 20px; font-weight: bold; fill: var(--danger); text-anchor: middle; paint-order: stroke; stroke: white; stroke-width: 6px; }
        .tree-outcome { font-family: 'Outfit', sans-serif; font-weight: bold; font-size: 20px; fill: var(--text-main); alignment-baseline: central; }

        /* Spinner CSS */
        .spinner-container { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .spinner-wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--text-main);
            background: conic-gradient(var(--danger) 0% 50%, var(--accent) 50% 80%, var(--primary) 80% 100%);
            transition: transform 3s cubic-bezier(0.25, 1, 0.1, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .spinner-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--text-main); z-index: 10;
        }

        @media (max-width: 1024px) { .slide-wrapper { padding-left: 60px; } }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 1rem; }
            h1 { font-size: 2rem; }
            .slide-wrapper { padding-left: 2rem; }
            .viewport { background-image: none; background-color: var(--bg-paper); }
            .svg-tree { max-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill"><i class="fa-solid fa-tree"></i> Year 8 Math</div>
            <span style="font-weight: 700; color: var(--text-dim); font-size: 1rem;">13.2 Probability Trees</span>
        </div>
        <div style="font-family: 'Kalam', cursive; font-weight: 700; color: var(--text-main); font-size: 1.2rem;">
            7 April 2026
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slide content injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    /* --- ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    const renderMath = () => {
        if (window.MathJax) {
            window.MathJax.typesetPromise().catch((err) => console.log('MathJax error:', err));
        }
    };

    const bindReveals = (container) => {
        const btns = container.querySelectorAll('.reveal-btn');
        const handlers = [];
        btns.forEach(btn => {
            const handler = () => {
                const targetId = btn.getAttribute('data-target');
                const target = container.querySelector('#' + targetId);
                target.style.display = 'block';
                target.classList.add('anim-enter');
                btn.style.display = 'none';
                renderMath();
            };
            handlers.push({ el: btn, fn: handler });
            btn.addEventListener('click', handler);
        });
        return () => handlers.forEach(h => h.el.removeEventListener('click', h.fn));
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Title
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-network-wired delay-1" style="font-size: 5rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1" style="font-size: 3.5rem;">Probability Trees</h1>
                    <h2 class="delay-1" style="color: var(--accent);">Visualizing Multiple Events</h2>
                    
                    <div class="pedagogical-note note-write delay-2" style="max-width: 700px; margin: 3rem auto; text-align: left; transform: rotate(-1deg);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Write This Down</div>
                        <h3 style="color: var(--primary); margin-bottom: 0.5rem; font-size: 1.8rem;">Today's Objective:</h3>
                        <p style="font-size: 1.4rem;">I can draw and use probability trees to calculate the chance of multiple events happening in a row.</p>
                    </div>
                </div>
            `,
            script: () => { return () => {}; }
        },

        // SLIDE 2: Warm Up
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Warm Up: Rank the Events</h2>
                    <p class="text-center delay-1" style="color: var(--text-dim); margin-bottom: 2rem; font-size: 1.3rem;">Order these 5 events from <strong>Least Likely</strong> to <strong>Most Likely</strong> to happen.</p>

                    <div class="grid-2 delay-2" style="max-width: 1000px; margin: 0 auto; align-items: stretch;">
                        
                        <!-- Events List -->
                        <div class="glass-card" style="border-top: 4px solid var(--purple);">
                            <h3 style="color: var(--purple); margin-bottom: 1.5rem;"><i class="fa-solid fa-list"></i> The Events</h3>
                            
                            <div class="list-item"><i class="fa-solid fa-coins list-icon"></i> A: Flipping 1 Head on 1 Coin</div>
                            <div class="list-item"><i class="fa-solid fa-dice list-icon"></i> B: Rolling 6 Sixes on 6 Dice Rolls</div>
                            <div class="list-item"><i class="fa-solid fa-ticket list-icon"></i> C: Winning the Jackpot Lottery</div>
                            <div class="list-item"><i class="fa-solid fa-leaf list-icon" style="color:var(--accent)"></i> F: Finding a 4-Leaf Clover</div>
                            <div class="list-item"><i class="fa-solid fa-coins list-icon" style="color:var(--warning)"></i> D: Getting 10 Heads on 10 Coins</div>
                            <div class="list-item"><i class="fa-solid fa-crown list-icon" style="color:var(--danger)"></i> E: A Royal Flush in Poker</div>
                            
                            <p style="font-size: 1rem; color: var(--text-dim); margin-top: 1rem; text-align: center;">Write your predicted order (e.g., A, B, C...) in your notebook.</p>
                        </div>

                        <!-- Answer Reveal -->
                        <div class="glass-card" style="border-top: 4px solid var(--accent); display: flex; flex-direction: column; justify-content: center;">
                            <div style="text-align: center;">
                                <button class="btn-action btn-accent reveal-btn" data-target="warmup-ans" style="font-size: 1.3rem; padding: 1rem 2rem;"><i class="fa-solid fa-ranking-star"></i> Reveal Correct Order</button>
                            </div>
                            
                            <div id="warmup-ans" class="answer-box" style="text-align: left; padding: 1rem;">
                                <h4 style="font-family: 'Outfit'; margin-bottom: 1rem; color: var(--text-main);">From Least to Most Likely:</h4>
                                <ol style="font-family: 'Plus Jakarta Sans'; font-size: 1.1rem; line-height: 1.8; margin-left: 1.5rem; color: var(--text-main);">
                                    <li><strong>C: Lottery</strong> <span style="color: var(--text-dim); font-size: 0.9rem;">(1 in 14 Million)</span></li>
                                    <li><strong>E: Royal Flush</strong> <span style="color: var(--text-dim); font-size: 0.9rem;">(1 in 649,740)</span></li>
                                    <li><strong>B: 6 Sixes</strong> <span style="color: var(--text-dim); font-size: 0.9rem;">(1 in 46,656)</span></li>
                                    <li><strong>F: 4-Leaf Clover</strong> <span style="color: var(--accent); font-weight: bold; font-size: 0.9rem;">(1 in 10,000)</span></li>
                                    <li><strong>D: 10 Heads</strong> <span style="color: var(--text-dim); font-size: 0.9rem;">(1 in 1,024)</span></li>
                                    <li><strong>A: 1 Head</strong> <span style="color: var(--accent); font-weight: bold; font-size: 1rem;">(1 in 2)</span></li>
                                </ol>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            script: (container) => bindReveals(container)
        },

        // SLIDE 3: Theory of Trees
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">How Probability Trees Work</h2>
                    
                    <div class="pedagogical-note note-theory delay-1" style="max-width: 900px; margin: 1rem auto; text-align: center; transform: rotate(0.5deg);">
                        <div class="pedagogical-badge"><i class="fa-solid fa-code-branch"></i> The Branch Rules</div>
                        <p style="font-size: 1.5rem; color: var(--text-main);">When events happen one after another (like flipping a coin twice), a tree helps us organize the outcomes.</p>
                    </div>

                    <div class="grid-2 delay-2" style="max-width: 1000px; margin: 2rem auto; align-items: start;">
                        
                        <div class="glass-card" style="border-top: 4px solid var(--danger); text-align: center;">
                            <h3 style="color: var(--danger);"><i class="fa-solid fa-xmark"></i> Rule 1: Multiply ALONG branches</h3>
                            <p style="font-family: 'Kalam'; font-size: 1.4rem; margin-top: 1rem;">When moving left to right (Event 1 <strong>AND</strong> Event 2), you <strong>multiply</strong> the fractions or decimals.</p>
                            <div style="background: rgba(220, 38, 38, 0.1); padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                                <p style="font-family: 'Outfit'; font-weight: bold; color: var(--danger);">The "AND" Rule = Multiply</p>
                            </div>
                        </div>

                        <div class="glass-card" style="border-top: 4px solid var(--primary); text-align: center;">
                            <h3 style="color: var(--primary);"><i class="fa-solid fa-plus"></i> Rule 2: Add DOWN columns</h3>
                            <p style="font-family: 'Kalam'; font-size: 1.4rem; margin-top: 1rem;">If there are multiple winning paths (Outcome A <strong>OR</strong> Outcome B), you <strong>add</strong> the final probabilities together.</p>
                            <div style="background: rgba(37, 99, 235, 0.1); padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                                <p style="font-family: 'Outfit'; font-weight: bold; color: var(--primary);">The "OR" Rule = Add</p>
                            </div>
                        </div>

                    </div>
                </div>
            `,
            script: () => { return () => {}; }
        },

        // SLIDE 4: Fair Coin Tree (3 Flips) + Questions
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Example 1: Flipping 3 Coins</h2>
                    <p class="text-center delay-1" style="color: var(--text-dim); margin-bottom: 1.5rem; font-size: 1.3rem;">A fair coin is flipped 3 times. Calculate the probabilities based on the tree below.</p>

                    <div class="glass-card delay-2" style="max-width: 1100px; margin: 0 auto 1.5rem auto; padding: 1rem; overflow-x: auto;">
                        <svg class="svg-tree" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
                            <!-- Flip 1 Lines -->
                            <line x1="50" y1="285" x2="250" y2="145" class="tree-line" />
                            <line x1="50" y1="285" x2="250" y2="425" class="tree-line" />
                            
                            <!-- Flip 2 Lines (Top) -->
                            <line x1="250" y1="145" x2="450" y2="75" class="tree-line" />
                            <line x1="250" y1="145" x2="450" y2="215" class="tree-line" />
                            <!-- Flip 2 Lines (Bottom) -->
                            <line x1="250" y1="425" x2="450" y2="355" class="tree-line" />
                            <line x1="250" y1="425" x2="450" y2="495" class="tree-line" />

                            <!-- Flip 3 Lines -->
                            <line x1="450" y1="75" x2="650" y2="40" class="tree-line" />
                            <line x1="450" y1="75" x2="650" y2="110" class="tree-line" />
                            <line x1="450" y1="215" x2="650" y2="180" class="tree-line" />
                            <line x1="450" y1="215" x2="650" y2="250" class="tree-line" />
                            <line x1="450" y1="355" x2="650" y2="320" class="tree-line" />
                            <line x1="450" y1="355" x2="650" y2="390" class="tree-line" />
                            <line x1="450" y1="495" x2="650" y2="460" class="tree-line" />
                            <line x1="450" y1="495" x2="650" y2="530" class="tree-line" />

                            <!-- Probabilities Text (1/2 everywhere, carefully spaced above lines) -->
                            <text x="150" y="205" class="tree-prob">1/2</text>
                            <text x="150" y="375" class="tree-prob">1/2</text>
                            
                            <text x="350" y="100" class="tree-prob">1/2</text>
                            <text x="350" y="195" class="tree-prob">1/2</text>
                            <text x="350" y="380" class="tree-prob">1/2</text>

            script: (container) => {
                renderMath();
                const btn = container.querySelector('#spin-btn');
                const wheel = container.querySelector('#rgb-spinner');
                const res = container.querySelector('#spin-result');
                let rotation = 0;
                
                const handleSpin = () => {
                    btn.disabled = true;
                    res.textContent = "...";
                    // Add random spins (5 to 10 full rotations) plus a random extra angle
                    const extraSpins = Math.floor(Math.random() * 5 + 5) * 360;
                    const randomAngle = Math.floor(Math.random() * 360);
                    rotation += extraSpins + randomAngle;
                    
                    wheel.style.transform = `rotate(${rotation}deg)`;
                    
                    setTimeout(() => {
                        btn.disabled = false;
                        // Calculate outcome (0 at top, going clockwise)
                        const finalAngle = rotation % 360;
                        let outcome = "";
                        // Conic gradient mapping: Red 0-50% (0-180deg), Green 50-80% (180-288deg), Blue 80-100% (288-360deg)
                        // Wheel rotation moves coordinates so the top angle is 360 - rotation.
                        const topAngle = (360 - finalAngle) % 360;
                        if (topAngle < 180) {
                            outcome = "Red!";
                            res.style.color = "var(--danger)";
                        } else if (topAngle < 288) {
                            outcome = "Green!";
                            res.style.color = "var(--accent)";
                        } else {
                            outcome = "Blue!";
                            res.style.color = "var(--primary)";
                        }
                        res.textContent = outcome;
                    }, 3000);
                };
                
                btn.addEventListener('click', handleSpin);
                return () => btn.removeEventListener('click', handleSpin);
            }
        },

    // --- RENDER LOGIC ---
    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        container.innerHTML = slide.template();
        
        if (slide.script) {
            state.cleanupFn = slide.script(container);
        }
        
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });
