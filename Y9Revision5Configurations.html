<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry: Atomic Structure and Periodic Trends - Year 9 Science</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- MathJax for formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* --- DESIGN TOKENS (BOWEN ENGINE) --- */
        :root {
            --bg-deep: #0f172a;        
            --bg-panel: #1e293b;       
            --primary: #8b5cf6;        
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #10b981;         
            --warning: #f59e0b;        
            --danger: #ef4444;         
            --text-light: #f8fafc;     
            --text-dim: #94a3b8;       
            
            --header-h: 70px;
            --footer-h: 80px;
            --border-radius: 16px;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-size: 18px; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 35%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* --- LAYOUT --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .brand-pill {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .viewport {
            flex: 1;
            position: relative;
            overflow-y: hidden; 
            display: flex;
            flex-direction: column;
        }

        .slide-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 4rem; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .footer {
            height: var(--footer-h);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 20;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; line-height: 1.2; letter-spacing: -0.5px; }
        h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 0 0 30px var(--primary-glow); }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #c4b5fd; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        h4 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 0.5rem; }
        p, li { line-height: 1.6; margin-bottom: 1rem; font-size: 1.2rem; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        strong { font-weight: 800; color: white; }

        /* --- COMPONENTS --- */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; align-items: stretch; }

        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .data-table th { background: rgba(255,255,255,0.05); color: var(--primary); font-family: 'Outfit'; font-weight: bold; }
        .data-table tr:last-child td { border-bottom: none; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-nav {
            width: 56px; height: 56px;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-light);
            font-size: 1.4rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }
        .btn-nav:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            color: white;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: linear-gradient(135deg, #7c3aed, #5b21b6); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.4); }

        /* Progress Bar */
        .progress-container { flex: 1; margin: 0 3rem; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #a78bfa); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow); }

        /* --- SIGNPOSTING (PEDAGOGICAL NOTES) --- */
        .pedagogical-note {
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 6px solid;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .pedagogical-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1.5px;
        }

        .note-write { border-left-color: #3b82f6; background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-write .pedagogical-badge { color: #60a5fa; }
        .note-task { border-left-color: var(--warning); background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-task .pedagogical-badge { color: #fbbf24; }
        .note-theory { border-left-color: var(--primary); background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-theory .pedagogical-badge { color: #a78bfa; }
        .note-success { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(16, 185, 129, 0.15), rgba(30, 41, 59, 0.8)); }
        .note-success .pedagogical-badge { color: #34d399; }

        /* --- Q&A ACCORDION STYLES --- */
        .qa-container { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .qa-item { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        .qa-header { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .qa-question { font-size: 1.2rem; font-weight: 600; color: var(--text-light); }
        .qa-body { padding: 0 1.2rem; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; background: rgba(16, 185, 129, 0.1); border-top: 1px solid transparent; }
        .qa-item.expanded .qa-body { padding: 1.2rem; max-height: 500px; border-color: rgba(16, 185, 129, 0.3); }
        .qa-answer { color: #34d399; font-weight: bold; font-size: 1.2rem; margin: 0; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4)); } 50% { filter: drop-shadow(0 0 35px rgba(139, 92, 246, 0.8)); } 100% { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4)); } }
        
        .anim-enter { animation: fadeIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }

        .text-center { text-align: center; }
        .hidden { display: none !important; }

        /* SVG Element Cell Styles */
        .atom-shell { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 1.5; }
        .atom-nucleus { fill: #334155; stroke: var(--primary); stroke-width: 2; }
        .atom-text { font-family: 'Outfit', sans-serif; fill: var(--text-light); font-size: 11px; font-weight: bold; text-anchor: middle; }
    </style>
</head>
<body>

<!-- GLOBAL SVG DEFS for Electrons -->
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <defs>
        <!-- The X representation of an electron -->
        <g id="electron-x" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round">
            <line x1="-4" y1="-4" x2="4" y2="4" />
            <line x1="-4" y1="4" x2="4" y2="-4" />
        </g>
    </defs>
</svg>

<div class="app-shell">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="brand-pill">Year 9 Science</div>
            <span style="font-weight: 700; color: #cbd5e1; font-size: 1.2rem; letter-spacing: 0.5px;">Atomic Structure & Periodic Trends</span>
        </div>
        <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.2rem; color: var(--accent);">
            Learner Book Revision
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div id="slide-container" class="slide-wrapper" aria-live="polite">
            <!-- Slides injected here -->
        </div>
    </main>

    <footer class="footer">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous Slide">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        
        <button class="btn btn-nav" id="btn-next" aria-label="Next Slide">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </footer>
</div>

<script>
    // --- THE BOWEN ENGINE ---
    const Engine = {
        currentSlide: 0,
        cleanupFn: null,
        slides: [],
        
        init(slides) {
            this.slides = slides;
            document.getElementById('btn-prev').addEventListener('click', () => this.navigate(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.navigate(1));
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') this.navigate(1);
                if (e.key === 'ArrowLeft') this.navigate(-1);
            });
            
            this.render();
        },

        navigate(dir) {
            const next = this.currentSlide + dir;
            if (next >= 0 && next < this.slides.length) {
                this.currentSlide = next;
                this.render();
            }
        },

        render() {
            if (this.cleanupFn && typeof this.cleanupFn === 'function') {
                this.cleanupFn();
                this.cleanupFn = null;
            }

            const container = document.getElementById('slide-container');
            const slide = this.slides[this.currentSlide];
            
            container.innerHTML = slide.template();
            
            if (slide.script) {
                this.cleanupFn = slide.script(container);
            }

            document.getElementById('progress-bar').style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
            document.getElementById('btn-prev').disabled = this.currentSlide === 0;
            document.getElementById('btn-next').disabled = this.currentSlide === this.slides.length - 1;
            
            const wrapper = document.querySelector('.slide-wrapper');
            if(wrapper) wrapper.scrollTop = 0;

            if (window.MathJax) {
                MathJax.typesetPromise([container]);
            }
        }
    };

    // --- LESSON CONTENT ---

    const lessonSlides = [
        // Slide 1: Objective & Title
        {
            template: () => `
                <div class="anim-enter text-center">
                    <div style="position: relative; display: inline-block; margin-bottom: 2rem; animation: pulseGlow 4s infinite;">
                        <i class="fa-solid fa-atom" style="font-size: 6rem; color: var(--primary);"></i>
                    </div>
                    <h1>Properties of Materials</h1>
                    <h2 style="color: var(--text-dim); font-size: 2rem; margin-top: -1rem;">Atomic Structure & The Periodic Table</h2>
                    
                    <div class="pedagogical-note note-success delay-1" style="max-width: 900px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Revision Objectives</div>
                        <p style="font-size: 1.5rem; font-weight: 600; line-height: 1.4; margin: 0; color: white;">
                            Review the structure of the atom, electron configurations, and decode the properties of Groups 1, 7, and 8 in the Periodic Table.
                        </p>
                    </div>
                </div>
            `
        },

        // Slide 2: Mass, Density & Atomic Structure
        {
            template: () => `
                <div class="anim-enter">
                    <h2>1. Mass, Density & Arranging Electrons</h2>
                    
                    <div class="grid-2">
                        <div class="delay-1">
                            <div class="glass-card">
                                <h3>Mass & Density</h3>
                                <p>The higher the <strong>mass number</strong>, the more mass the atom has. E.g., Carbon (mass 12) is 12 times heavier than Hydrogen (mass 1).</p>
                                <p>The measure of mass for a fixed volume is called <strong>density</strong>.</p>
                                <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; text-align: center; margin: 1rem 0;">
                                    <span style="font-size: 1.5rem; color: var(--accent);">$$ \mathrm{Density} = \frac{\mathrm{Mass\ (g)}}{\mathrm{Volume\ (cm^3)}} $$</span>
                                </div>
                                <p style="font-size: 1.1rem; color: var(--text-dim);">E.g., Iron (7.87 g/cm<sup>3</sup>) is much denser than Sodium (0.97 g/cm<sup>3</sup>).</p>
                            </div>
                        </div>

                        <div class="delay-2">
                            <div class="pedagogical-note note-theory" style="margin: 0;">
                                <div class="pedagogical-badge"><i class="fa-solid fa-circle-nodes"></i> Arranging Electrons</div>
                                <p>In 1913, Niels Bohr developed Rutherford's model. He proved that electrons move in different <strong>electron shells</strong> (energy levels) around the nucleus.</p>
                                <ul style="margin-top: 1rem;">
                                    <li>Electrons are held in place by <strong>electrostatic forces</strong>.</li>
                                    <li><strong>1st Shell:</strong> Max 2 electrons.</li>
                                    <li><strong>2nd & 3rd Shells:</strong> Max 8 electrons.</li>
                                </ul>
                                <p style="font-size: 1.1rem; color: var(--accent);">Example: Boron has 5 electrons. Its electronic structure is written as <strong>2,3</strong>.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },

        // Slide 3: Drawing Electron Shells (Theory/Observation)
        {
            template: () => `
                <div class="anim-enter">
                    <h2>2. Drawing Electron Structures</h2>
                    <p style="color: var(--text-dim); margin-bottom: 2rem;">Electrons are conventionally represented as crosses (<span style="color: var(--primary); font-weight:bold;">x</span>) placed on concentric circles.</p>

                    <div class="pedagogical-note note-task delay-1" style="max-width: 1000px; margin: 0 auto 2rem auto;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Student Task</div>
                        <p style="font-size: 1.3rem; margin: 0;"><strong>Copy these two diagrams into your exercise book exactly as they appear below.</strong> Ensure you label the nucleus with the correct protons (p) and neutrons (n), and place the crosses carefully on the shells.</p>
                    </div>

                    <div class="grid-2 text-center delay-2" style="max-width: 1000px; margin: 0 auto;">
                        
                        <!-- Lithium Diagram -->
                        <div class="glass-card">
                            <h3 style="color: white; margin-bottom: 1.5rem;">Lithium (Li)</h3>
                            <svg width="220" height="220" viewBox="0 0 200 200" style="margin: 0 auto;">
                                <circle cx="100" cy="100" r="18" class="atom-nucleus" />
                                <text x="100" y="97" class="atom-text">3p</text>
                                <text x="100" y="109" class="atom-text">4n</text>
                                
                                <circle cx="100" cy="100" r="40" class="atom-shell" />
                                <circle cx="100" cy="100" r="75" class="atom-shell" />
                                
                                <!-- Shell 1 (2 e-) -->
                                <use href="#electron-x" x="100" y="60" />
                                <use href="#electron-x" x="100" y="140" />
                                
                                <!-- Shell 2 (1 e-) -->
                                <use href="#electron-x" x="100" y="25" />
                            </svg>
                            <p style="margin-top: 1rem; color: var(--accent); font-size: 1.2rem; font-weight: bold;">Electronic Structure: 2, 1</p>
                        </div>

                        <!-- Sodium Diagram -->
                        <div class="glass-card">
                            <h3 style="color: white; margin-bottom: 1.5rem;">Sodium (Na)</h3>
                            <svg width="220" height="220" viewBox="0 0 200 200" style="margin: 0 auto;">
                                <circle cx="100" cy="100" r="18" class="atom-nucleus" />
                                <text x="100" y="97" class="atom-text">11p</text>
                                <text x="100" y="109" class="atom-text">12n</text>
                                
                                <circle cx="100" cy="100" r="30" class="atom-shell" />
                                <circle cx="100" cy="100" r="55" class="atom-shell" />
                                <circle cx="100" cy="100" r="80" class="atom-shell" />
                                
                                <!-- Shell 1 (2 e-) -->
                                <use href="#electron-x" x="100" y="70" />
                                <use href="#electron-x" x="100" y="130" />
                                
                                <!-- Shell 2 (8 e- in compass pairs) -->
                                <use href="#electron-x" x="94" y="46" />
                                <use href="#electron-x" x="106" y="46" />
                                <use href="#electron-x" x="94" y="154" />
                                <use href="#electron-x" x="106" y="154" />
                                <use href="#electron-x" x="46" y="94" />
                                <use href="#electron-x" x="46" y="106" />
                                <use href="#electron-x" x="154" y="94" />
                                <use href="#electron-x" x="154" y="106" />

                                <!-- Shell 3 (1 e-) -->
                                <use href="#electron-x" x="100" y="20" />
                            </svg>
                            <p style="margin-top: 1rem; color: var(--accent); font-size: 1.2rem; font-weight: bold;">Electronic Structure: 2, 8, 1</p>
                        </div>

                    </div>
                </div>
            `
        },

        // Slide 4: Student Practice (Your Turn)
        {
            template: () => `
                <div class="anim-enter">
                    <h2>3. Your Turn: Draw the Atoms</h2>
                    
                    <div class="pedagogical-note note-write delay-1" style="max-width: 1000px; margin: 0 auto 2rem auto;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-graduation-cap"></i> Apply your knowledge</div>
                        <p style="font-size: 1.2rem; margin: 0;">Use the <strong>Atomic Number</strong> to determine the number of protons (and electrons), and the <strong>Mass Number</strong> to calculate the neutrons. Draw the electron shell diagrams for these two elements in your book.</p>
                    </div>

                    <div class="grid-2 text-center delay-2" style="max-width: 1000px; margin: 0 auto;">
                        
                        <!-- Oxygen Challenge -->
                        <div class="glass-card" style="border-top: 4px solid var(--primary);">
                            <h3 style="color: var(--primary);">Oxygen (O)</h3>
                            <p style="font-size: 1.3rem; margin: 1rem 0;">Atomic Number: <strong>8</strong></p>
                            <p style="font-size: 1.3rem; margin-bottom: 2rem;">Mass Number: <strong>16</strong></p>
                            
                            <div class="reveal-container-1 hidden">
                                <svg width="220" height="220" viewBox="0 0 200 200" style="margin: 0 auto;">
                                    <circle cx="100" cy="100" r="18" class="atom-nucleus" />
                                    <text x="100" y="97" class="atom-text">8p</text>
                                    <text x="100" y="109" class="atom-text">8n</text>
                                    
                                    <circle cx="100" cy="100" r="35" class="atom-shell" />
                                    <circle cx="100" cy="100" r="70" class="atom-shell" />
                                    
                                    <!-- Shell 1 (2 e-) -->
                                    <use href="#electron-x" x="100" y="65" />
                                    <use href="#electron-x" x="100" y="135" />
                                    
                                    <!-- Shell 2 (6 e- in compass layout) -->
                                    <use href="#electron-x" x="94" y="31" />
                                    <use href="#electron-x" x="106" y="31" />
                                    <use href="#electron-x" x="94" y="169" />
                                    <use href="#electron-x" x="106" y="169" />
                                    <use href="#electron-x" x="30" y="100" />
                                    <use href="#electron-x" x="170" y="100" />
                                </svg>
                                <p style="margin-top: 1rem; color: var(--accent); font-weight: bold;">Structure: 2, 6</p>
                            </div>
