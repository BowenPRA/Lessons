        /* Lab Table */

        /* Navigation Buttons */
        .btn-nav {

        /* Canvas/Simulation styling */
        canvas {

<script>
    /* --- BOWEN ENGINE CORE --- */
    const state = {
        currentSlide: 0,
        slides: [],
        cleanupFn: null
    };

    // --- SLIDE DEFINITIONS ---
    state.slides = [
        // SLIDE 1: Title & Objectives
        {
            template: () => `
                <div class="anim-enter text-center">
                    <i class="fa-solid fa-flask-vial delay-1" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h1 class="delay-1">Concentration and the<br>Rate of Reaction</h1>
                    
                    <div class="pedagogical-note note-success delay-2" style="max-width: 650px; margin: 3rem auto; text-align: left;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-bullseye"></i> Lesson Objectives</div>
                        <ul style="margin-left: 1.5rem; display: grid; gap: 0.8rem;">
                            <li>Define <strong>concentration</strong> and understand how it is controlled in the lab.</li>
                            <li>Explain the effect of changes in concentration on the rate of reaction using particle theory.</li>
                        </ul>
                    </div>
                </div>
            `
        },
        
        // SLIDE 2: Hook / Getting Started
        {
            template: () => `
                <div class="anim-enter">
                    <h2>What does "Concentration" mean?</h2>
                    
                    <div class="pedagogical-note note-task delay-1">
                        <div class="pedagogical-badge"><i class="fa-solid fa-comments"></i> Partner Discussion</div>
                        <p style="margin-bottom: 1rem;">Discuss these everyday and scientific examples with the person next to you:</p>
                        
                        <div style="display: grid; gap: 1rem;">
                            <div style="border: 2px dashed rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 8px; background: rgba(0,0,0,0.2);">
                                <strong style="color: var(--warning); font-size: 1.2rem;">Everyday Life:</strong>
                                <p style="margin-top: 0.5rem;">If you are making orange squash/cordial to drink, and it tastes "too weak", what do you do to fix it? What does that mean for the "concentration" of orange flavour?</p>
                            </div>
                            <div style="border: 2px dashed rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 8px; background: rgba(0,0,0,0.2);">
                                <strong style="color: var(--primary); font-size: 1.2rem;">Science Lab:</strong>
                                <p style="margin-top: 0.5rem;">What do you think would happen if you carried out an experiment with marble chips (calcium carbonate) using different concentrations of acid, but kept the mass and temperature exactly the same?</p>
                            </div>
                        </div>
                    </div>

                    <div class="reveal-card delay-2" id="hook-reveal" role="button" tabindex="0">
                        <div class="pre-reveal">
                            <i class="fa-solid fa-lightbulb" style="font-size: 2rem; margin-bottom: 1rem; color: var(--primary);"></i>
                            <h3>Click to reveal the scientific concept</h3>
                        </div>
                        <div class="reveal-content text-left">
                            <h3 style="color: var(--accent);"><i class="fa-solid fa-check-circle"></i> The Core Idea</h3>
                            <p>To fix "weak" squash, you add more syrup. You are putting <strong>more particles</strong> of flavour into the same space.</p>
                            <p style="margin-top: 0.5rem;">In the lab, a more concentrated acid has more acid particles in it, meaning it will react with the marble chips much <strong>faster</strong>!</p>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const revealCard = container.querySelector('#hook-reveal');
                const handler = () => { revealCard.classList.add('revealed'); };
                revealCard.addEventListener('click', handler);
                return () => revealCard.removeEventListener('click', handler);
            }
        },

        // SLIDE 3: Defining Concentration (Write This Down)
        {
            template: () => `
                <div class="anim-enter">
                    <h2 class="text-center">Defining Concentration</h2>
                    
                    <div class="pedagogical-note note-write delay-1" style="max-width: 800px; margin: 2rem auto;">
                        <div class="pedagogical-badge"><i class="fa-solid fa-pencil"></i> Copy to Notebook</div>
                        
                        <div style="display: flex; gap: 2rem; align-items: center; background: var(--bg-deep); padding: 2rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="flex: 1;">
                                <h3 style="color: var(--text-light); margin-bottom: 1rem;">Concentration</h3>
                                <p style="font-size: 1.2rem; color: white;">Concentration is a measure of the <strong>number of particles</strong> of a substance in a given <strong>volume</strong>.</p>
                                
                                <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-top: 1.5rem; text-align: center;">
                                    $$ \\text{Concentration} = \\frac{\\text{Amount of Solute}}{\\text{Volume of Solution}} $$
                                </div>
                            </div>
                            
                            <div style="flex: 1; text-align: center;">
                                <div style="display: flex; justify-content: space-around; gap: 1rem;">
                                    <div>
                                        <div style="width: 80px; height: 100px; border: 3px solid #ccc; border-top: none; border-radius: 0 0 10px 10px; position: relative; background: rgba(59, 130, 246, 0.2); margin: 0 auto;">
                                            <!-- Low particles -->
                                            <div style="position: absolute; top: 70%; left: 30%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 40%; left: 60%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 80%; left: 50%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 50%; left: 20%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                        </div>
                                        <p style="margin-top: 0.5rem; font-weight: bold; color: var(--text-dim);">Dilute</p>
                                    </div>
                                    <div>
                                        <div style="width: 80px; height: 100px; border: 3px solid #ccc; border-top: none; border-radius: 0 0 10px 10px; position: relative; background: rgba(59, 130, 246, 0.2); margin: 0 auto;">
                                            <!-- High particles -->
                                            <div style="position: absolute; top: 70%; left: 30%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 40%; left: 60%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 80%; left: 50%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 50%; left: 20%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 30%; left: 30%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 90%; left: 70%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 60%; left: 80%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 20%; left: 50%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 75%; left: 15%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                            <div style="position: absolute; top: 45%; left: 40%; width: 6px; height: 6px; background: var(--primary); border-radius: 50%;"></div>
                                        </div>
                                        <p style="margin-top: 0.5rem; font-weight: bold; color: var(--primary);">Concentrated</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                if(window.MathJax) MathJax.typesetPromise([container]);
            }
        },

        // SLIDE 4: Controlling Concentration in the Lab
        {
            template: () => `
                <div class="anim-enter grid-2">
                    <div>
                        <h2>Making Dilutions</h2>
                        <p style="margin-bottom: 1rem;">When we plan an investigation, we must control the concentration of our acid.</p>
                        <p style="margin-bottom: 1rem;">We do this by taking a strong stock acid and <strong>diluting</strong> it with water. Notice how the <strong>Total Volume</strong> must stay exactly the same ($50\\text{ cm}^3$) to keep it a fair test.</p>
                        
                        <div class="pedagogical-note note-theory delay-1">
                            <div class="pedagogical-badge"><i class="fa-solid fa-triangle-exclamation"></i> Lab Safety</div>
                            <p>Corrosive liquids are highly dangerous. Wearing safety glasses is essential when making different concentrations of acid.</p>
                        </div>
                    </div>
                    
                    <div class="glass-card delay-2">
                        <h3 style="text-align: center; margin-bottom: 0;">Dilution Table</h3>
                        <p style="text-align: center; font-size: 0.9rem; margin-bottom: 1rem;">(Target total volume: 50 cm³)</p>
                        
                        <table class="lab-table">
                            <thead>
                                <tr>
                                    <th>Solution</th>
                                    <th>Acid (cm³)</th>
                                    <th>Water (cm³)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>A</td><td>10</td><td>40</td></tr>
                                <tr><td>B</td><td>20</td><td>30</td></tr>
                                <tr><td>C</td><td>30</td><td>20</td></tr>
                                <tr><td>D</td><td>40</td><td>10</td></tr>
                                <tr style="background: rgba(139, 92, 246, 0.2);">
                                    <td style="font-weight: bold; color: white;">E</td>
                                    <td style="font-weight: bold; color: white;">50</td>
                                    <td style="font-weight: bold; color: white;">0</td>
                                </tr>
                            </tbody>
                        </table>
                        <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.85rem; font-weight: bold; color: var(--text-dim);">
                            <span>← Least Concentrated</span>
                            <span style="color: var(--primary);">Most Concentrated (Pure) →</span>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                if(window.MathJax) MathJax.typesetPromise([container]);
            }
        },

        // SLIDE 5: Virtual Lab Simulation (Mandatory Interactive)
        {
            template: () => `
                <div class="anim-enter">
                    <h2>Virtual Lab: Particle Collisions</h2>
                    
                    <div class="grid-2">
                        <div class="pedagogical-note note-task delay-1">
                            <div class="pedagogical-badge"><i class="fa-solid fa-magnifying-glass"></i> Observation</div>
                            <p>Adjust the slider to change the concentration of the acid particles.</p>
                            <ul style="margin-top: 1rem; margin-left: 1.5rem; color: white;">
                                <li>The grey blocks represent a <strong>solid marble chip</strong>.</li>
                                <li>The purple dots represent <strong>acid particles</strong>.</li>
                            </ul>
                            <p style="margin-top: 1rem; font-weight: bold; color: var(--primary);">Watch what happens to the frequency of collisions as the concentration increases!</p>
                        </div>

                        <div class="glass-card delay-2 text-center">
                            <h3><i class="fa-solid fa-microscope"></i> Particle Collision Simulator</h3>
                            <div style="position: relative;">
                                <canvas id="concentration-sim" width="400" height="220"></canvas>
                                <!-- Visual Flash on Collision -->
                                <div id="collision-flash" style="position:absolute; top:0; left:0; width:100%; height:100%; background:var(--primary); opacity:0; pointer-events:none; border-radius:8px; transition: opacity 0.1s;"></div>
                            </div>
                            
                            <div style="display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem;">
                                <span style="font-size: 0.9rem; font-weight: bold;">Dilute</span>
                                <input type="range" id="conc-slider" min="5" max="150" value="20">
                                <span style="font-size: 0.9rem; font-weight: bold; color: var(--primary);">Concentrated</span>
                            </div>
                            <p id="conc-readout" style="margin-top: 0.5rem; font-weight: bold;">Acid Particles: 20</p>
                        </div>
                    </div>
                </div>
            `,
            script: (container) => {
                const canvas = container.querySelector('#concentration-sim');
                const ctx = canvas.getContext('2d');
                const slider = container.querySelector('#conc-slider');
                const readout = container.querySelector('#conc-readout');
                const flash = container.querySelector('#collision-flash');
                
                let particles = [];
                let solidY = canvas.height - 40;
                
                function createParticle() {
                    return {
                        x: Math.random() * (canvas.width - 10) + 5,
                        y: Math.random() * (solidY - 10) + 5,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3
                    };
                }

                // Initial particles
                for(let i=0; i<20; i++) particles.push(createParticle());

                let rafId;

                slider.addEventListener('input', (e) => {
                    const targetNum = parseInt(e.target.value);
                    readout.innerText = `Acid Particles: ${targetNum}`;
                    
                    if (targetNum > particles.length) {
                        for(let i = particles.length; i < targetNum; i++) particles.push(createParticle());
                    } else if (targetNum < particles.length) {
                        particles.length = targetNum; // Truncate array
                    }
                });

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw Solid (Marble Chip layer at bottom)
                    ctx.fillStyle = '#64748b'; // Slate 500
                    ctx.fillRect(0, solidY, canvas.width, 40);
                    // Draw grid lines to make it look like a solid lattice
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 2;
                    for(let x=0; x<=canvas.width; x+=20) {
                        ctx.beginPath(); ctx.moveTo(x, solidY); ctx.lineTo(x, canvas.height); ctx.stroke();
                    }
                    for(let y=solidY; y<=canvas.height; y+=20) {
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                    }
                    
                    let collisionHappened = false;

                    // Update & Draw Particles
                    ctx.fillStyle = '#8b5cf6'; // Primary Purple
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        
                        // Bounce off walls (X)
                        if(p.x <= 3 || p.x >= canvas.width - 3) p.vx *= -1;
                        
                        // Bounce off ceiling
                        if(p.y <= 3) p.vy *= -1;
                        
                        // Bounce off Solid Floor!
                        if(p.y >= solidY - 3) {
                            p.vy *= -1;
                            p.y = solidY - 3; // prevent getting stuck
                            collisionHappened = true;
                        }
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    
                    // Visual feedback for high collision rates
                    if(collisionHappened && particles.length > 80) {
                         flash.style.opacity = '0.3';
                         setTimeout(() => { flash.style.opacity = '0'; }, 50);
                    }

                    rafId = requestAnimationFrame(draw);
                }
                
                draw();

                return () => {
                    cancelAnimationFrame(rafId);
                };
            }

    function render() {
        const container = document.getElementById('slide-container');
        const slide = state.slides[state.currentSlide];
        
        // Execute cleanup from previous slide if it exists
        if (state.cleanupFn) {
            state.cleanupFn();
            state.cleanupFn = null;
        }

        // Render HTML
        container.innerHTML = slide.template();
        
        // Execute script and store cleanup
        if (slide.script) {
            // slight delay to ensure DOM is ready
            setTimeout(() => {
                state.cleanupFn = slide.script(container);
            }, 50);
        }
        
        // Update UI
        document.getElementById('progress-bar').style.width = `${((state.currentSlide + 1) / state.slides.length) * 100}%`;
        document.getElementById('btn-prev').disabled = state.currentSlide === 0;
        document.getElementById('btn-next').disabled = state.currentSlide === state.slides.length - 1;
        document.getElementById('viewport').scrollTop = 0;
    }

    function changeSlide(dir) {
        const next = state.currentSlide + dir;
        if (next >= 0 && next < state.slides.length) {
            state.currentSlide = next;
            render();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btn-prev').addEventListener('click', () => changeSlide(-1));
    document.getElementById('btn-next').addEventListener('click', () => changeSlide(1));

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Initialize
    render();
